async function sevkiyatKontrolEt(fsId) {
  if (!fsId) return;
  try {
    await db.collection('sevkiyatlar').doc(fsId).update({
      kontrolDurumu: 'onaylandi',
      kontrolTarihi: Date.now(),
      kontrolEden: state.profil?.ad || 'Yönetici'
    });
    const listItem = state.yoneticiSevkiyatlar.find(x => x.fsId === fsId);
    if (listItem) { listItem.kontrolDurumu = 'onaylandi'; listItem.kontrolTarihi = Date.now(); listItem.kontrolEden = state.profil?.ad; }
    if (state.aktifSevkiyatDetay && state.aktifSevkiyatDetay.fsId === fsId) {
      state.aktifSevkiyatDetay.kontrolDurumu = 'onaylandi';
      state.aktifSevkiyatDetay.kontrolTarihi = Date.now();
      state.aktifSevkiyatDetay.kontrolEden = state.profil?.ad;
    }
    render();
    toast('✅ Sevkiyat onaylandı', 2000);
    // Onay sonrası PDF kaydetme
    const pdfBoyut = await Storage.get('app:pdfBoyut') || 'A4';
    setTimeout(() => pdfKaydetDialog(fsId, pdfBoyut), 400);
  } catch(e) { toast('Hata: ' + e.message, 3000); }
}

async function pdfKaydetDialog(fsId, boyut) {
  const s = sevkiyatBul(fsId);
  if (!s) { pdfUret(fsId, boyut); return; }
  const dosyaAdi = `Irsaliye_${s.sevkiyatNo}_${s.musteriAd.replace(/[^a-zA-Z0-9ğüşıöçĞÜŞİÖÇ]/g,'_')}.pdf`;

  if (window.showSaveFilePicker) {
    try {
      const pdf = pdfOlustur(s, boyut);
      const blob = pdf.output('blob');
      const handle = await window.showSaveFilePicker({
        suggestedName: dosyaAdi,
        types: [{ description: 'PDF', accept: { 'application/pdf': ['.pdf'] } }]
      });
      const writable = await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      toast('✓ İrsaliye kaydedildi', 2000);
      return;
    } catch(e) {
      if (e.name === 'AbortError') return;
    }
  }
  // Fallback: normal indirme
  const pdf = pdfOlustur(s, boyut);
  pdf.save(dosyaAdi);
  toast('PDF indirildi');
}

// EXIF yönünü okur (1-8 arası değer)
function exifOrientasyonOku(dataUrl) {
  try {
    const b64 = dataUrl.split(',')[1];
    if (!b64) return 1;
    const bin = atob(b64.slice(0, 2048)); // sadece başı okuyoruz, hız için
    const view = new DataView(Uint8Array.from(bin, c => c.charCodeAt(0)).buffer);
    if (view.getUint16(0, false) !== 0xFFD8) return 1;
    let offset = 2;
    while (offset + 4 < view.byteLength) {
      const marker = view.getUint16(offset, false);
      const len = view.getUint16(offset + 2, false);
      if (marker === 0xFFE1 && view.getUint32(offset + 4, false) === 0x45786966) {
        const tiffBase = offset + 10;
        const little = view.getUint16(tiffBase, false) === 0x4949;
        const ifdOffset = view.getUint32(tiffBase + 4, little);
        const entries = view.getUint16(tiffBase + ifdOffset, little);
        for (let i = 0; i < entries; i++) {
          const tag = view.getUint16(tiffBase + ifdOffset + 2 + i * 12, little);
          if (tag === 0x0112) return view.getUint16(tiffBase + ifdOffset + 2 + i * 12 + 8, little);
        }
      }
      if (marker === 0xFFDA) break; // SOS başladı, artık EXIF yok
      offset += 2 + len;
    }
  } catch(e) {}
  return 1;
}

// EXIF yönünü canvas ile düzeltir, düzeltilmiş data URL döner
async function exifDuzelt(dataUrl) {
  const orientation = exifOrientasyonOku(dataUrl);
  if (orientation === 1) return dataUrl;
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const swap = orientation >= 5;
      canvas.width  = swap ? img.height : img.width;
      canvas.height = swap ? img.width  : img.height;
      ctx.save();
      switch (orientation) {
        case 2: ctx.transform(-1, 0, 0,  1, canvas.width, 0); break;
        case 3: ctx.transform(-1, 0, 0, -1, canvas.width, canvas.height); break;
        case 4: ctx.transform( 1, 0, 0, -1, 0, canvas.height); break;
        case 5: ctx.transform( 0, 1, 1,  0, 0, 0); break;
        case 6: ctx.transform( 0, 1,-1,  0, canvas.width, 0); break;
        case 7: ctx.transform( 0,-1,-1,  0, canvas.width, canvas.height); break;
        case 8: ctx.transform( 0,-1, 1,  0, 0, canvas.height); break;
      }
      ctx.drawImage(img, 0, 0);
      ctx.restore();
      resolve(canvas.toDataURL('image/jpeg', 0.85));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

// Bir sevkiyatın fotoğraflarını {deriIndex, foto} olarak getirir (geriye dönük uyumlu)
async function sevkiyatFotograflariGetir(fsId) {
  const snap = await db.collection('sevkiyatlar').doc(fsId)
    .collection('fotograflar').orderBy('sira').get();
  return snap.docs.map((d, i) => {
    const data = d.data();
    return {
      // Eski kayıtlarda deriIndex yok → sira'ya (ya da konuma) düş
      deriIndex: (typeof data.deriIndex === 'number') ? data.deriIndex : (data.sira ?? i),
      foto: data.foto
    };
  });
}

function fotoModalAc() {

}
function fotoModalMesaj(mbg, html, renk) {
  mbg.innerHTML = `<div class="modal" onclick="event.stopPropagation()" style="padding:16px"><div class="modal-handle"></div><div style="text-align:center;padding:16px;color:${renk||'var(--ink-faint)'}">${html}</div><button class="btn secondary" onclick="document.querySelector('.modal-bg').remove()">Kapat</button></div>`;
}

// Galeri içeriğini mbg içine doldurur (ileri/geri navigasyon)
function galeriDoldur(mbg, fotolar, baslangic, etiketBasi) {
  let aktif = Math.min(Math.max(0, baslangic || 0), fotolar.length - 1);
  const render = () => {
    mbg.innerHTML = `<div class="modal" onclick="event.stopPropagation()" style="max-width:95vw;padding:16px">
      <div class="modal-handle"></div>
      <div style="font-size:13px;font-weight:700;text-align:center;margin-bottom:8px">${etiketBasi} ${aktif+1} / ${fotolar.length}</div>
      <img src="${fotolar[aktif]}" style="width:100%;border-radius:8px;max-height:70vh;object-fit:contain;display:block">
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn secondary g-onceki" style="flex:1" ${aktif===0?'disabled':''}>◀</button>
        <button class="btn secondary g-sonraki" style="flex:1" ${aktif===fotolar.length-1?'disabled':''}>▶</button>
        <button class="btn secondary" style="flex:1" onclick="document.querySelector('.modal-bg').remove()">Kapat</button>
      </div></div>`;
    mbg.querySelector('.g-onceki').onclick = () => { if (aktif > 0) { aktif--; render(); } };
    mbg.querySelector('.g-sonraki').onclick = () => { if (aktif < fotolar.length-1) { aktif++; render(); } };
  };
  render();
}

// Grup kartına basınca o grubun paket fotoğraflarını göster
async function grupFotoGoster(fsId, indices) {
  const mbg = fotoModalAc();
  try {
    const tum = await sevkiyatFotograflariGetir(fsId);
    let secili = tum.filter(p => indices.includes(p.deriIndex));
    if (secili.length === 0) secili = tum; // eşleşme yoksa (eski kayıt) hepsini göster
    if (secili.length === 0) { fotoModalMesaj(mbg, 'Bu grup için fotoğraf bulunamadı'); return; }
    const fotolar = await Promise.all(secili.map(p => exifDuzelt(p.foto)));
    galeriDoldur(mbg, fotolar, 0, 'Paket');
  } catch(e) { fotoModalMesaj(mbg, 'Fotoğraf yüklenemedi: ' + escapeHtml(e.message), 'var(--red)'); }
}

// Tek bir paketin (deri index) fotoğrafını galeri içinde aç
async function paketFotoGoster(fsId, deriIndex) {
  const mbg = fotoModalAc();
  try {
    const tum = await sevkiyatFotograflariGetir(fsId);
    if (tum.length === 0) { fotoModalMesaj(mbg, 'Bu paket için fotoğraf bulunamadı'); return; }
    const fotolar = await Promise.all(tum.map(p => exifDuzelt(p.foto)));
    let baslangic = tum.findIndex(p => p.deriIndex === deriIndex);
    if (baslangic < 0) baslangic = Math.min(deriIndex, tum.length - 1);
    galeriDoldur(mbg, fotolar, baslangic, 'Paket');
  } catch(e) { fotoModalMesaj(mbg, 'Fotoğraf yüklenemedi: ' + escapeHtml(e.message), 'var(--red)'); }
}

// ====== FOTOĞRAF KOTA YÖNETİMİ — limit aşılınca en eski fotoğrafları sil ======
async function eskiFotograflariTemizle() {
  try {
    const fsPlan = await Storage.get('app:firestorePlan') || 'spark';
    const limitMB = fsPlan === 'blaze' ? 4096 : 1000;
    const limitKB = limitMB * 1024;

    // Tahmini kullanımı hesapla
    const sevk = state.yoneticiSevkiyatlar || state.sevkiyatlar || [];
    const tahminiKB = sevk.length * 3;
    const fotoSayisi = sevk.reduce((s, x) => s + (x.fotoSayisi || 0), 0);
    const fotoKB = fotoSayisi * 53;
    const toplamKB = tahminiKB + fotoKB;

    // Limit aşılmadıysa silme
    if (toplamKB < limitKB) return;

    // En eski fotoğraflı sevkiyatlardan başlayarak sil (her seferde 10)
    const snap = await db.collection('sevkiyatlar')
      .where('fotoSayisi', '>', 0)
      .orderBy('fotoSayisi').orderBy('tarih', 'asc')
      .limit(10).get();
    if (snap.empty) return;

    let silinenKB = 0;
    for (const doc of snap.docs) {
      if (toplamKB - silinenKB < limitKB) break;
      const fotoSnap = await doc.ref.collection('fotograflar').get();
      if (fotoSnap.empty) continue;
      const batch = db.batch();
      fotoSnap.docs.forEach(f => batch.delete(f.ref));
      batch.update(doc.ref, { fotoSayisi: 0 });
      await batch.commit();
      silinenKB += fotoSnap.size * 53;
      // State'i de güncelle
      const stateItem = sevk.find(s => s.fsId === doc.id);
      if (stateItem) stateItem.fotoSayisi = 0;
    }
    if (silinenKB > 0) console.log(`Kota temizliği: ${(silinenKB/1024).toFixed(1)} MB fotoğraf silindi`);
  } catch(e) { console.warn('Kota temizliği hatası:', e.message); }
}

async function sevkiyatSil(fsId) {
  if (!confirm('Bu sevkiyat kalıcı olarak silinecek. Emin misiniz?')) return;
  try {
    // Alt koleksiyon fotograflar'ı da sil
    const fotoSnap = await db.collection('sevkiyatlar').doc(fsId).collection('fotograflar').get();
    if (!fotoSnap.empty) {
      const batch = db.batch();
      fotoSnap.docs.forEach(d => batch.delete(d.ref));
      await batch.commit();
    }
    await db.collection('sevkiyatlar').doc(fsId).delete();
    toast('✓ Sevkiyat silindi');
    geriDon();
  } catch(e) {
    toast('❌ Silme hatası: ' + e.message, 3000);
  }
}

      if (!pMap[key]) pMap[key] = { ad: key, adet:0, dm2:0, sayim:0, sevkiyatlar:[] };
      pMap[key].adet  += s.toplamAdet||0;
      pMap[key].dm2   += s.toplamYuzeyDm2||0;
      pMap[key].sayim += 1;
      pMap[key].sevkiyatlar.push(s);
    });
    icerik = `
      <div class="section-title">Personel Bazlı Sevkiyatlar</div>
      ${Object.values(pMap).sort((a,b)=>b.sayim-a.sayim).map(p=>`
        <details style="margin-bottom:10px;background:var(--bg-card);border:1px solid var(--line);border-radius:10px;overflow:hidden">
          <summary style="padding:14px;cursor:pointer;list-style:none;display:flex;align-items:center;gap:10px">
            <div style="flex:1">
              <div style="font-family:'Fraunces';font-weight:600;font-size:15px">👤 ${escapeHtml(p.ad)}</div>
              <div style="font-size:12px;color:var(--ink-faint)">${p.sayim} sevkiyat · ${p.adet} deri · ${p.dm2.toFixed(0)} dm²</div>
            </div>
            <span style="color:var(--ink-faint);font-size:18px">›</span>
          </summary>
          <div style="border-top:1px solid var(--line);padding:10px">
            ${p.sevkiyatlar.slice().sort((a,b)=>b.tarih-a.tarih).map(s=>sevkiyatKarti(s)).join('')}
          </div>
        </details>`).join('')}`;

  } else if (state.yoneticiSekme === 'kullanicilar') {
    icerik = `
      <div class="section-title">Kullanıcı Yönetimi</div>
      <div id="kullanici-listesi" style="margin-bottom:16px"><div style="color:var(--ink-faint);text-align:center;padding:20px">Yükleniyor...</div></div>
      <div class="card" style="background:var(--gold-soft)">
        <div style="font-weight:700;margin-bottom:12px">➕ Yeni Personel Ekle</div>
        <div class="input-group"><label class="input-label">Ad Soyad</label><input class="input" id="pers-ad" placeholder="Ali Veli"></div>
        <div class="input-group"><label class="input-label">Kullanıcı Adı</label><input class="input" id="pers-mail" placeholder="ali"></div>
        <div class="input-group"><label class="input-label">Şifre</label><input class="input" id="pers-sifre" type="password" placeholder="En az 6 karakter"></div>
        <button class="btn" style="background:var(--leather-dark)" onclick="personelEkle()">Ekle</button>
      </div>
      <div id="pers-sonuc" style="margin-top:8px;font-size:13px"></div>
      <div class="card" style="margin-top:16px">
        <div style="font-weight:700;margin-bottom:8px">⚙ API Anahtarları</div>
        <button class="btn secondary" onclick="ayarlarDialog()">API Ayarlarını Aç</button>
      </div>
      <div class="card" style="margin-top:16px;border:1px solid var(--red)">
        <div style="font-weight:700;margin-bottom:8px;color:var(--red)">🗑 Sıfırlama (Dikkat!)</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button onclick="tumSevkiyatlariSil()" style="font-size:12px;padding:8px 12px;background:none;border:1px solid var(--red);color:var(--red);border-radius:8px;cursor:pointer">Tüm Sevkiyatları Sil</button>
          <button onclick="tumMusterileriSil()" style="font-size:12px;padding:8px 12px;background:none;border:1px solid var(--red);color:var(--red);border-radius:8px;cursor:pointer">Tüm Müşterileri Sil</button>
        </div>
      </div>`;
    setTimeout(kullaniciListesiYukle, 100);
  }

  return `
    <div class="topbar">
      <div class="brand" style="font-size:15px">👑 ${escapeHtml(state.profil?.ad || kullaniciAdiGoster(state.kullanici?.email))}</div>
      <div style="display:flex;gap:6px">
        <button onclick="ekranGit('musteri-listesi')" style="font-size:12px;padding:6px 10px;background:var(--gold);color:var(--leather-dark);border-radius:8px;font-weight:700">+ Sevkiyat</button>
        <button onclick="ayarlarDialog()">⚙</button>
        <button onclick="cikisYap()">Çıkış</button>
      </div>
    </div>
    <div class="tabs" style="overflow-x:auto;white-space:nowrap">${tabHtml}</div>
    <div class="content">${icerik}</div>`;
}

    <div style="font-size:24px;margin-bottom:4px">${icon}</div>
    <div style="font-family:'Fraunces';font-size:22px;font-weight:700">${deger}</div>
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink-soft);margin-top:2px">${etiket}</div>
  </div>`;
}

function sevkiyatKarti(s) {
  return `<div class="shipment-item" onclick="yoneticiSevkiyatDetay('${s.fsId}')">
    <div class="header">
      <span class="no">${s.sevkiyatNo}</span>
      <span class="date">${tarihFormatla(s.tarih)}</span>
    </div>
    <div class="customer">${escapeHtml(s.musteriAd||'')}</div>
    <div class="totals">
      <span>👤 ${escapeHtml(s.personelAd||'?')}</span>
      <span>🐂 ${s.toplamAdet} deri</span>

    </div>
    ${s.not ? `<div style="margin-top:6px;padding:6px 10px;background:var(--gold-soft,#fef6e4);border-radius:6px;font-size:12px;color:var(--ink-soft)">📝 ${escapeHtml(s.not)}</div>` : ''}
  </div>`;
}

function sevkiyatKartiOnay(s) {
  const paketSayisi = (s.deriler||[]).length || (s.fotoSayisi > 0 ? s.fotoSayisi : '?');
  return `<div class="shipment-item" onclick="yoneticiSevkiyatDetay('${s.fsId}')"
    style="border-left:4px solid var(--amber);background:linear-gradient(135deg,var(--bg-card),var(--amber-soft))">

      <span style="background:var(--amber);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;text-transform:uppercase">⏳ Onay Bekliyor</span>
      <span style="font-size:12px;color:var(--ink-faint);margin-left:auto">${tarihFormatla(s.tarih)}</span>
    </div>
    <div style="flex:1">

      <div style="font-size:12px;color:var(--ink-soft)">${escapeHtml(s.sevkiyatNo||'')} · 👤 ${escapeHtml(s.personelAd||'?')}</div>
      <div style="display:flex;gap:14px;margin-top:8px;align-items:baseline">
        <span style="font-size:20px;font-weight:800;color:var(--leather-dark)">${paketSayisi} <span style="font-size:13px;font-weight:600">paket</span></span>
        <span style="font-size:20px;font-weight:800;color:var(--leather-dark)">${sayiFormatla(s.toplamYuzeyDm2||0)} <span style="font-size:13px;font-weight:600">dm²</span></span>

function aramaHtml(aramaVal, sevk) {
  if (aramaVal.length < 2) return '<div style="text-align:center;color:var(--ink-faint);padding:20px;font-size:13px">En az 2 karakter girin</div>';
  const q = aramaVal.toLowerCase();
  const sonuclar = sevk.filter(s =>
    (s.sevkiyatNo || '').toLowerCase().includes(q)
    || tarihKisa(s.tarih).includes(q)
    || (s.musteriAd || '').toLowerCase().includes(q)
  ).slice().sort((a,b)=>b.tarih-a.tarih);
  if (sonuclar.length === 0) return '<div class="empty"><div class="icon">🔍</div><div>Sonuç bulunamadı</div></div>';
  return `<div style="font-size:12px;color:var(--ink-faint);margin-bottom:8px">${sonuclar.length} sonuç</div>` + sonuclar.map(s => sevkiyatKarti(s)).join('');
}

function aramaGuncelle(val) {
  state._yoneticiArama = val;
  // Sadece sonuç alanını güncelle — sayfayı yeniden render etme (cursor korunur)
  const el = document.getElementById('arama-sonuclar');
  if (el) el.innerHTML = aramaHtml(val, state.yoneticiSevkiyatlar || []);
}

function yoneticiSekme(sekme) {
  state.yoneticiSekme = sekme;
  render();
}

function yoneticiSevkiyatDetay(fsId) {
  state.aktifSevkiyatDetay = state.yoneticiSevkiyatlar.find(s => s.fsId === fsId);
  if (!state.aktifSevkiyatDetay) return;
  ekranGit('sevkiyat-detay');
}

async function personelEkle() {
  const ad    = document.getElementById('pers-ad').value.trim();
  let mail  = document.getElementById('pers-mail').value.trim();
  if (mail && !mail.includes('@')) mail += '@deri.app';
  const sifre = document.getElementById('pers-sifre').value;
  const sonEl = document.getElementById('pers-sonuc');
  if (!ad || !mail || !sifre) { sonEl.innerHTML='<span style="color:red">Tüm alanlar zorunlu</span>'; return; }
  sonEl.textContent = 'Ekleniyor...';
  try {
    // Her çağrıda temiz bir ikincil app kullan (öncekini sil)
    const appName = 'personelEkleTemp';
    try { await firebase.app(appName).delete(); } catch(e) {}
    const ikincilApp = firebase.initializeApp(firebase.apps[0].options, appName);
    const ikincilAuth = ikincilApp.auth();
    let uid;
    try {
      const cred = await ikincilAuth.createUserWithEmailAndPassword(mail, sifre);
      uid = cred.user.uid;
    } catch(authErr) {
      await ikincilAuth.signOut().catch(()=>{});
      await ikincilApp.delete().catch(()=>{});
      if (authErr.code === 'auth/email-already-in-use') {
        sonEl.innerHTML = `<span style="color:var(--amber)">⚠ "${mail}" zaten kayıtlı. Farklı bir kullanıcı adı deneyin.</span>`;
      } else {
        sonEl.innerHTML = `<span style="color:red">Hata: ${escapeHtml(authErr.message)}</span>`;
      }
      return;
    }
    const ikincilDb = ikincilApp.firestore();
    await ikincilDb.collection('users').doc(uid).set({ ad, email: mail, rol: 'PERSONEL', aktif: true, olusturma: Date.now() });
    await ikincilAuth.signOut();
    await ikincilApp.delete();
    ['pers-ad','pers-mail','pers-sifre'].forEach(id => document.getElementById(id).value = '');
    sonEl.innerHTML = `<span style="color:var(--green)">✓ ${escapeHtml(ad)} eklendi (${mail})</span>`;
  } catch(e) {
    sonEl.innerHTML = `<span style="color:red">Hata: ${escapeHtml(e.message)}</span>`;
  }
}

// ====== FİRESTORE: MÜŞTERİ KAYDET/YİKLE ======
async function musteriFirestore(musteri) {
  await db.collection('musteriler').doc(String(musteri.id)).set(musteri);
}

async function musterileriYukle() {
  try {
    const snap = await db.collection('musteriler').orderBy('ad').get();
    state.musteriler = snap.docs.map(d => ({ ...d.data(), fsId: d.id }));
  } catch(e) {
    console.warn('Müşteri yüklenemedi:', e.message);
    state.musteriler = [];
  }
}

// ====== YÖNETİCİ: FIRESTORE REALTIME ======
function yoneticiDinlemeBaslat() {
  if (state.unsubscribeFn) state.unsubscribeFn();
  state.unsubscribeFn = db.collection('sevkiyatlar')
    .orderBy('tarih', 'desc')
    .limit(500)
    .onSnapshot(snap => {
      state.yoneticiSevkiyatlar = snap.docs.map(d => ({ ...d.data(), fsId: d.id }));
      // Yenileme sonrası açık olan detay ekranını geri yükle
      if (state._bekleyenDetayId && !state.aktifSevkiyatDetay) {
        const detay = state.yoneticiSevkiyatlar.find(s => s.fsId === state._bekleyenDetayId);
        if (detay) { state.aktifSevkiyatDetay = detay; state._bekleyenDetayId = null; }
      }
      // Veri geldikten sonra kota temizliğini bir kez çalıştır
      if (!state._kotaKontrolEdildi) { state._kotaKontrolEdildi = true; eskiFotograflariTemizle(); }
      if (state.ekran === 'yonetici' || state.ekran === 'sevkiyat-detay') render();
    }, e => console.warn('Snapshot:', e.message));
}

// ====== KULLANICI YÖNETİMİ ======

    const snap = await db.collection('users').get();
    const kullanicilar = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
    if (kullanicilar.length === 0) {
      el.innerHTML = '<div style="text-align:center;color:var(--ink-faint);padding:16px">Henüz kullanıcı yok</div>';
      return;
    }
    el.innerHTML = kullanicilar.map(k => {
      const rolIcon = k.rol === 'YONETICI' ? '👑' : '👤';
      const aktifStil = k.aktif !== false ? '' : 'opacity:0.4';
      const durum = k.aktif !== false ? '<span style="color:var(--green);font-size:11px">● Aktif</span>' : '<span style="color:var(--red);font-size:11px">● Pasif</span>';
      const isYon = k.rol === 'YONETICI';
      const butonStil = 'font-size:11px;padding:5px 10px;background:none;border-radius:6px;cursor:pointer;border:1px solid';
      const onayYetkisi = k.onayYetkisi === true;
      const onayBadge = onayYetkisi ? '<span style="background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:999px;margin-left:4px">✓ Onay</span>' : '';
      return `
        <div class="card" style="margin-bottom:8px;${aktifStil}">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="font-size:28px">${rolIcon}</div>
            <div style="flex:1">
              <div style="font-weight:700;font-size:15px">${escapeHtml(k.ad || '?')}${onayBadge}</div>
              <div style="font-size:12px;color:var(--ink-faint)">@${escapeHtml(kullaniciAdiGoster(k.email))} · ${escapeHtml(k.rol)}</div>
              <div style="margin-top:2px">${durum}</div>
            </div>
          </div>
          <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">
            <button onclick="kullaniciDuzenle('${k.uid}','${(k.ad||'').replace(/'/g,'')}')" style="${butonStil} var(--ink-faint);color:var(--ink-soft)">✏ Düzenle</button>
            <button onclick="sifreResetGonder('${k.email || ''}')" style="${butonStil} var(--ink-faint);color:var(--ink-soft)">🔑 Şifre</button>
            <button onclick="kullaniciRolDegistir('${k.uid}','${k.rol}')" style="${butonStil} var(--ink-faint);color:var(--ink-soft)">🔄 Rol</button>
            <button onclick="kullaniciOnayYetkisiDegistir('${k.uid}',${onayYetkisi})" style="${butonStil} ${onayYetkisi ? 'var(--green);color:var(--green)' : 'var(--ink-faint);color:var(--ink-soft)'}">✅ Onay Yetkisi</button>

              : `<button onclick="kullaniciDurumDegistir('${k.uid}',true)" style="${butonStil} var(--green);color:var(--green)">✅ Aktifle</button>`}

async function kullaniciDurumDegistir(uid, aktif) {
  try {
    await db.collection('users').doc(uid).update({ aktif });
    toast(aktif ? '✓ Kullanıcı aktifleştirildi' : '✓ Kullanıcı pasifleştirildi');
    kullaniciListesiYukle();
  } catch(e) { toast('Hata: ' + e.message, 3000); }
}

async function kullaniciDuzenle(uid, mevcutAd) {
  const yeniAd = prompt('Yeni ad:', mevcutAd);
  if (!yeniAd || yeniAd === mevcutAd) return;
  try {
    await db.collection('users').doc(uid).update({ ad: yeniAd.trim() });
    toast('✓ İsim güncellendi');
    kullaniciListesiYukle();
  } catch(e) { toast('Hata: ' + e.message, 3000); }
}

async function kullaniciOnayYetkisiDegistir(uid, mevcutDeger) {
  const yeni = !mevcutDeger;
  try {
    await db.collection('users').doc(uid).update({ onayYetkisi: yeni });
    toast(yeni ? '✓ Onay yetkisi verildi' : '✓ Onay yetkisi kaldırıldı');
    kullaniciListesiYukle();
    // Kendi profilimiz değiştiyse state'i güncelle
    if (uid === state.kullanici?.uid) state.profil.onayYetkisi = yeni;

async function kullaniciRolDegistir(uid, mevcutRol) {
  const yeniRol = mevcutRol === 'PERSONEL' ? 'YONETICI' : 'PERSONEL';
  if (!confirm(mevcutRol + ' → ' + yeniRol + ' olarak değiştirilsin mi?')) return;
  try {
    await db.collection('users').doc(uid).update({ rol: yeniRol });
    toast('✓ Rol değiştirildi: ' + yeniRol);
    kullaniciListesiYukle();
  } catch(e) { toast('Hata: ' + e.message, 3000); }
}

async function sifreResetGonder(email) {
  if (!email) { toast('E-posta adresi bulunamadı'); return; }
  try {
    await auth.sendPasswordResetEmail(email);
    toast('✓ Şifre sıfırlama maili gönderildi: ' + kullaniciAdiGoster(email));
  } catch(e) { toast('Hata: ' + e.message, 3000); }
}

// ====== API KEY Firestore'dan Yükle (personel için) ======
async function apiAnahtarlariniYukle() {
  // Önce Firestore'dan dene
  try {
    const doc = await db.collection('config').doc('apiKeys').get();
    if (doc.exists) {
      const d = doc.data();
      if (d.claudeKey) await Storage.set('app:claudeApiKey', d.claudeKey);
      if (d.googleKey) await Storage.set('app:googleApiKey', d.googleKey);
      return true;
    }
  } catch(e) { console.warn('API key Firestore:', e.message); }
  // Firestore'da yoksa yerel bak
  return !!(await Storage.get('app:claudeApiKey'));
}

// ====== UYGULAMA BAŞLATMA — AUTH STATE ======
async function basla() {
  auth.onAuthStateChanged(async user => {
    if (!user) {
      state.kullanici = null; state.profil = null;
      state.ekran = 'giris'; render(); return;
    }
    state.kullanici = user;

    // Kullanıcı profilini Firestore'dan al
    let profil = null;
    try {
      const profilDoc = await db.collection('users').doc(user.uid).get();
      if (profilDoc.exists) profil = profilDoc.data();
    } catch(e) {
      console.warn('Profil okunamadı:', e.message);
    }

    // Profil yoksa veya rol tanımlı değilse → İlk Kurulum göster
    if (!profil || !profil.rol) {
      ilkKurulumGoster(user);
      return;
    }

    state.profil = profil;
    await musterileriYukle();
    await apiAnahtarlariniYukle();

    // Kaydedilmiş durumu yükle
    const kayitli = durumYukle();

    if (profil.rol === 'YONETICI') {
      state.ekran = 'yonetici';
      yoneticiDinlemeBaslat(); // kota temizliği snapshot verisi gelince çalışır
    } else {
      state.ekran = 'musteri-listesi';
      try {
        const snap = await db.collection('sevkiyatlar')
          .where('personelId', '==', user.uid)
          .limit(200).get();
        state.sevkiyatlar = snap.docs
          .map(d => ({ ...d.data(), fsId: d.id }))
          .sort((a,b) => (b.tarih||0) - (a.tarih||0));
      } catch(e) { console.warn('Sevkiyat yüklenemedi:', e.message); state.sevkiyatlar = []; }
    }

    // Kayıtlı oturumu geri yükle
    if (kayitli) {
      if (kayitli.aktifMusteri) {
        state.aktifMusteri = kayitli.aktifMusteri;
      }
      if (kayitli.aktifFisler?.length > 0) {
        state.aktifFisler = kayitli.aktifFisler;
      }
      if (kayitli.oturumNo) state.oturumNo = kayitli.oturumNo;
      if (kayitli.yoneticiSekme) state.yoneticiSekme = kayitli.yoneticiSekme;
      if (kayitli._sevkiyatNot) state._sevkiyatNot = kayitli._sevkiyatNot;
      if (kayitli.aktifSevkiyatDetayId) {
        const detay = (state.sevkiyatlar || []).find(s => s.fsId === kayitli.aktifSevkiyatDetayId)
          || (state.yoneticiSevkiyatlar || []).find(s => s.fsId === kayitli.aktifSevkiyatDetayId);
        if (detay) state.aktifSevkiyatDetay = detay;
        // Yönetici snapshot'ı henüz gelmediyse, detay snapshot callback'te çözülür
        else state._bekleyenDetayId = kayitli.aktifSevkiyatDetayId;
      }
      if (kayitli.ekranGecmisi) state.ekranGecmisi = kayitli.ekranGecmisi;
      // Giriş/ilk-kurulum hariç kayıtlı ekrana dön
      const guvenliEkranlar = ['musteri-listesi','toplu-cekim','inceleme','sevkiyat-listesi','sevkiyat-detay','yonetici'];
      if (kayitli.ekran && guvenliEkranlar.includes(kayitli.ekran)) {
        state.ekran = kayitli.ekran;
      }
    }

    render();
  });
}

async function ilkKurulumGoster(user) {
  state.ekran = 'ilk-kurulum';
  // Mevcut admin var mı? Varsa YONETICI seçeneği gösterilmez
  let adminVarMi = false;
  try {
    const snap = await db.collection('users').where('rol', '==', 'YONETICI').limit(1).get();
    adminVarMi = !snap.empty;
  } catch(e) { /* Firestore erişim hatası → güvenli taraf: admin var say */ adminVarMi = true; }

  const rolSecenegi = adminVarMi
    ? `<div class="info-box" style="margin-bottom:8px">
        <div class="title">👤 Personel Hesabı</div>
        <div>Bu hesap personel olarak kaydedilecek. Yönetici rolü sadece mevcut bir yönetici tarafından değiştirilebilir.</div>
       </div>
       <input type="hidden" name="ilk-rol" value="PERSONEL">`
    : `<div class="input-group">
        <label class="input-label">Bu hesabın rolü</label>
        <div style="display:flex;gap:8px">
          <label style="display:flex;align-items:center;gap:8px;padding:14px;border:2px solid var(--leather);border-radius:10px;flex:1;cursor:pointer;background:var(--gold-soft)">
            <input type="radio" name="ilk-rol" value="YONETICI" checked>
            <div><div style="font-weight:700;font-size:16px">👑 Yönetici</div><div style="font-size:12px;color:var(--ink-soft)">Tüm verilere erişim, raporlar</div></div>
          </label>
          <label style="display:flex;align-items:center;gap:8px;padding:14px;border:1px solid var(--line);border-radius:10px;flex:1;cursor:pointer">
            <input type="radio" name="ilk-rol" value="PERSONEL">
            <div><div style="font-weight:700;font-size:16px">👤 Personel</div><div style="font-size:12px;color:var(--ink-soft)">Sadece sevkiyat kaydı</div></div>
          </label>
        </div>
       </div>`;

  const app = document.getElementById('app');
  app.innerHTML = `
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:var(--bg)">
      <div style="text-align:center;margin-bottom:32px">
        <div style="font-size:48px;margin-bottom:12px">⚙</div>
        <h2 style="font-family:'Fraunces',serif">İlk Kurulum</h2>
        <div style="color:var(--ink-soft);font-size:14px;margin-top:8px">👤 ${escapeHtml(kullaniciAdiGoster(user.email))}</div>
      </div>
      <div style="width:100%;max-width:360px">
        <div class="input-group">
          <label class="input-label">Ad Soyad</label>
          <input class="input" id="ilk-ad" placeholder="Adınız Soyadınız">
        </div>
        ${rolSecenegi}
        <div id="ilk-hata" style="color:var(--red);font-size:13px;margin-bottom:8px;display:none"></div>
        <button class="btn" style="background:var(--leather-dark);margin-top:12px" onclick="ilkKurulumKaydet()">Kaydet ve Devam Et</button>
        <button class="btn secondary" style="margin-top:8px" onclick="auth.signOut()">Farklı Hesap</button>
      </div>
    </div>`;
}

async function ilkKurulumKaydet() {
  const ad  = document.getElementById('ilk-ad').value.trim();
  const rolEl = document.querySelector('input[name="ilk-rol"]:checked') || document.querySelector('input[name="ilk-rol"][type="hidden"]');
  const rol = rolEl?.value || 'PERSONEL';
  const hataEl = document.getElementById('ilk-hata');
  if (!ad) { hataEl.textContent='Ad Soyad zorunlu'; hataEl.style.display='block'; return; }
  hataEl.style.display='none';

  try {
    // İlk kurulan yönetici otomatik onay yetkisi alır (tek admin senaryosu)
    const profil = { ad, email: state.kullanici.email, rol, aktif: true, onayYetkisi: rol === 'YONETICI', olusturma: Date.now() };
    await db.collection('users').doc(state.kullanici.uid).set(profil);
    state.profil = profil;
    await musterileriYukle();
    if (rol === 'YONETICI') {
      state.ekran = 'yonetici';
      yoneticiDinlemeBaslat();
    } else {
      state.ekran = 'musteri-listesi';
    }
    render();
    toast(`Hoş geldiniz ${ad}! Rol: ${rol === 'YONETICI' ? '👑 Yönetici' : '👤 Personel'}`);
  } catch(e) {
    hataEl.textContent = 'Kayıt hatası: ' + e.message;
    hataEl.style.display = 'block';
  }
}

basla();
</script>
</body>
</html>
