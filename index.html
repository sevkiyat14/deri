<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3D2817">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Deri Sevkiyat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5EFE0;--bg-card:#FFF;--bg-soft:#FAF7EC;
  --ink:#2A1E12;--ink-soft:#5C4A38;--ink-faint:#9B8A75;
  --line:#E8DCC4;
  --leather:#8B4513;--ldk:#3D2817;
  --gold:#D4A24C;--gold-soft:#F4E4BC;
  --green:#4A7C59;--green-soft:#D8E6DA;
  --amber:#E07F00;--amber-soft:#FCEACA;
  --red:#B33A3A;--red-soft:#F5D6D6;
  --ai:#5B4FBF;--ai-soft:#E4E0F7;
  --eco:#2E7D32;--eco-soft:#E8F5E9;--eco-border:#A5D6A7;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.5;overscroll-behavior:none;min-height:100vh}
.serif{font-family:'Fraunces',Georgia,serif;font-weight:700;letter-spacing:-.02em}
.mono{font-family:'JetBrains Mono',monospace}
#app{max-width:540px;margin:0 auto;min-height:100vh;background:var(--bg);padding-bottom:20px}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;background:var(--ldk);color:var(--bg-soft);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.topbar .brand{font-family:'Fraunces',serif;font-weight:700;font-size:17px}
.topbar .brand::before{content:"◈";color:var(--gold);margin-right:7px}
.topbar button{background:transparent;color:var(--bg-soft);border:1px solid rgba(244,228,188,.3);padding:6px 12px;border-radius:6px;font-size:13px;font-family:inherit;cursor:pointer}
.topbar button:active{background:rgba(255,255,255,.1)}

/* NAV */
.nav-strip{display:flex;gap:4px;padding:8px 12px;background:var(--bg-card);border-bottom:1px solid var(--line);overflow-x:auto;-webkit-overflow-scrolling:touch;position:sticky;top:50px;z-index:40}
.nav-strip::-webkit-scrollbar{display:none}
.ntab{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink-soft);background:var(--bg-soft);border:1px solid var(--line);white-space:nowrap}
.ntab.on{background:var(--ldk);color:#fff;border-color:var(--ldk)}

/* CONTENT */
.content{padding:16px}

/* CARDS */
.card{background:var(--bg-card);border:1px solid var(--line);border-radius:12px;padding:15px;margin-bottom:10px}

/* INPUTS */
.inp{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:8px;background:var(--bg-card);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--ink)}
.inp:focus{outline:2px solid var(--gold);border-color:var(--gold)}
.ilabel{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:5px;font-weight:700}
.igrp{margin-bottom:13px}
.irow{display:flex;gap:10px}
.irow .igrp{flex:1}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:13px 18px;background:var(--ldk);color:var(--bg-soft);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:15px;cursor:pointer;transition:transform .06s;width:100%}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn.sec{background:var(--bg-card);color:var(--ink);border:1px solid var(--line)}
.btn.gold{background:var(--gold);color:var(--ldk)}
.btn.danger{background:var(--red);color:#fff}
.btn.green{background:var(--green);color:#fff}
.btn.ai{background:var(--ai);color:#fff}
.btn-sm{padding:8px 14px;font-size:13px;width:auto}
.btn-xs{padding:5px 10px;font-size:12px;width:auto;border-radius:7px}

/* FİŞ KARTLARI (form içi) */
.fis-card{background:var(--bg-card);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;cursor:pointer}
.fis-card.processing{background:var(--amber-soft);border-color:var(--amber)}
.fis-card.ready{background:var(--green-soft);border-color:var(--green)}
.fis-card.error{background:var(--red-soft);border-color:var(--red)}
.fis-card .fthumb{width:52px;height:52px;border-radius:7px;object-fit:cover;flex-shrink:0;background:var(--bg-soft);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:22px}
.fis-card .finfo{flex:1;min-width:0}
.fis-card .fics-name{font-family:'Fraunces',serif;font-weight:700;font-size:15px;line-height:1.2}
.fis-card .fdetail{font-size:12px;color:var(--ink-soft);margin-top:3px}
.fis-card .fdesi{font-family:'JetBrains Mono',monospace;font-size:13px;margin-top:5px;display:flex;align-items:center;gap:6px}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.sdot.processing{background:var(--amber);animation:pulse 1.5s infinite}
.sdot.ready{background:var(--green)}
.sdot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ECO BADGE */
.eco-badge{display:inline-flex;align-items:center;padding:1px 7px;background:var(--eco-soft);color:var(--eco);border:1px solid var(--eco-border);border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.03em;flex-shrink:0}

/* TYPE GROUPS (detay ekranı) */
.tgroup{margin-bottom:14px;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.tg-head{background:var(--ldk);color:var(--bg-soft);padding:11px 15px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.tg-head .tname{font-family:'Fraunces',serif;font-weight:700;font-size:16px}
.tg-head .ttotals{font-size:12px;opacity:.8;display:flex;gap:10px;align-items:center}
.tg-body{background:var(--bg-card)}
.trow{padding:11px 15px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.trow:last-child{border-bottom:none}
.trow.eco-row{background:var(--eco-soft)}
.eco-sep{padding:6px 15px;background:var(--eco-soft);border-top:1px dashed var(--eco-border);border-bottom:1px solid var(--line);font-size:11px;font-weight:700;color:var(--eco);text-transform:uppercase;letter-spacing:.06em}
.trow-main{flex:1;min-width:0}
.trow-title{font-weight:600;font-size:14px;line-height:1.2}
.trow-sub{font-size:12px;color:var(--ink-soft);margin-top:2px;font-family:'JetBrains Mono',monospace}
.trow-right{text-align:right;white-space:nowrap;flex-shrink:0}
.trow-desi{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:14px;display:flex;align-items:center;gap:5px;justify-content:flex-end}
.trow-adet{font-size:11px;color:var(--ink-faint);margin-top:2px}

/* STATS */
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sbox{background:var(--bg-card);border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center}
.sbox .sv{font-family:'Fraunces',serif;font-weight:700;font-size:22px;line-height:1;color:var(--leather)}
.sbox .sl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);margin-top:4px}
.sbox.eco-s{border-top:3px solid var(--eco)}
.sbox.eco-s .sv{color:var(--eco)}

/* SUMMARY CARD */
.sum-card{background:linear-gradient(135deg,var(--ldk),var(--leather));color:var(--bg-soft);border-radius:14px;padding:18px;margin-bottom:14px}
.sum-card .sname{font-family:'Fraunces',serif;font-size:20px;font-weight:700;margin-bottom:3px}
.sum-card .sno{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold);margin-bottom:14px}
.sum-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding-top:14px;border-top:1px solid rgba(255,255,255,.15)}
.sum-nums .sv2{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--gold)}
.sum-nums .sl2{font-size:11px;text-transform:uppercase;letter-spacing:.05em;opacity:.7}

/* CUSTOMER */
.cust-item{background:var(--bg-card);border:1px solid var(--line);border-radius:10px;padding:13px 15px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer}
.cust-item:active{background:var(--gold-soft)}
.cavatar{width:40px;height:40px;border-radius:8px;background:var(--leather);color:var(--bg-soft);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;flex-shrink:0;font-size:18px}
.cinfo{flex:1;min-width:0}
.cname-txt{font-weight:600;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cmeta{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-faint)}

/* SHIPMENT LIST */
.sev-item{background:var(--bg-card);border:1px solid var(--line);border-radius:10px;padding:13px 15px;margin-bottom:8px;cursor:pointer}
.sev-item:active{background:var(--gold-soft)}
.sev-hd{display:flex;justify-content:space-between;margin-bottom:5px}
.sev-no{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-faint)}
.sev-date{font-size:12px;color:var(--ink-faint)}
.sev-cust{font-family:'Fraunces',serif;font-size:16px;font-weight:600;margin-bottom:6px}
.sev-tots{display:flex;gap:14px;font-size:12px;color:var(--ink-soft);flex-wrap:wrap}
.sev-types{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.tchip{padding:2px 8px;background:var(--bg-soft);border:1px solid var(--line);border-radius:10px;font-size:11px;color:var(--leather)}
.tchip.eco-c{background:var(--eco-soft);border-color:var(--eco-border);color:var(--eco)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(42,30,18,.62);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg);width:100%;max-width:540px;max-height:93vh;overflow-y:auto;border-radius:16px 16px 0 0;padding:18px;padding-bottom:40px}
.mhandle{width:40px;height:4px;background:var(--ink-faint);border-radius:2px;margin:0 auto 14px}
.modal h2{margin-bottom:14px;font-size:20px;font-family:'Fraunces',serif}

/* PHOTO PREVIEW */
.photo-prev{width:100%;max-height:220px;object-fit:contain;border-radius:10px;margin-bottom:12px;background:var(--ink);display:block}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:linear-gradient(160deg,var(--ldk) 0%,var(--leather) 60%,#c27040 100%)}
.login-card{background:var(--bg-card);border-radius:16px;padding:32px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo .lio{font-size:48px;display:block;margin-bottom:8px}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--ldk);color:var(--bg-soft);padding:11px 20px;border-radius:10px;z-index:200;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.25);animation:toastin .3s ease-out;max-width:90vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@keyframes toastin{from{opacity:0;transform:translate(-50%,20px)}to{opacity:1;transform:translate(-50%,0)}}

/* FABs */
.cam-fab{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:72px;height:72px;border-radius:50%;background:var(--gold);border:4px solid var(--ldk);color:var(--ldk);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 24px rgba(61,40,23,.3);z-index:40}
.cam-fab:active{transform:translateX(-50%) scale(.93)}
.cam-fab svg{width:30px;height:30px}
.manual-fab{position:fixed;bottom:34px;right:16px;z-index:40;background:var(--bg-card);border:1px solid var(--line);border-radius:999px;padding:9px 14px;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.1)}

/* BOTTOM BAR */
.bbar{position:fixed;bottom:0;left:0;right:0;background:var(--bg-card);border-top:1px solid var(--line);padding:10px 14px;display:flex;gap:8px;z-index:30;max-width:540px;margin:0 auto}
.bbar .btn{flex:1}

/* UTILS */
.flex{display:flex}.gap1{gap:5px}.gap2{gap:8px}.gap3{gap:12px}.items-c{align-items:center}.jb{justify-content:space-between}
.sec-title{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:"";flex:1;height:1px;background:var(--line)}
.txt-m{color:var(--ink-soft);font-size:13px}
.mt2{margin-top:8px}.mt3{margin-top:12px}.mb2{margin-bottom:8px}.mb3{margin-bottom:12px}
.empty{text-align:center;padding:50px 20px;color:var(--ink-faint)}
.empty .eico{font-size:44px;margin-bottom:12px;opacity:.5}
.warn-box{background:var(--red-soft);border-left:3px solid var(--red);padding:10px 13px;border-radius:6px;margin:10px 0;font-size:13px}
.info-box{background:var(--ai-soft);border-left:3px solid var(--ai);padding:10px 13px;border-radius:6px;margin:10px 0;font-size:13px}
.info-box .ittl{font-weight:700;color:var(--ai);margin-bottom:3px}
.conf-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600}
.conf-chip.ai{background:var(--ai-soft);color:var(--ai)}
.conf-chip.ok{background:var(--green-soft);color:var(--green)}
</style>
</head>
<body>
<input type="file" accept="image/*" capture="environment" id="cam-input" style="display:none" onchange="onCam(this.files[0])">
<div id="app"></div>
<script>
// ════════════════════════════════════════════════════════════════
//  DERİ SEVKİYAT  —  localStorage + Claude Vision OCR
// ════════════════════════════════════════════════════════════════

// ── DB ───────────────────────────────────────────────────────
const DB={
  g(k){try{return JSON.parse(localStorage.getItem('ds2_'+k))}catch{return null}},
  s(k,v){try{localStorage.setItem('ds2_'+k,JSON.stringify(v))}catch(e){}},
  d(k){localStorage.removeItem('ds2_'+k)},
  init(){
    if(this.g('ok')) return;
    this.s('users',[
      {id:'u1',name:'Yönetici',username:'admin',password:'admin123',role:'admin'},
      {id:'u2',name:'Personel 1',username:'personel',password:'123456',role:'personnel'}
    ]);
    this.s('customers',[
      {id:'c1',name:'ABC Deri Firması',email:'abc@firma.com',phone:'0532 111 2233'},
      {id:'c2',name:'XYZ Tabakhane',email:'xyz@firma.com',phone:'0533 444 5566'}
    ]);
    this.s('ships',[]);
    this.s('sevNo',1000);
    this.s('emailCfg',{emails:[],freq:'weekly',enabled:false});
    this.s('ok',true);
  },
  nextNo(){const n=(this.g('sevNo')||1000)+1;this.s('sevNo',n);return 'SEV-'+String(n).padStart(4,'0')},
  apiKey(){return this.g('claudeKey')||''}
};

// ── STATE ─────────────────────────────────────────────────────
let S={view:'login',user:null,ships:[],customers:[],users:[],form:null,curShip:null,modal:null,ocrBusy:false};

function boot(){DB.init();loadAll();render()}
function loadAll(){S.ships=DB.g('ships')||[];S.customers=DB.g('customers')||[];S.users=DB.g('users')||[]}
function persist(){DB.s('ships',S.ships);DB.s('customers',S.customers);DB.s('users',S.users)}

// ── HELPERS ───────────────────────────────────────────────────
function uid(){return 'x'+Math.random().toString(36).slice(2,9)+Date.now().toString(36)}
function today(){return new Date().toISOString().slice(0,10)}
function fmtDate(d){if(!d)return'-';try{return new Date(d+'T12:00:00').toLocaleDateString('tr-TR')}catch{return d}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function custName(id){return S.customers.find(c=>c.id===id)?.name||'?'}
function isEco(k){return /ECO/i.test(k||'')}
function fmtDs(dm2){return dm2!=null&&dm2>0?dm2.toFixed(0)+' ds':'—'}
function toast(t,ms=2400){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const el=document.createElement('div');el.className='toast';el.textContent=t;
  document.body.appendChild(el);setTimeout(()=>el.remove(),ms);
}
function toBase64(f){return new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(f)})}
function esc2(s){return esc(s).replace(/&#34;/g,'"')}

// ── CLAUDE VISION OCR ─────────────────────────────────────────
async function claudeOcr(imgDataUrl){
  const m=imgDataUrl.match(/^data:image\/([\w+]+);base64,(.+)$/);
  if(!m) throw new Error('Geçersiz görsel formatı');
  let mt='image/'+m[1];
  if(mt==='image/jpg') mt='image/jpeg';

  const apiKey=DB.apiKey();
  const headers={'Content-Type':'application/json'};
  if(apiKey){
    headers['x-api-key']=apiKey;
    headers['anthropic-version']='2023-06-01';
    headers['anthropic-dangerous-direct-browser-access']='true';
  }

  const prompt=`Bu bir Türk deri fabrikası sevkiyat etiketidir (paket fişi). Fotoğraf kıvrımlı, eğik veya bozuk bile olsa tüm alanları oku. YALNIZCA geçerli JSON döndür, başka HİÇBİR şey yazma, markdown kullanma:

{
  "cins": "ürün cinsi — DLP RUGAN, NATUREL ZENIT, MILANO, ASTAR gibi, BÜYÜK HARF",
  "renk": "SIYAH, KAHVE, BEYAZ vb — BÜYÜK HARF",
  "kod": "alfanümerik ürün kodu veya null",
  "kalite": "A, A2, ECO, ECO2, B veya C — etiketteki kalite kodu",
  "seriNo": "T1 N. satırındaki rakamlar, baştaki sıfırlar dahil (örn: 000000001)",
  "barkod": "barkod altındaki rakamlar 10-14 hane veya null",
  "deriAdedi": <tam sayı — etiketin Deri Adedi alanı>,
  "toplamYuzeyDm2": <ondalık veya null — Toplam Yuzey dm² değeri>,
  "toplamYuzeyFt2": <ondalık veya null — Toplam Yuzey ft² değeri>,
  "birim": "dm2 veya ft2 — tablodaki ölçüm değerlerinin birimi. 50'den büyük değerler dm2'dir",
  "yuzeyOlcumleri": [<bireysel yüzey ölçüm değerleri sayı olarak listesi>]
}`;

  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers,
    body:JSON.stringify({
      model:'claude-sonnet-4-6',max_tokens:1200,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mt,data:m[2]}},
        {type:'text',text:prompt}
      ]}]
    })
  });

  if(!res.ok){
    const err=await res.json().catch(()=>({}));
    throw new Error(`Claude API ${res.status}: ${err.error?.message||'Hata'}`);
  }
  const data=await res.json();
  const txt=data.content.map(c=>c.type==='text'?c.text:'').join('').trim();
  const clean=txt.replace(/^```json\s*/i,'').replace(/^```\s*/i,'').replace(/\s*```$/,'').trim();
  return JSON.parse(clean);
}

function parseOcr(j){
  if(!j||typeof j!=='object') throw new Error('JSON parse hatası');
  const dm2=j.toplamYuzeyDm2!=null?parseFloat(j.toplamYuzeyDm2):null;
  const ft2=j.toplamYuzeyFt2!=null?parseFloat(j.toplamYuzeyFt2):null;
  const dm2f=dm2||(ft2?parseFloat((ft2*9.2903).toFixed(1)):null);
  const ft2f=ft2||(dm2?parseFloat((dm2/9.2903).toFixed(2)):null);
  return{
    cins:(j.cins||'').toString().toUpperCase().trim(),
    renk:(j.renk||'').toString().toUpperCase().trim(),
    kod:(j.kod||'').toString().trim(),
    kalite:(j.kalite||'').toString().toUpperCase().trim(),
    seriNo:(j.seriNo||'').toString().trim(),
    barkod:(j.barkod||'').toString().trim(),
    deriAdedi:parseInt(j.deriAdedi)||0,
    toplamYuzeyDm2:dm2f,toplamYuzeyFt2:ft2f,
    birim:j.birim||'dm2',
    yuzeyOlcumleri:(j.yuzeyOlcumleri||[]).map(v=>({deger:parseFloat(v)||0}))
  };
}

// ── OCR QUEUE ─────────────────────────────────────────────────
async function processQueue(){
  if(S.ocrBusy||!S.form) return;
  const fis=S.form.fisler.find(f=>f.durum==='beklemede');
  if(!fis) return;
  S.ocrBusy=true;fis.durum='isleniyor';
  refreshFisler();
  try{
    const json=await claudeOcr(fis.foto);
    const veri=parseOcr(json);
    Object.assign(fis,veri);
    fis.durum='hazir';fis.kaynak='claude';
    if(navigator.vibrate) navigator.vibrate(30);
  }catch(e){
    fis.durum='hata';fis.hata=e.message;
    toast('❌ OCR: '+e.message.slice(0,70),4000);
  }
  S.ocrBusy=false;
  refreshFisler();
  setTimeout(processQueue,100);
}

function refreshFisler(){
  const el=document.getElementById('fisler-wrap');
  if(el&&S.form) el.innerHTML=fislerHTML(S.form.fisler);
  // also refresh summary and save button
  const sw=document.getElementById('sum-wrap');
  if(sw&&S.form){
    const hazir=S.form.fisler.filter(f=>f.durum==='hazir'||f.durum==='onayli');
    sw.innerHTML=hazir.length>0?formSumHTML(hazir):'';
  }
  const sb=document.getElementById('save-btn');
  if(sb&&S.form){
    const n=S.form.fisler.filter(f=>f.durum==='hazir'||f.durum==='onayli').length;
    sb.disabled=n===0;sb.textContent='💾 Kaydet ('+n+' fiş)';
  }
}

// ── GROUPING (cins + eco alt sıraya) ─────────────────────────
function groupFis(ff){
  const g={};
  ff.forEach(f=>{
    const c=(f.cins||'BELİRSİZ').toUpperCase();
    if(!g[c]) g[c]={normal:[],eco:[]};
    if(isEco(f.kalite)) g[c].eco.push(f);
    else g[c].normal.push(f);
  });
  return g;
}

function formSumHTML(ff){
  const groups=groupFis(ff);
  let html='<div class="sec-title">Cins Bazlı Özet</div>';
  for(const[cins,{normal,eco}] of Object.entries(groups)){
    const all=[...normal,...eco];
    const tDs=all.reduce((s,f)=>s+(f.toplamYuzeyDm2||0),0);
    const tAd=all.reduce((s,f)=>s+(f.deriAdedi||0),0);
    html+=`<div class="tgroup">
      <div class="tg-head">
        <div class="tname">${esc(cins)}</div>
        <div class="ttotals"><span>${tAd} deri</span><span>${tDs.toFixed(0)} ds</span>${eco.length?`<span class="eco-badge">♻ ${eco.length} ECO</span>`:''}</div>
      </div>
      <div class="tg-body">
        ${normal.map(f=>trowH(f,false)).join('')}
        ${eco.length?`<div class="eco-sep">♻️ ECO Kalite</div>${eco.map(f=>trowH(f,true)).join('')}`:''}
      </div>
    </div>`;
  }
  return html;
}

function trowH(f,ecoMode){

      <div class="trow-adet">${f.deriAdedi||0} adet</div>

  </div>`;
}

// ── REPORTS ───────────────────────────────────────────────────
function reportsH(){
  const allF=S.ships.flatMap(s=>s.fisler||[]);
  const byCins={},byCust={};
  allF.forEach(f=>{
    const c=(f.cins||'?');
    if(!byCins[c])byCins[c]={n:0,ds:0,eco:0};
    byCins[c].n++;byCins[c].ds+=f.toplamYuzeyDm2||0;
    if(isEco(f.kalite))byCins[c].eco++;
  });
  S.ships.forEach(s=>{
    const n=custName(s.customerId);
    if(!byCust[n])byCust[n]={sevk:0,fis:0,ds:0};
    byCust[n].sevk++;byCust[n].fis+=(s.fisler?.length||0);
    byCust[n].ds+=(s.fisler||[]).reduce((a,f)=>a+(f.toplamYuzeyDm2||0),0);
  });
  const totDs=allF.reduce((a,f)=>a+(f.toplamYuzeyDm2||0),0);
  const totEco=allF.filter(f=>isEco(f.kalite)).length;

  return`<div class="content">
  <div class="sgrid" style="grid-template-columns:repeat(2,1fr)">
    <div class="sbox"><div class="sv">${S.ships.length}</div><div class="sl">Sevkiyat</div></div>
    <div class="sbox"><div class="sv">${allF.length}</div><div class="sl">Toplam Fiş</div></div>
    <div class="sbox"><div class="sv">${totDs.toFixed(0)}</div><div class="sl">Toplam ds</div></div>
    <div class="sbox eco-s"><div class="sv">${totEco}</div><div class="sl">ECO Fiş</div></div>
  </div>

  <div class="sec-title">Cins Bazlı</div>
  ${Object.entries(byCins).sort((a,b)=>b[1].ds-a[1].ds).map(([c,d])=>`<div class="card" style="padding:12px 14px">
    <div class="flex jb items-c">
      <div class="serif" style="font-size:15px">${esc(c)}</div>
      ${d.eco>0?`<span class="eco-badge">♻ ${d.eco} ECO</span>`:''}
    </div>
    <div class="flex gap3 mt2 txt-m">
      <span>${d.n} fiş</span><span>${d.ds.toFixed(0)} ds</span>
    </div>
  </div>`).join('')}

  <div class="sec-title">Müşteri Bazlı</div>
  ${Object.entries(byCust).sort((a,b)=>b[1].ds-a[1].ds).map(([n,d])=>`<div class="card" style="padding:12px 14px">
    <div class="serif" style="font-size:15px">${esc(n)}</div>
    <div class="flex gap3 mt2 txt-m"><span>${d.sevk} sevk</span><span>${d.fis} fiş</span><span>${d.ds.toFixed(0)} ds</span></div>
  </div>`).join('')}

  <div class="card" style="border:2px solid var(--red);margin-top:16px">
    <div style="font-weight:700;color:var(--red);margin-bottom:8px">⚠️ Tehlikeli Bölge</div>
    <p class="txt-m mb3">Tüm sevkiyat geçmişini siler. Geri alınamaz!</p>
    <button class="btn danger btn-sm" onclick="confirmReset()">🗑️ Geçmişi Sıfırla</button>
  </div>
</div>`;
}

      <div class="flex jb items-c">

          <div style="font-weight:600">${esc(u.name)}</div>
          <div class="cmeta">${esc(u.username)} · ${u.role==='admin'?'👑 Yönetici':'👤 Personel'}</div>
        </div>
        <div class="flex gap1">
          <button class="btn sec btn-xs" onclick="showModal('editUser','${u.id}')">✏️</button>
          ${u.id!==S.user?.id?`<button class="btn danger btn-xs" onclick="confirmDelUser('${u.id}')">🗑️</button>`:''}
        </div>
      </div>
    </div>`).join('')}
    <button class="btn sec btn-sm" onclick="showModal('addUser')">+ Kullanıcı Ekle</button>
  </div>
</div>`;
}

// ── LOGIN ─────────────────────────────────────────────────────
function loginHTML(){
  return`<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <span class="lio">◈</span>
      <div class="serif" style="font-size:26px;margin-bottom:4px">Deri Sevkiyat</div>
      <p style="color:var(--ink-faint);font-size:14px">Fabrika Yönetim Sistemi</p>
    </div>
    <div id="lerr" style="display:none;color:var(--red);font-size:13px;margin-bottom:10px;padding:8px 12px;background:var(--red-soft);border-radius:6px"></div>
    <div class="igrp"><label class="ilabel">Kullanıcı Adı</label>
      <input class="inp" id="lu" placeholder="kullanici" autocomplete="username" onkeyup="if(event.key==='Enter')doLogin()">
    </div>
    <div class="igrp"><label class="ilabel">Şifre</label>
      <input type="password" class="inp" id="lp" placeholder="••••••" autocomplete="current-password" onkeyup="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn mt2" onclick="doLogin()">Giriş Yap →</button>

  </div>
</div>`;
}

// ── MODAL ─────────────────────────────────────────────────────
function modalH(){
  const m=S.modal;if(!m) return'';
  let body='';
  if(m.type==='confirm'){
    body=`<h2>${m.title||'Onay'}</h2>
<p style="color:var(--ink-soft);margin-bottom:18px">${m.message}</p>
<div class="flex gap2"><button class="btn sec" onclick="closeModal()">İptal</button>
<button class="btn danger" onclick="doConfirm()">${m.clabel||'Sil'}</button></div>`;
  }else if(m.type==='ok'){
    body=`<div style="text-align:center;padding:12px 0">
<div style="font-size:48px">${m.icon||'✅'}</div>
<h2 style="margin:10px 0">${m.title}</h2>
<p style="color:var(--ink-soft)">${m.message||''}</p>
<button class="btn gold mt3" onclick="doOk()">${m.btn||'Tamam'}</button>
</div>`;
  }else if(m.type==='addCust'||m.type==='editCust'){
    const c=m.data||{};
    body=`<h2>${m.type==='addCust'?'➕ Müşteri Ekle':'✏️ Müşteri Düzenle'}</h2>
<div class="igrp"><label class="ilabel">Ad *</label><input class="inp" id="mc-n" value="${esc(c.name||'')}"></div>
<div class="igrp"><label class="ilabel">E-posta</label><input class="inp" id="mc-e" value="${esc(c.email||'')}" type="email"></div>
<div class="igrp"><label class="ilabel">Telefon</label><input class="inp" id="mc-p" value="${esc(c.phone||'')}"></div>
<div class="flex gap2"><button class="btn sec" onclick="closeModal()">İptal</button><button class="btn" onclick="saveCust('${c.id||''}')">Kaydet</button></div>`;
  }else if(m.type==='addUser'||m.type==='editUser'){
    const u=m.data||{};
    body=`<h2>${m.type==='addUser'?'➕ Kullanıcı Ekle':'✏️ Düzenle'}</h2>
<div class="igrp"><label class="ilabel">Ad Soyad *</label><input class="inp" id="mu-n" value="${esc(u.name||'')}"></div>
<div class="igrp"><label class="ilabel">Kullanıcı Adı *</label><input class="inp" id="mu-u" value="${esc(u.username||'')}"></div>
<div class="igrp"><label class="ilabel">${m.type==='editUser'?'Şifre (boş=değişmez)':'Şifre *'}</label><input type="password" class="inp" id="mu-p"></div>
<div class="igrp"><label class="ilabel">Rol</label>
  <select class="inp" id="mu-r"><option value="personnel"${u.role==='personnel'?' selected':''}>Personel</option><option value="admin"${u.role==='admin'?' selected':''}>Yönetici</option></select>
</div>
<div class="flex gap2"><button class="btn sec" onclick="closeModal()">İptal</button><button class="btn" onclick="saveUser('${u.id||''}')">Kaydet</button></div>`;
  }else if(m.type==='editFis'){
    const f=m.data,i=m.idx;
    const qOpts=['A','A2','ECO','ECO2','B','C'].map(k=>`<option${f.kalite===k?' selected':''}>${k}</option>`).join('');
    body=`<h2>Fişi Düzenle / Onayla</h2>
${f.foto?`<img src="${f.foto}" class="photo-prev" alt="fiş">`:''}
${f.durum==='hata'?`<div class="warn-box">❌ OCR hatası: ${esc(f.hata||'')} — lütfen alanları manuel doldurun.</div>`:''}
<div class="irow">
  <div class="igrp"><label class="ilabel">Cins</label><input class="inp" id="ef-c" value="${esc(f.cins||'')}"></div>
  <div class="igrp"><label class="ilabel">Renk</label><input class="inp" id="ef-r" value="${esc(f.renk||'')}"></div>
</div>
<div class="irow">
  <div class="igrp"><label class="ilabel">Kalite</label><select class="inp" id="ef-k">${qOpts}</select></div>
  <div class="igrp"><label class="ilabel">Deri Adedi</label><input type="number" class="inp mono" id="ef-a" value="${f.deriAdedi||''}"></div>
</div>
<div class="irow">
  <div class="igrp"><label class="ilabel">dm² (Desi)</label><input type="number" step="0.1" class="inp mono" id="ef-d" value="${f.toplamYuzeyDm2||''}" oninput="autoFt2()"></div>
  <div class="igrp"><label class="ilabel">ft²</label><input type="number" step="0.01" class="inp mono" id="ef-f" value="${f.toplamYuzeyFt2||''}"></div>
</div>
<div class="irow">
  <div class="igrp"><label class="ilabel">Ürün Kodu</label><input class="inp mono" id="ef-kod" value="${esc(f.kod||'')}"></div>
  <div class="igrp"><label class="ilabel">Seri No</label><input class="inp mono" id="ef-s" value="${esc(f.seriNo||'')}"></div>
</div>
<div class="flex gap2 mt2">
  <button class="btn danger btn-sm" onclick="deleteFis(${i})">🗑️ Sil</button>
  <button class="btn sec" onclick="closeModal()">İptal</button>
  <button class="btn green" onclick="saveFis(${i})">✓ Onayla</button>
</div>`;
  }

  return`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="mhandle"></div>${body}</div></div>`;
}

// ── ACTIONS ───────────────────────────────────────────────────
function doLogin(){
  const u=document.getElementById('lu')?.value?.trim();
  const p=document.getElementById('lp')?.value;
  const user=S.users.find(x=>x.username===u&&x.password===p);
  if(!user){
    const el=document.getElementById('lerr');
    el.textContent='Kullanıcı adı veya şifre hatalı';el.style.display='block';return;
  }
  S.user=user;S.view='dashboard';render();
}

function logout(){S.user=null;S.view='login';S.form=null;render()}

function go(v){
  if(v==='newShip'&&!S.form) initForm();
  else if(v==='newShip'&&S.form?.id) initForm(); // reset if editing someone else's
  S.view=v;render();window.scrollTo(0,0);
}

async function onCam(file){
  if(!file||S.view!=='newShip'||!S.form) return;
  if(!DB.apiKey()){toast('⚠ Ayarlar sayfasından Claude API anahtarını girin!',3500);return}
  const foto=await toBase64(file);
  const fis={id:uid(),foto,durum:'beklemede',kaynak:'claude',
    cins:'',renk:'',kod:'',kalite:'',seriNo:'',barkod:'',
    deriAdedi:0,toplamYuzeyDm2:null,toplamYuzeyFt2:null,
    birim:'dm2',yuzeyOlcumleri:[],hata:null};
  S.form.fisler.push(fis);
  document.getElementById('cam-input').value='';
  render();
  processQueue();
}

function addManual(){
  if(!S.form) return;
  const fis={id:uid(),foto:null,durum:'hazir',kaynak:'manuel',
    cins:'',renk:'',kod:'',kalite:'A',seriNo:'',barkod:'',
    deriAdedi:0,toplamYuzeyDm2:null,toplamYuzeyFt2:null,
    birim:'dm2',yuzeyOlcumleri:[],hata:null};
  const idx=S.form.fisler.length;
  S.form.fisler.push(fis);
  S.modal={type:'editFis',data:{...fis},idx};
  render();
}

function editFis(idx){
  if(!S.form?.fisler[idx]) return;
  const f=S.form.fisler[idx];
  if(f.durum==='isleniyor'||f.durum==='beklemede'){toast('İşleniyor, lütfen bekleyin...');return}
  S.modal={type:'editFis',data:{...f},idx};render();
}

function autoFt2(){
  const dm2=parseFloat(document.getElementById('ef-d')?.value);
  const ft2El=document.getElementById('ef-f');
  if(dm2&&ft2El&&!parseFloat(ft2El.value)) ft2El.value=(dm2/9.2903).toFixed(2);
}

function saveFis(idx){
  const f=S.form?.fisler[idx];if(!f) return;
  f.cins=(document.getElementById('ef-c')?.value||'').toUpperCase().trim();
  f.renk=(document.getElementById('ef-r')?.value||'').toUpperCase().trim();
  f.kalite=(document.getElementById('ef-k')?.value||'').toUpperCase().trim();
  f.deriAdedi=parseInt(document.getElementById('ef-a')?.value)||0;
  f.toplamYuzeyDm2=parseFloat(document.getElementById('ef-d')?.value)||null;
  f.toplamYuzeyFt2=parseFloat(document.getElementById('ef-f')?.value)||null;
  f.kod=(document.getElementById('ef-kod')?.value||'').trim();
  f.seriNo=(document.getElementById('ef-s')?.value||'').trim();
  if(f.toplamYuzeyDm2&&!f.toplamYuzeyFt2) f.toplamYuzeyFt2=parseFloat((f.toplamYuzeyDm2/9.2903).toFixed(2));
  if(f.toplamYuzeyFt2&&!f.toplamYuzeyDm2) f.toplamYuzeyDm2=parseFloat((f.toplamYuzeyFt2*9.2903).toFixed(1));
  f.durum='onayli';f.hata=null;
  S.modal=null;render();
}

function deleteFis(idx){
  if(S.form?.fisler) S.form.fisler.splice(idx,1);
  S.modal=null;render();
}

function saveShip(){
  syncForm();
  if(!S.form) return;
  const hazir=(S.form.fisler||[]).filter(f=>f.durum==='hazir'||f.durum==='onayli');
  if(!hazir.length){toast('Hazır fiş yok');return}
  const isEdit=!!S.form.id;
  const id=isEdit?S.form.id:uid();
  const ship={...S.form,id,updatedAt:new Date().toISOString()};
  if(!isEdit) ship.createdAt=new Date().toISOString();
  if(isEdit){const i=S.ships.findIndex(s=>s.id===id);if(i>=0)S.ships[i]=ship}
  else S.ships.push(ship);
  persist();loadAll();
  window._afterOk=()=>{S.curShip=S.ships.find(s=>s.id===id);S.view='detail';S.form=null;render()};
  S.modal={type:'ok',icon:'✅',title:'Kaydedildi!',message:`${ship.shipmentNo} — ${hazir.length} fiş`,btn:'Görüntüle'};
  render();
}

function openShip(id){S.curShip=S.ships.find(s=>s.id===id);S.view='detail';render();window.scrollTo(0,0)}

function editShip(id){
  const s=S.ships.find(x=>x.id===id);if(!s)return;
  initForm(s);S.view='newShip';render();window.scrollTo(0,0);
}

function confirmDelShip(id){
  S.modal={type:'confirm',title:'🗑️ Sevkiyatı Sil',message:'Bu sevkiyat tamamen silinecek. Geri alınamaz!',clabel:'Evet, Sil',
    onConfirm(){S.ships=S.ships.filter(s=>s.id!==id);persist();loadAll();S.view='dashboard';S.form=null;render()}};render();
}
function confirmDelCust(id){
  const c=S.customers.find(x=>x.id===id);
  S.modal={type:'confirm',title:'Müşteri Sil',message:`"${c?.name||''}" silinsin mi?`,
    onConfirm(){S.customers=S.customers.filter(x=>x.id!==id);persist();S.modal=null;render()}};render();
}
function confirmDelUser(id){
  S.modal={type:'confirm',title:'Kullanıcı Sil',message:'Bu kullanıcı silinsin mi?',
    onConfirm(){S.users=S.users.filter(x=>x.id!==id);persist();S.modal=null;render()}};render();
}
function confirmReset(){
  S.modal={type:'confirm',title:'⚠️ TÜM GEÇMİŞİ SİL',message:'Tüm sevkiyatlar silinecek! GERİ ALINAMAZ!',clabel:'🗑️ Sil',
    onConfirm(){S.ships=[];DB.s('sevNo',1000);persist();loadAll();S.view='dashboard';render()}};render();
}

function showModal(type,id){
  if(type==='addCust') S.modal={type:'addCust'};
  else if(type==='editCust'){const c=S.customers.find(x=>x.id===id);S.modal={type:'editCust',data:{...c}}}
  else if(type==='addUser') S.modal={type:'addUser'};
  else if(type==='editUser'){const u=S.users.find(x=>x.id===id);S.modal={type:'editUser',data:{...u}}}
  render();
}

function closeModal(){const cb=window._afterOk;window._afterOk=null;S.modal=null;if(cb)cb();else render()}
function doConfirm(){const cb=S.modal?.onConfirm;S.modal=null;if(cb)cb();else render()}
function doOk(){const cb=window._afterOk;window._afterOk=null;S.modal=null;if(cb)cb();else render()}

function saveCust(id){
  const name=document.getElementById('mc-n')?.value?.trim();
  if(!name){toast('Ad zorunlu');return}
  const email=document.getElementById('mc-e')?.value?.trim();
  const phone=document.getElementById('mc-p')?.value?.trim();
  if(id){const i=S.customers.findIndex(c=>c.id===id);if(i>=0)S.customers[i]={...S.customers[i],name,email,phone}}
  else S.customers.push({id:uid(),name,email,phone});
  persist();S.modal=null;render();
}

function saveUser(id){
  const name=document.getElementById('mu-n')?.value?.trim();
  const username=document.getElementById('mu-u')?.value?.trim();
  const pass=document.getElementById('mu-p')?.value;
  const role=document.getElementById('mu-r')?.value;
  if(!name||!username){toast('Ad ve kullanıcı adı zorunlu');return}
  if(!id&&!pass){toast('Şifre zorunlu');return}
  if(id){const i=S.users.findIndex(u=>u.id===id);if(i>=0){S.users[i]={...S.users[i],name,username,role};if(pass)S.users[i].password=pass}}
  else S.users.push({id:uid(),name,username,password:pass,role});
  persist();S.modal=null;render();
}

async function testKey(){
  const k=document.getElementById('sak')?.value?.trim();
  const el=document.getElementById('key-res');
  if(!k){el.textContent='⚠ Anahtar girin';el.style.color='var(--amber)';return}
  el.textContent='⏳ Test ediliyor...';el.style.color='var(--ink-soft)';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:5,messages:[{role:'user',content:'hi'}]})
    });
    if(r.ok){el.textContent='✅ Claude API çalışıyor — anahtar geçerli!';el.style.color='var(--green)'}
    else{const d=await r.json();el.textContent='❌ '+((d.error?.message)||r.status);el.style.color='var(--red)'}
  }catch(e){el.textContent='❌ '+e.message;el.style.color='var(--red)'}
}

function saveKey(){
  const k=document.getElementById('sak')?.value?.trim();
  if(!k){toast('Anahtar boş olamaz');return}
  DB.s('claudeKey',k);toast('✓ API anahtarı kaydedildi');
}

function saveEmail(){
  const emails=(document.getElementById('se')?.value||'').split('\n').map(e=>e.trim()).filter(Boolean);
  const freq=document.getElementById('sf')?.value||'weekly';
  const enabled=document.getElementById('sen')?.checked||false;
  DB.s('emailCfg',{emails,freq,enabled});toast('✓ E-posta ayarları kaydedildi');
}

// ── START ─────────────────────────────────────────────────────
boot();
</script>
</body>
</html>
