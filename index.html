<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deri Sevkiyat Yönetimi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0ece8;color:#2c1810;min-height:100vh}

/* HEADER */
.hdr{background:linear-gradient(135deg,#3d1f0d,#6b3a1f);color:#fff;padding:13px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.hdr h1{font-size:17px;font-weight:700;letter-spacing:.3px;display:flex;align-items:center;gap:8px}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-user{font-size:12px;opacity:.85;display:flex;align-items:center;gap:6px}
.role-badge{background:rgba(255,255,255,.2);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}

/* LAYOUT */
.wrap{max-width:860px;margin:0 auto;padding:18px 16px}

/* NAV */
.nav{display:flex;gap:4px;background:#fff;border-radius:12px;padding:5px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.07);overflow-x:auto;flex-shrink:0}
.nav::-webkit-scrollbar{display:none}
.ntab{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:#6b4c3b;white-space:nowrap;border:none;background:none;transition:all .18s}
.ntab.on{background:#6b3a1f;color:#fff}
.ntab:hover:not(.on){background:#f5ede8}

/* CARDS */
.card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:15px;font-weight:600;color:#3d1f0d}

/* BUTTONS */
.btn{padding:9px 18px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn-primary{background:#6b3a1f;color:#fff}
.btn-primary:hover{background:#5a3019}
.btn-success{background:#2d7d5a;color:#fff}
.btn-success:hover{background:#236448}
.btn-danger{background:#c0392b;color:#fff}
.btn-danger:hover{background:#a93226}
.btn-warn{background:#d68910;color:#fff}
.btn-warn:hover{background:#b7770d}
.btn-sec{background:#7f8c8d;color:#fff}
.btn-sec:hover{background:#6c7a7d}
.btn-out{background:transparent;border:1.5px solid #6b3a1f;color:#6b3a1f}
.btn-out:hover{background:#6b3a1f;color:#fff}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:6px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:5px}
.btn-blk{width:100%;justify-content:center}
.btn-icon{padding:6px 8px;border-radius:7px}

/* FORMS */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:#5a3a2a;text-transform:uppercase;letter-spacing:.3px}
.fc{width:100%;padding:9px 12px;border:1.5px solid #e0d5cc;border-radius:8px;font-size:13px;outline:none;transition:border-color .18s;background:#fff;color:#2c1810}
.fc:focus{border-color:#6b3a1f;box-shadow:0 0 0 3px rgba(107,58,31,.12)}
select.fc{cursor:pointer}
textarea.fc{resize:vertical}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.scard{background:#fff;border-radius:10px;padding:14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.scard .num{font-size:26px;font-weight:800;color:#6b3a1f}
.scard .lbl{font-size:11px;color:#9a7060;margin-top:3px}
.scard.eco{border-top:3px solid #27ae60}
.scard.eco .num{color:#1e8449}

/* SHIPMENT LIST */
.sev-item{border:1.5px solid #e8ddd8;border-radius:10px;padding:14px;margin-bottom:9px;cursor:pointer;transition:all .18s;background:#fff}
.sev-item:hover{border-color:#6b3a1f;transform:translateY(-1px);box-shadow:0 4px 14px rgba(107,58,31,.12)}
.sev-no{font-weight:800;color:#6b3a1f;font-size:16px}
.sev-info{display:flex;gap:14px;flex-wrap:wrap;margin-top:7px}
.sev-info span{font-size:12px;color:#7a5a4a}
.sev-types{margin-top:7px;display:flex;flex-wrap:wrap;gap:4px}
.type-chip{padding:2px 9px;background:#f5ede8;border-radius:10px;font-size:11px;color:#6b3a1f;font-weight:500}

/* BADGES */
.badge{padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700}
.b-ok{background:#d5f5e3;color:#1a7a40}
.b-warn{background:#fdebd0;color:#9a5b0a}
.b-info{background:#d6eaf8;color:#1a5276}
.b-eco{background:#d5f5e3;color:#1a7a40;border:1px solid #a9dfbf}
.b-danger{background:#fadbd8;color:#a93226}

/* TYPE GROUP */
.tg{border:1.5px solid #e8ddd8;border-radius:10px;margin-bottom:10px;overflow:hidden}
.tg-hd{padding:12px 16px;background:#faf6f3;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .15s}
.tg-hd:hover{background:#f5ede8}
.tg-title{font-weight:700;font-size:14px;color:#3d1f0d}
.tg-stats{display:flex;gap:8px;align-items:center}
.tg-body{padding:0 16px 16px;border-top:1px solid #e8ddd8;display:none}
.tg-body.open{display:block}

/* ECO SUMMARY */
.eco-box{background:linear-gradient(135deg,#eafaf1,#d5f5e3);border:2px solid #27ae60;border-radius:12px;padding:14px;margin-bottom:14px}
.eco-box h3{color:#1a7a40;font-size:13px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.eco-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px}
.eco-tile{background:#fff;border-radius:8px;padding:10px;text-align:center;border:1px solid #a9dfbf}
.eco-tile .ev{font-size:20px;font-weight:800;color:#1e8449}
.eco-tile .el{font-size:11px;color:#4a7a5a;margin-top:2px}

/* PHOTO */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-top:10px}
.photo-wrap{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;border:2px solid #e8ddd8}
.photo-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.photo-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}

/* TABLES */
.tbl{width:100%;border-collapse:collapse}
.tbl th{background:#faf6f3;padding:9px 12px;text-align:left;font-size:12px;font-weight:700;color:#6b4c3b;border-bottom:2px solid #e8ddd8;text-transform:uppercase;letter-spacing:.3px}
.tbl td{padding:9px 12px;border-bottom:1px solid #f5ede8;font-size:13px}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#faf8f6}
.tbl tfoot td{background:#faf6f3;font-weight:700;color:#3d1f0d}

/* MEASUREMENT INPUTS */
.m-row{display:grid;grid-template-columns:1fr 1fr 1fr 32px;gap:6px;align-items:center;margin-bottom:6px}
.m-row .fc{padding:7px 10px;font-size:12px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:14px;padding:22px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h3{font-size:17px;font-weight:700;margin-bottom:16px;color:#3d1f0d}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

/* ALERTS */
.alert{padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:13px}
.alert-err{background:#fadbd8;color:#922b21;border:1px solid #f1948a}
.alert-ok{background:#d5f5e3;color:#1a5e33;border:1px solid #82e0aa}
.alert-info{background:#d6eaf8;color:#1a4a7a;border:1px solid #85c1e9}

/* LOGIN */
.login-bg{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#3d1f0d,#6b3a1f,#8b5e3c)}
.login-card{background:#fff;border-radius:16px;padding:36px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:22px}
.login-logo .icon{font-size:42px;display:block;margin-bottom:8px}
.login-logo h2{font-size:20px;font-weight:800;color:#3d1f0d}
.login-logo p{font-size:13px;color:#9a7060;margin-top:4px}
.login-hint{margin-top:14px;padding:10px;background:#faf6f3;border-radius:8px;font-size:11px;color:#9a7060;text-align:center;line-height:1.7}

/* SEARCH */
.srch{position:relative;margin-bottom:14px}
.srch input{padding-left:34px}
.srch-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#b0907a;font-size:14px;pointer-events:none}

/* DANGER ZONE */
.danger-zone{border:2px solid #c0392b;border-radius:10px;padding:14px}
.danger-zone h4{color:#c0392b;margin-bottom:6px}

/* STICKY SAVE */
.sticky-save{position:sticky;bottom:0;background:#fff;border-top:1.5px solid #e8ddd8;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;gap:10px;z-index:100;border-radius:0 0 12px 12px;box-shadow:0 -4px 12px rgba(0,0,0,.08)}

/* UTILS */
.flex{display:flex}.items-c{align-items:center}.justify-b{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}
.fw{font-weight:600}.fw8{font-weight:800}.tc{text-align:center}.muted{color:#9a7060;font-size:12px}
.mb1{margin-bottom:6px}.mb2{margin-bottom:10px}.mb3{margin-bottom:14px}.mt2{margin-top:8px}.mt3{margin-top:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.txt-ok{color:#1e8449}.txt-err{color:#c0392b}
.divider{border:none;border-top:1px solid #e8ddd8;margin:12px 0}
.sec-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#9a7060;margin-bottom:8px}
.empty{text-align:center;padding:36px;color:#b0907a}
.empty-ico{font-size:40px;display:block;margin-bottom:10px}
.chip-eco{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;background:#d5f5e3;border-radius:8px;font-size:11px;font-weight:700;color:#1a7a40}
.hidden{display:none!important}

/* Photo enlarged */
.photo-big{max-width:100%;max-height:72vh;border-radius:8px;display:block;margin:0 auto}

@media(max-width:600px){
  .wrap{padding:12px 10px}
  .grid2{grid-template-columns:1fr}
  .m-row{grid-template-columns:1fr 1fr 1fr 28px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .sev-info{gap:8px}
}
@media print{.hdr,.nav,.btn,.sticky-save{display:none!important}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════
//  DATABASE (localStorage)
// ═══════════════════════════════════════════════════════
const DB = {
  get(k){try{return JSON.parse(localStorage.getItem('dys_'+k))}catch{return null}},
  set(k,v){localStorage.setItem('dys_'+k,JSON.stringify(v))},
  init(){
    if(this.get('ok')) return;
    this.set('users',[
      {id:'u1',name:'Yönetici',username:'admin',password:'admin123',role:'admin'},
      {id:'u2',name:'Personel 1',username:'personel',password:'123456',role:'personnel'}
    ]);
    this.set('customers',[
      {id:'c1',name:'ABC Deri Firması',email:'abc@example.com',phone:'0532 111 2233'},
      {id:'c2',name:'XYZ Tabakhane',email:'xyz@example.com',phone:'0533 444 5566'}
    ]);
    this.set('shipments',[]);
    this.set('sevNo',1000);
    this.set('email',{emails:[],frequency:'weekly',enabled:false,lastSent:null});
    this.set('ok',true);
  },
  nextNo(){
    const n=(this.get('sevNo')||1000)+1;
    this.set('sevNo',n);
    return 'SEV-'+String(n).padStart(4,'0');
  }
};

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let S = {
  view:'login', user:null,
  shipments:[], customers:[], users:[], email:{},
  curShip:null, q:'',
  modal:null
};

let F = {}; // form state

function boot(){
  DB.init(); loadAll(); render();
}

function loadAll(){
  S.shipments = DB.get('shipments')||[];
  S.customers = DB.get('customers')||[];
  S.users     = DB.get('users')||[];
  S.email     = DB.get('email')||{emails:[],frequency:'weekly',enabled:false};
}

function save(){
  DB.set('shipments',S.shipments);
  DB.set('customers',S.customers);
  DB.set('users',S.users);
  DB.set('email',S.email);
}

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
function uid(){return 'i'+Math.random().toString(36).slice(2,9)+Date.now().toString(36)}
function today(){return new Date().toISOString().slice(0,10)}
function fmtDate(d){if(!d)return'-';try{return new Date(d+'T12:00:00').toLocaleDateString('tr-TR')}catch{return d}}
function custName(id){return S.customers.find(c=>c.id===id)?.name||'Bilinmiyor'}
function userName(id){return S.users.find(u=>u.id===id)?.name||'Bilinmiyor'}
function itemArea(item){return (item.measurements||[]).reduce((s,m)=>s+(parseFloat(m.area)||0),0)}
function totalPcs(ship){return (ship.items||[]).reduce((s,i)=>s+(i.measurements||[]).length,0)}
function totalArea(ship){return (ship.items||[]).reduce((s,i)=>s+itemArea(i),0)}
function ecoPcs(ship){return (ship.items||[]).filter(i=>i.quality==='ECO').reduce((s,i)=>s+(i.measurements||[]).length,0)}
function leatherTypes(ship){return [...new Set((ship.items||[]).map(i=>i.type))]}
function groupByType(items){
  const g={};
  (items||[]).forEach(i=>{if(!g[i.type])g[i.type]=[];g[i.type].push(i)});
  return g;
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function v(id){return document.getElementById(id)?.value?.trim()||''}
function vc(id){return document.getElementById(id)?.checked||false}

const TYPES=['Dana','Koyun','Keçi','Deve','At','Timsah','Devekuşu','Yılan','Diğer'];
const QUALS=['Normal','A Kalite','B Kalite','ECO'];

// ═══════════════════════════════════════════════════════
//  RENDER ENGINE
// ═══════════════════════════════════════════════════════
function render(){
  const app=document.getElementById('app');
  if(S.view==='login'){app.innerHTML=loginHTML();return}
  app.innerHTML=`${hdrHTML()}
<div class="wrap">
  ${navHTML()}
  ${viewHTML()}
</div>
${S.modal?modalHTML():''}`;
}

function hdrHTML(){
  return `<div class="hdr">
    <h1>🐄 Deri Sevkiyat</h1>
    <div class="hdr-right">
      <div class="hdr-user">
        <span>${esc(S.user?.name)}</span>
        <span class="role-badge">${S.user?.role==='admin'?'YÖNETİCİ':'PERSONEL'}</span>
      </div>
      <button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:#fff" onclick="logout()">Çıkış</button>
    </div>
  </div>`;
}

function navHTML(){
  const tabs=[
    {id:'dash',l:'📦 Sevkiyatlar'},
    {id:'newSev',l:'➕ Yeni Sevkiyat'},
    {id:'customers',l:'👥 Müşteriler'},
  ];
  if(S.user?.role==='admin'){
    tabs.push({id:'reports',l:'📊 Raporlar'});
    tabs.push({id:'settings',l:'⚙️ Ayarlar'});
  }
  return `<div class="nav">${tabs.map(t=>`<button class="ntab${S.view===t.id?' on':''}" onclick="setView('${t.id}')">${t.l}</button>`).join('')}</div>`;
}

function viewHTML(){
  switch(S.view){
    case 'dash': return dashHTML();
    case 'newSev': return formHTML();
    case 'detail': return detailHTML();
    case 'customers': return customersHTML();
    case 'reports': return reportsHTML();
    case 'settings': return settingsHTML();
    default: return dashHTML();
  }
}

// ═══════════════════════════════════════════════════════
//  LOGIN
// ═══════════════════════════════════════════════════════
function loginHTML(){
  return `<div class="login-bg">
    <div class="login-card">
      <div class="login-logo">
        <span class="icon">🐄</span>
        <h2>Deri Sevkiyat</h2>
        <p>Yönetim Sistemi</p>
      </div>
      <div id="lerr" class="hidden"></div>
      <div class="fg"><label>Kullanıcı Adı</label>
        <input class="fc" id="lu" placeholder="kullanici" onkeyup="if(event.key==='Enter')doLogin()">
      </div>
      <div class="fg"><label>Şifre</label>
        <input type="password" class="fc" id="lp" placeholder="••••••" onkeyup="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn btn-primary btn-blk mt3" onclick="doLogin()">Giriş Yap →</button>
      <div class="login-hint">
        <strong>Yönetici:</strong> admin / admin123<br>
        <strong>Personel:</strong> personel / 123456
      </div>
    </div>
  </div>`;
}

function doLogin(){
  const u=v('lu'), p=v('lp');
  const user=S.users.find(x=>x.username===u&&x.password===p);
  const el=document.getElementById('lerr');
  if(!user){
    el.className='alert alert-err';
    el.textContent='Kullanıcı adı veya şifre hatalı!';
    return;
  }
  S.user=user; S.view='dash'; render();
}

function logout(){S.user=null;S.view='login';render()}

// ═══════════════════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════════════════
function dashHTML(){
  const all=S.shipments;
  const totPcs=all.reduce((s,x)=>s+totalPcs(x),0);
  const totArea=all.reduce((s,x)=>s+totalArea(x),0).toFixed(1);
  const totEco=all.reduce((s,x)=>s+ecoPcs(x),0);

  let list=[...all].reverse();
  if(S.q){
    const q=S.q.toLowerCase();
    list=list.filter(s=>s.shipmentNo?.toLowerCase().includes(q)||custName(s.customerId).toLowerCase().includes(q));
  }

  return `
<div class="stats">
  <div class="scard"><div class="num">${all.length}</div><div class="lbl">Sevkiyat</div></div>
  <div class="scard"><div class="num">${totPcs}</div><div class="lbl">Toplam Adet</div></div>
  <div class="scard"><div class="num">${totArea}</div><div class="lbl">Toplam m²</div></div>
  <div class="scard eco"><div class="num">${totEco}</div><div class="lbl">ECO Adet</div></div>
</div>
<div class="srch">
  <span class="srch-ico">🔍</span>
  <input class="fc" placeholder="Sevkiyat no veya müşteri ara..." value="${esc(S.q)}" oninput="S.q=this.value;render()" style="padding-left:34px">
</div>
${list.length===0?`<div class="empty"><span class="empty-ico">📦</span><p>Henüz sevkiyat yok</p>
<button class="btn btn-primary mt3" onclick="setView('newSev')">+ Yeni Sevkiyat Ekle</button></div>`:''}
${list.map(s=>sevCardHTML(s)).join('')}`;
}

function sevCardHTML(s){
  const pcs=totalPcs(s), area=totalArea(s).toFixed(1), eco=ecoPcs(s);
  const types=leatherTypes(s);
  return `<div class="sev-item" onclick="openShip('${s.id}')">
    <div class="flex items-c justify-b">
      <span class="sev-no">${esc(s.shipmentNo)}</span>
      <div class="flex gap-2">
        ${eco>0?'<span class="chip-eco">♻️ ECO</span>':''}
        <span class="badge b-ok">Kayıtlı</span>
      </div>
    </div>
    <div class="sev-info">
      <span>👤 ${esc(custName(s.customerId))}</span>
      <span>📅 ${fmtDate(s.date)}</span>
      <span>🔢 ${pcs} adet</span>
      <span>📐 ${area} m²</span>
      ${s.photos?.length?`<span>📷 ${s.photos.length} fotoğraf</span>`:''}
    </div>
    ${types.length?`<div class="sev-types">${types.map(t=>`<span class="type-chip">${esc(t)}</span>`).join('')}</div>`:''}
  </div>`;
}

// ═══════════════════════════════════════════════════════
//  SHIPMENT FORM (New / Edit)
// ═══════════════════════════════════════════════════════
function initForm(ship=null){
  if(ship){
    F=JSON.parse(JSON.stringify(ship));
  } else {
    F={
      id:null,
      shipmentNo:DB.nextNo(),
      customerId:S.customers[0]?.id||'',
      date:today(),
      notes:'',
      photos:[],
      items:[],
      createdBy:S.user?.id,
      createdAt:new Date().toISOString()
    };
  }
}

function formHTML(){
  if(!F.shipmentNo) initForm();
  const isEdit=!!F.id;
  const custOpts=S.customers.map(c=>`<option value="${c.id}"${F.customerId===c.id?' selected':''}>${esc(c.name)}</option>`).join('');

  return `

function mrowHTML(iid,m,mi){
  return `<div class="m-row" id="mr-${iid}-${mi}">
    <input type="number" class="fc" value="${m.width||''}" min="0" step="0.1" placeholder="En"
      oninput="updMeas('${iid}',${mi},'width',parseFloat(this.value)||0);calcArea('${iid}',${mi})">
    <input type="number" class="fc" value="${m.length||''}" min="0" step="0.1" placeholder="Boy"
      oninput="updMeas('${iid}',${mi},'length',parseFloat(this.value)||0);calcArea('${iid}',${mi})">
    <input type="number" class="fc" id="a-${iid}-${mi}" value="${m.area||''}" min="0" step="0.0001" placeholder="m²"
      oninput="updMeas('${iid}',${mi},'area',parseFloat(this.value)||0)" style="background:#faf6f3">
    <button class="btn btn-danger btn-icon btn-xs" onclick="removeMeas('${iid}',${mi})">✕</button>
  </div>`;
}

function formSummaryHTML(){
  const groups={};
  F.items.forEach(it=>{
    if(!groups[it.type])groups[it.type]={pcs:0,area:0,ecoPcs:0,ecoArea:0};
    const p=(it.measurements||[]).length, a=itemArea(it);
    groups[it.type].pcs+=p; groups[it.type].area+=a;
    if(it.quality==='ECO'){groups[it.type].ecoPcs+=p;groups[it.type].ecoArea+=a}
  });
  const ecoItems=F.items.filter(i=>i.quality==='ECO');
  const totEcoPcs=ecoItems.reduce((s,i)=>s+(i.measurements||[]).length,0);
  const totEcoArea=ecoItems.reduce((s,i)=>s+itemArea(i),0);

  return `<div class="card">
  <div class="card-title mb3">📊 Sevkiyat Özeti</div>
  ${totEcoPcs>0?`<div class="eco-box mb3">
    <h3>♻️ ECO Kalite Toplamı</h3>
    <div class="eco-grid">
      <div class="eco-tile"><div class="ev">${totEcoPcs}</div><div class="el">Adet</div></div>
      <div class="eco-tile"><div class="ev">${totEcoArea.toFixed(2)}</div><div class="el">m²</div></div>
    </div>
  </div>`:''}
  <table class="tbl">
    <thead><tr><th>Cins</th><th>Adet</th><th>Alan (m²)</th><th>ECO</th></tr></thead>
    <tbody>
      ${Object.entries(groups).map(([t,g])=>`<tr>
        <td class="fw">${esc(t)}</td>
        <td>${g.pcs}</td>
        <td>${g.area.toFixed(2)}</td>
        <td>${g.ecoPcs>0?`<span class="chip-eco">${g.ecoPcs}</span>`:'-'}</td>

  </table>
</div>`;
}

function reportsHTML(){
  const all=S.shipments;
  const now=new Date();
  const last30=all.filter(s=>(now-new Date(s.date))/(864e5)<=30);
  const byCustomer={}, byType={};

  all.forEach(s=>{
    const cn=custName(s.customerId);
    if(!byCustomer[cn])byCustomer[cn]={count:0,pcs:0,area:0};
    byCustomer[cn].count++;byCustomer[cn].pcs+=totalPcs(s);byCustomer[cn].area+=totalArea(s);
    (s.items||[]).forEach(it=>{
      if(!byType[it.type])byType[it.type]={pcs:0,area:0,ecoPcs:0};
      const p=(it.measurements||[]).length, a=itemArea(it);
      byType[it.type].pcs+=p; byType[it.type].area+=a;
      if(it.quality==='ECO')byType[it.type].ecoPcs+=p;
    });
  });

  return `
<div class="card">
  <div class="card-title mb3">📊 Genel Rapor</div>
  <div class="stats">
    <div class="scard"><div class="num">${all.length}</div><div class="lbl">Toplam Sevkiyat</div></div>
    <div class="scard"><div class="num">${last30.length}</div><div class="lbl">Son 30 Gün</div></div>
    <div class="scard"><div class="num">${all.reduce((s,x)=>s+totalPcs(x),0)}</div><div class="lbl">Toplam Adet</div></div>
    <div class="scard eco"><div class="num">${all.reduce((s,x)=>s+ecoPcs(x),0)}</div><div class="lbl">ECO Toplam</div></div>
  </div>
</div>

<div class="card">
  <div class="card-title mb3">👥 Müşteri Bazlı Özet</div>
  ${Object.keys(byCustomer).length===0?`<p class="muted tc">Veri yok.</p>`:`<table class="tbl">
    <thead><tr><th>Müşteri</th><th>Sevkiyat</th><th>Adet</th><th>Alan (m²)</th></tr></thead>
    <tbody>${Object.entries(byCustomer).sort((a,b)=>b[1].count-a[1].count).map(([n,d])=>`<tr>
      <td class="fw">${esc(n)}</td><td>${d.count}</td><td>${d.pcs}</td><td>${d.area.toFixed(2)}</td>

</div>

  <div class="card-title mb3">🐄 Cins Bazlı Özet</div>

    <tbody>${Object.entries(byType).sort((a,b)=>b[1].pcs-a[1].pcs).map(([t,d])=>`<tr>
      <td class="fw">${esc(t)}</td><td>${d.pcs}</td><td>${d.area.toFixed(2)}</td>
      <td>${d.ecoPcs>0?`<span class="chip-eco">${d.ecoPcs}</span>`:'-'}</td>
    </tr>`).join('')}</tbody>
  </table>`}
</div>

<div class="card danger-zone">
  <h4>⚠️ Geçmiş Sıfırlama</h4>

}

  <button class="btn btn-danger" onclick="m_confirm()">🗑️ ${m.confirmLabel||'Onayla'}</button>
</div>`;
  } else if(m.type==='ok'){
    inner=`<div class="tc" style="padding:10px 0">
<div style="font-size:48px">${m.icon||'✅'}</div>
<h3 style="margin:12px 0">${m.title||'Başarılı'}</h3>
<p style="color:#555">${m.message||''}</p>
<button class="btn btn-primary mt3" onclick="m_ok()">${m.btnLabel||'Tamam'}</button>
</div>`;
  } else if(m.type==='addCust'||m.type==='editCust'){
    const c=m.data||{};
    inner=`<h3>${m.type==='addCust'?'➕ Müşteri Ekle':'✏️ Müşteri Düzenle'}</h3>
<div class="fg"><label>Müşteri Adı *</label><input class="fc" id="mc-name" value="${esc(c.name||'')}"></div>
<div class="fg"><label>E-posta</label><input class="fc" id="mc-email" value="${esc(c.email||'')}" type="email"></div>
<div class="fg"><label>Telefon</label><input class="fc" id="mc-phone" value="${esc(c.phone||'')}"></div>
<div class="modal-acts">
  <button class="btn btn-sec" onclick="closeModal()">İptal</button>
  <button class="btn btn-primary" onclick="saveCust('${c.id||''}')">Kaydet</button>
</div>`;
  } else if(m.type==='addUser'||m.type==='editUser'){
    const u=m.data||{};
    inner=`<h3>${m.type==='addUser'?'➕ Kullanıcı Ekle':'✏️ Kullanıcı Düzenle'}</h3>
<div class="fg"><label>Ad Soyad *</label><input class="fc" id="mu-name" value="${esc(u.name||'')}"></div>
<div class="fg"><label>Kullanıcı Adı *</label><input class="fc" id="mu-uname" value="${esc(u.username||'')}"></div>
<div class="fg"><label>${m.type==='editUser'?'Yeni Şifre (boş=değişmez)':'Şifre *'}</label>
  <input type="password" class="fc" id="mu-pass">
</div>
<div class="fg"><label>Rol</label>
  <select class="fc" id="mu-role">
    <option value="personnel"${u.role==='personnel'?' selected':''}>Personel</option>
    <option value="admin"${u.role==='admin'?' selected':''}>Yönetici</option>
  </select>
</div>
<div class="modal-acts">
  <button class="btn btn-sec" onclick="closeModal()">İptal</button>
  <button class="btn btn-primary" onclick="saveUser('${u.id||''}')">Kaydet</button>
</div>`;
  } else if(m.type==='photo'){
    inner=`<img src="${m.src}" class="photo-big" alt="Fotoğraf">
<div class="modal-acts"><button class="btn btn-sec" onclick="closeModal()">Kapat</button></div>`;
  } else if(m.type==='email-preview'){
    inner=`<h3>📧 E-posta Önizleme</h3>
<div style="background:#faf6f3;border-radius:8px;padding:14px;font-size:13px;line-height:1.7">${m.content||''}</div>
<div class="modal-acts"><button class="btn btn-sec" onclick="closeModal()">Kapat</button></div>`;
  }

  return `<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${inner}</div></div>`;
}

// ═══════════════════════════════════════════════════════
//  FORM ACTIONS
// ═══════════════════════════════════════════════════════
function addItem(){
  // read current form values before adding
  readFormNotes();
  F.items.push({id:uid(),type:'Dana',quality:'Normal',measurements:[]});
  reRenderItems();
}

function removeItem(iid){
  F.items=F.items.filter(i=>i.id!==iid);
  reRenderItems();
}

function updItem(iid,key,val){
  const it=F.items.find(i=>i.id===iid);
  if(it)it[key]=val;
}

function addMeas(iid){
  const it=F.items.find(i=>i.id===iid);
  if(!it)return;
  it.measurements.push({width:0,length:0,area:0});
  reRenderItems();
}

function removeMeas(iid,mi){
  const it=F.items.find(i=>i.id===iid);
  if(!it)return;
  it.measurements.splice(mi,1);
  reRenderItems();
}

function updMeas(iid,mi,key,val){
  const it=F.items.find(i=>i.id===iid);
  if(it&&it.measurements[mi])it.measurements[mi][key]=val;
}

function calcArea(iid,mi){
  const it=F.items.find(i=>i.id===iid);
  if(!it||!it.measurements[mi])return;
  const m=it.measurements[mi];
  if(m.width>0&&m.length>0){
    m.area=parseFloat(((m.width*m.length)/10000).toFixed(4));
    const el=document.getElementById(`a-${iid}-${mi}`);
    if(el)el.value=m.area;
  }
}

function reRenderItems(){
  const wrap=document.getElementById('items-wrap');
  if(wrap)wrap.innerHTML=F.items.map((it,idx)=>itemFormHTML(it,idx)).join('');
}

function readFormNotes(){
  const n=document.getElementById('f-notes');
  if(n)F.notes=n.value;
  const d=document.getElementById('f-date');
  if(d)F.date=d.value;
  const c=document.getElementById('f-cust');
  if(c)F.customerId=c.value;
}

function addPhotos(input){
  const files=Array.from(input.files);
  files.forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{F.photos.push(e.target.result);render()};
    r.readAsDataURL(f);
  });
  input.value='';
}

function removePhoto(i){
  F.photos.splice(i,1);
  render();
}

function viewPhoto(idx){
  if(F.photos[idx])openPhoto(idx,'form');
}

function saveShip(){
  readFormNotes();
  if(!F.customerId&&S.customers.length>0)F.customerId=S.customers[0].id;
  if(!F.customerId){alert('Lütfen bir müşteri seçin!');return}

  const isEdit=!!F.id;
  const savedId=isEdit?F.id:uid();

  if(!isEdit){
    F.id=savedId;
    S.shipments.push({...F,items:JSON.parse(JSON.stringify(F.items)),photos:[...F.photos]});
  } else {
    const idx=S.shipments.findIndex(s=>s.id===F.id);
    if(idx>=0){
      S.shipments[idx]={...F,items:JSON.parse(JSON.stringify(F.items)),photos:[...F.photos],updatedAt:new Date().toISOString()};
    }
  }
  save();
  loadAll();
  triggerEmailLog();

  window._afterOk=()=>{
    S.curShip=S.shipments.find(x=>x.id===savedId);
    S.view='detail';
    render();
  };
  S.modal={
    type:'ok',
    icon:'✅',
    title:isEdit?'Güncellendi!':'Kaydedildi!',
    message:`Sevkiyat <strong>${esc(F.shipmentNo)}</strong> başarıyla ${isEdit?'güncellendi':'kaydedildi'}.`,
    btnLabel:'Sevkiyatı Görüntüle'
  };
  render();
}

function triggerEmailLog(){
  const es=S.email;
  if(!es.enabled||!es.emails?.length)return;
  const now=new Date();
  const content=buildEmailContent();
  // Store as pending log (in real app, backend would send)
  const logs=DB.get('emailLogs')||[];
  logs.push({ts:now.toISOString(),to:es.emails,frequency:es.frequency,content});
  if(logs.length>50)logs.shift();
  DB.set('emailLogs',logs);
  console.log('📧 Email rapor kuyruğa alındı:',es.emails);
}

function buildEmailContent(){
  const all=S.shipments;
  const totPcsAll=all.reduce((s,x)=>s+totalPcs(x),0);
  const totAreaAll=all.reduce((s,x)=>s+totalArea(x),0);
  const totEcoAll=all.reduce((s,x)=>s+ecoPcs(x),0);
  return `Toplam ${all.length} sevkiyat · ${totPcsAll} adet · ${totAreaAll.toFixed(2)} m² · ${totEcoAll} ECO adet`;
}

function confirmDelete(id){
  S.modal={
    type:'confirm',
    title:'🗑️ Sevkiyatı Sil',
    message:'Bu sevkiyatı silmek istediğinizden emin misiniz? Bu işlem geri alınamaz.',
    confirmLabel:'Evet, Sil',
    onConfirm:()=>{
      S.shipments=S.shipments.filter(s=>s.id!==id);
      save(); loadAll();
      S.curShip=null; S.view='dash'; render();
    }
  };
  render();
}

function confirmDeleteCust(id){
  const c=S.customers.find(x=>x.id===id);
  S.modal={
    type:'confirm',
    title:'🗑️ Müşteriyi Sil',
    message:`"${c?.name||''}" müşterisini silmek istiyor musunuz?`,
    confirmLabel:'Evet, Sil',
    onConfirm:()=>{S.customers=S.customers.filter(x=>x.id!==id);save();loadAll();render()}
  };
  render();
}

function confirmDeleteUser(id){
  const u=S.users.find(x=>x.id===id);
  S.modal={
    type:'confirm',
    title:'🗑️ Kullanıcıyı Sil',
    message:`"${u?.name||''}" kullanıcısını silmek istiyor musunuz?`,
    confirmLabel:'Evet, Sil',
    onConfirm:()=>{S.users=S.users.filter(x=>x.id!==id);save();loadAll();render()}
  };
  render();
}

function confirmReset(){
  S.modal={
    type:'confirm',
    title:'⚠️ TÜM GEÇMİŞİ SİL',
    message:'Tüm sevkiyat geçmişi silinecek! Bu işlem GERİ ALINAMAZ. Devam etmek istediğinizden kesinlikle emin misiniz?',
    confirmLabel:'🗑️ Evet, Her Şeyi Sil',
    onConfirm:()=>{
      S.shipments=[]; DB.set('sevNo',1000);
      save(); loadAll(); S.view='dash'; render();
    }
  };
  render();
}

function m_confirm(){
  if(S.modal?.onConfirm)S.modal.onConfirm();
  S.modal=null;
}

function m_ok(){
  const cb=window._afterOk;
  window._afterOk=null;
  S.modal=null;
  if(cb)cb(); else render();
}

function closeModal(){
  const cb=window._afterOk;
  window._afterOk=null;
  S.modal=null;
  if(cb)cb(); else render();
}

// ─── MODAL SHOW ───────────────────────────────────────
function showModal(type,id){
  if(type==='addCust'){S.modal={type:'addCust'}}
  else if(type==='editCust'){const c=S.customers.find(x=>x.id===id);S.modal={type:'editCust',data:{...c}}}
  else if(type==='addUser'){S.modal={type:'addUser'}}
  else if(type==='editUser'){const u=S.users.find(x=>x.id===id);S.modal={type:'editUser',data:{...u}}}
  render();
}

function saveCust(id){
  const name=v('mc-name');
  if(!name){alert('Müşteri adı zorunludur!');return}
  const email=v('mc-email'), phone=v('mc-phone');
  if(id){
    const idx=S.customers.findIndex(c=>c.id===id);
    if(idx>=0)S.customers[idx]={...S.customers[idx],name,email,phone};
  } else {
    S.customers.push({id:uid(),name,email,phone});
  }
  save(); S.modal=null; render();
}

function saveUser(id){
  const name=v('mu-name'), uname=v('mu-uname'), pass=v('mu-pass'), role=document.getElementById('mu-role')?.value;
  if(!name||!uname){alert('Ad ve kullanıcı adı zorunludur!');return}
  if(!id&&!pass){alert('Yeni kullanıcı için şifre zorunludur!');return}
  if(id){
    const idx=S.users.findIndex(u=>u.id===id);
    if(idx>=0){
      S.users[idx]={...S.users[idx],name,username:uname,role};
      if(pass)S.users[idx].password=pass;
    }
  } else {
    S.users.push({id:uid(),name,username:uname,password:pass,role});
  }
  save(); S.modal=null; render();
}

function saveEmailSettings(){
  const emails=(document.getElementById('s-emails')?.value||'').split('\n').map(e=>e.trim()).filter(Boolean);
  const frequency=document.getElementById('s-freq')?.value||'weekly';
  const enabled=vc('s-enabled');
  S.email={...S.email,emails,frequency,enabled};
  save();
  S.modal={type:'ok',title:'Ayarlar Kaydedildi!',message:`${emails.length} e-posta adresi, ${frequency==='daily'?'günlük':frequency==='weekly'?'haftalık':'aylık'} rapor için kaydedildi.`};
  render();
}

// ─── NAVIGATION ────────────────────────────────────────
function setView(view){
  if(view==='newSev')initForm();
  S.view=view; S.q='';
  render(); scrollTo(0,0);
}

function openShip(id){
  const s=S.shipments.find(x=>x.id===id);
  if(!s)return;
  S.curShip=s; S.view='detail'; render(); scrollTo(0,0);
}

function editShip(id){
  const s=S.shipments.find(x=>x.id===id);
  if(!s)return;
  initForm(s); S.view='newSev'; render(); scrollTo(0,0);
}

function toggleTG(id){
  const el=document.getElementById(id);
  const arr=document.getElementById('arr-'+id);
  if(!el)return;
  el.classList.toggle('open');
  if(arr)arr.textContent=el.classList.contains('open')?'▲':'▼';
}

function openPhoto(idx,src){
  const photos=src==='form'?F.photos:(S.curShip?.photos||[]);
  if(photos[idx])S.modal={type:'photo',src:photos[idx]};
  render();
}

// ═══════════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════════
boot();
</script>
