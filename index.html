<script>
// ============================================================
// DERİ SEVKİYAT PWA — Firebase destekli, çok kullanıcılı
// ============================================================

// ====== FİREBASE BAŞLATMA ======
firebase.initializeApp({
  apiKey: "AIzaSyAzzg3zjIL2VbwptzPhVj8sViNCj8yef7M",
  authDomain: "deri-sevkiyat-3b516.firebaseapp.com",
  projectId: "deri-sevkiyat-3b516",
  storageBucket: "deri-sevkiyat-3b516.firebasestorage.app",
  messagingSenderId: "75650825316",
  appId: "1:75650825316:web:7472b08a31d851c2043371"
});
const db   = firebase.firestore();
const auth = firebase.auth();

// ====== UYGULAMA DURUMU ======
const state = {
  ekran: 'giris',
  ekranGecmisi: [],
  kullanici: null,
  profil: null,
  musteriler: [],
  sevkiyatlar: [],
  aktifMusteri: null,
  aktifSevkiyatDetay: null,
  aktifFisler: [],
  aktifFisIdx: null,
  tesseractWorker: null,
  oturumNo: null,
  yoneticiSekme: 'bugun',
  yoneticiSevkiyatlar: [],
  unsubscribeFn: null,
};

// Ekran değiştirme — geçmişe ekle
function ekranGit(yeniEkran) {
  if (state.ekran && state.ekran !== yeniEkran) {
    state.ekranGecmisi.push(state.ekran);
    if (state.ekranGecmisi.length > 20) state.ekranGecmisi.shift();
  }
  state.ekran = yeniEkran;
  render();
}
function geriDon() {
  if (state.ekranGecmisi.length > 0) {
    state.ekran = state.ekranGecmisi.pop();
  } else {
    state.ekran = state.profil?.rol === 'YONETICI' ? 'yonetici' : 'musteri-listesi';
  }
  render();
}
function kullaniciAdiGoster(email) {
  if (!email) return '?';
  return email.replace(/@deri\.app$/i, '').replace(/@.*$/, '');
}

// ====== KALICI SAKLAMA ======
// Storage: Claude.ai artifact'ta window.storage, diğer ortamlarda (Netlify vb.) localStorage
const Storage = {
  // window.storage var mı? (Claude.ai artifact ortamı)
  _ws: typeof window !== 'undefined' && window.storage && typeof window.storage.set === 'function',
  _PFX: 'ds_',  // localStorage prefix — çakışmaları önler

  async set(key, value) {
    try {
      const v = typeof value === 'string' ? value : JSON.stringify(value);
      if (this._ws) {
        await window.storage.set(key, v);
      } else {
        localStorage.setItem(this._PFX + key, v);
      }
      return true;
    } catch (e) { console.error('Storage.set:', e); return false; }
  },

  async get(key) {
    try {
      if (this._ws) {
        const r = await window.storage.get(key);
        if (!r) return null;
        try { return JSON.parse(r.value); } catch { return r.value; }
      } else {
        const v = localStorage.getItem(this._PFX + key);
        if (v === null) return null;
        try { return JSON.parse(v); } catch { return v; }
      }
    } catch { return null; }
  },

  async delete(key) {
    try {
      if (this._ws) { await window.storage.delete(key); }
      else { localStorage.removeItem(this._PFX + key); }
      return true;
    } catch { return false; }
  },

  async list(prefix) {
    try {
      if (this._ws) {
        const r = await window.storage.list(prefix);
        return r?.keys || [];
      } else {
        const keys = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith(this._PFX + prefix)) {
            keys.push(k.slice(this._PFX.length));
          }
        }
        return keys;
      }
    } catch { return []; }
  },

  async nextId(type) {
    const k = `counter:${type}`;
    const cur = (await this.get(k)) ?? 0;
    const next = (typeof cur === 'number' ? cur : parseInt(cur) || 0) + 1;
    await this.set(k, next);
    return next;
  }
};

// ====== CLAUDE VISION OCR (PRIMARY) ======
async function claudeOcr(imageDataUrl) {
  const match = imageDataUrl.match(/^data:image\/([\w+]+);base64,(.+)$/);
  if (!match) throw new Error('Geçersiz görsel');
  let mediaType = `image/${match[1]}`;
  if (mediaType === 'image/jpg') mediaType = 'image/jpeg';
  const base64Data = match[2];

  // API key: önce storage'dan oku, yoksa artifact ortamını dene (key'siz)
  const apiKey = await Storage.get('app:claudeApiKey');

  const headers = { "Content-Type": "application/json" };
  if (apiKey) {
    // Kullanıcının kendi API key'i ile doğrudan tarayıcı erişimi
    headers['x-api-key'] = apiKey;

  }
  // apiKey yoksa artifact ortamında otomatik yetkilendirme denenecek

  const prompt = `Bu bir Türk deri fabrikası sevkiyat etiketidir. Fotoğraf kıvrımlı veya bozuk bile olsa tüm alanları oku. Etiketteki TÜM bilgileri tam ve doğru biçimde çıkar. YALNIZCA JSON döndür, başka hiçbir şey yazma:

{

  "toplamYuzeyFt2": <ondalık veya null>,
  "toplamYuzeyDm2": <ondalık veya null>,
  "ortalamaAlanFt2": <ondalık veya null>,
  "ortalamaAlanDm2": <ondalık veya null>,
  "birim": "dm2 veya ft2 — tablodaki değerlerin birimi. 50'den büyükse dm2, küçükse ft2",
  "yuzeyOlcumleri": [
    {"grupNo": <G.N. sütunundaki sayı, 1 veya 6 gibi — bu ölçüm DEĞİL sıra no>, "sira": <satırdaki kaçıncı>, "deger": <ölçüm değeri>}
  ]
}`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers,
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1500,
      messages: [{
        role: "user",
        content: [
          { type: "image", source: { type: "base64", media_type: mediaType, data: base64Data } },
          { type: "text", text: prompt }
        ]
      }]
    })
  });

  if (!response.ok) {
    const errText = await response.text();
    throw new Error(`Claude API: ${response.status} ${errText.substring(0, 100)}`);
  }

  const data = await response.json();
  const text = data.content.map(c => c.type === 'text' ? c.text : '').join('').trim();
  const temizText = text.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/\s*```$/i, '').trim();
  return JSON.parse(temizText);
}

function claudeJsonToInternal(json) {
  const alan = (v, guven = 0.95) => ({
    deger: (v === null || v === undefined) ? '' : v,
    guven: (v === null || v === undefined || v === '') ? 0 : guven,
    ham: '', duzeltildi: false
  });
  const sayiAlan = (v, guven = 0.95) => ({
    deger: (v === null || v === undefined) ? null : v,
    guven: (v === null || v === undefined) ? 0 : guven,
    ham: '', duzeltildi: false
  });

  return {
    cins: alan(json.cins),
    renk: alan(json.renk),
    kod: alan(json.kod),
    kalite: alan(json.kalite),
    seriNo: alan(json.seriNo),
    barkod: alan(json.barkod),
    deriAdedi: { deger: json.deriAdedi || 0, guven: json.deriAdedi ? 0.95 : 0 },
    toplamYuzeyDm2: sayiAlan(json.toplamYuzeyDm2),
    toplamYuzeyFt2: { deger: json.toplamYuzeyFt2 || 0, guven: json.toplamYuzeyFt2 ? 0.95 : 0 },
    ortalamaAlanDm2: sayiAlan(json.ortalamaAlanDm2),
    ortalamaAlanFt2: sayiAlan(json.ortalamaAlanFt2),
    yuzeyDegerleri: (json.yuzeyOlcumleri || []).map(y => ({
      grupNo: y.grupNo || 1,
      sira: y.sira || 1,
      deger: y.deger
    })),
    birim: json.birim || 'ft2',
    dogrulamaUyarilari: [],
    genelGuven: 0.95
  };
}

function dogrula(veri) {
  const uyarilar = [];
  const olcumToplami = veri.yuzeyDegerleri.reduce((s, y) => s + (y.deger || 0), 0);
  const beklenenToplam = veri.birim === 'dm2'
    ? (veri.toplamYuzeyDm2.deger || 0)
    : veri.toplamYuzeyFt2.deger;

  if (beklenenToplam > 0 && Math.abs(olcumToplami - beklenenToplam) > beklenenToplam * 0.02) {
    uyarilar.push(`Yüzey toplamı (${olcumToplami.toFixed(2)}) ≠ Toplam (${beklenenToplam})`);
  }
  if (veri.deriAdedi.deger > 0 && veri.yuzeyDegerleri.length !== veri.deriAdedi.deger) {
    uyarilar.push(`Ölçüm sayısı (${veri.yuzeyDegerleri.length}) ≠ Deri Adedi (${veri.deriAdedi.deger})`);
  }
  // ft²'yi dm²'den hesapla eğer eksikse
  if (!veri.toplamYuzeyFt2.deger && veri.toplamYuzeyDm2.deger) {
    veri.toplamYuzeyFt2.deger = veri.toplamYuzeyDm2.deger / 9.2903;
    veri.toplamYuzeyFt2.guven = 0.9;
  }
  veri.dogrulamaUyarilari = uyarilar;
  return veri;
}

// ====== GÖRSEL ÖN İŞLEME (Tesseract yedek için) ======
async function gorseliIsle(imageDataUrl) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const minBoyut = 1800;
      const olcek = img.width < minBoyut ? minBoyut / img.width : 1;
      canvas.width = Math.round(img.width * olcek);
      canvas.height = Math.round(img.height * olcek);
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      const w = canvas.width, h = canvas.height;

      // Gri tonlama
      for (let i = 0; i < data.length; i += 4) {
        const gray = Math.round(0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2]);
        data[i] = data[i+1] = data[i+2] = gray;
      }

      // Integral image
      const integral = new Float64Array(w * h);
      for (let y = 0; y < h; y++) {
        let satir = 0;
        for (let x = 0; x < w; x++) {
          const idx = y * w + x;
          satir += data[idx * 4];
          integral[idx] = (y > 0 ? integral[idx - w] : 0) + satir;
        }
      }

      // Bradley adaptive threshold
      const pencere = Math.max(10, Math.floor(Math.min(w, h) / 80));
      const t = 0.15;
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const idx = y * w + x;
          const x1 = Math.max(0, x - pencere);
          const x2 = Math.min(w - 1, x + pencere);
          const y1 = Math.max(0, y - pencere);
          const y2 = Math.min(h - 1, y + pencere);
          const sayi = (x2 - x1 + 1) * (y2 - y1 + 1);
          let toplam = integral[y2 * w + x2];
          if (y1 > 0) toplam -= integral[(y1 - 1) * w + x2];
          if (x1 > 0) toplam -= integral[y2 * w + (x1 - 1)];
          if (y1 > 0 && x1 > 0) toplam += integral[(y1 - 1) * w + (x1 - 1)];
          const piksel = data[idx * 4];
          const yeniDeger = (piksel * sayi < toplam * (1 - t)) ? 0 : 255;
          data[idx * 4] = data[idx * 4 + 1] = data[idx * 4 + 2] = yeniDeger;
        }
      }

      ctx.putImageData(imageData, 0, 0);
      resolve(canvas.toDataURL('image/png'));
    };
    img.src = imageDataUrl;
  });
}

// ====== TESSERACT YEDEK OCR ======
async function tesseractOcr(imageData) {
  if (!state.tesseractWorker) {
    state.tesseractWorker = await Tesseract.createWorker('tur', 1);
    await state.tesseractWorker.setParameters({
      tessedit_pageseg_mode: '6',
      preserve_interword_spaces: '1',
    });
  }
  const islenmis = await gorseliIsle(imageData);
  const { data: { text } } = await state.tesseractWorker.recognize(islenmis);
  return { text, islenmisGorsel: islenmis };
}

// ====== FİŞ PARSER — Google Vision çıktısına göre optimize edilmiş ======
// Google Vision özellikleri:
//  - "Cins DLP RUGAN" (kolon olmayabilir)  ← etiket bazlı çıkartma
//  - "Toplam Yuzey :\n1065 dm2 114.75 ft2" ← değer sonraki satırda olabilir
//  - Yüzey tablosunda her değer ayrı satırda ← hepsi toplanıp boyuta göre gruplandır
const FisParser = {
  alan(d, g)    { return { deger: d || '', guven: d ? g : 0, ham: d || '', duzeltildi: false }; },
  sayiAlan(d,g) { return { deger: d ?? null, guven: (d !== null && d !== undefined) ? g : 0, ham: String(d||''), duzeltildi: false }; },

  ayrist(metin) {
    const satirlar = metin.split('\n').map(s => s.trim()).filter(s => s.length > 0);

    const seriNo = this.seriNoCikar(satirlar);

    // Seri no'dan önceki satırlar = başlık bölgesi
    let seriIdx = satirlar.findIndex(s => /T\s*\d\s*N\b/i.test(s) || /N\.\s*0{3,}/i.test(s));
    if (seriIdx < 0) seriIdx = Math.min(10, satirlar.length);
    const baslik = satirlar.slice(0, seriIdx);

    // Bilinen etiket anahtar kelimeleri — bunlarla başlayan satırlar alan-değer çiftidir
    const ETIKET = [/^[Cc]ins/i, /^[Rr]enk/i, /^[Kk]od/i, /^[Kk]alit/i, /^[Tt]arih/i];

    const degerler = baslik
      .filter(s => ETIKET.some(r => r.test(s)))
      .map(s => {
        const ki = s.indexOf(':');
        const ni = s.search(/\s+\./);
        if (ki > 0) {
          // "Cins :DLP RUGAN" veya "Kod :5221"
          return s.substring(ki + 1).trim().replace(/^[.\s]+/, '').replace(/\s{2,}/g, ' ').trim() || null;
        }
        if (ni > 0) {
          return s.substring(ni).replace(/^\s*\.\s*/, '').trim() || null;
        }
        // "Cins DLP RUGAN" — kolonlar yok, ilk kelime etiket, geri kalanı değer
        const k = s.trim().split(/\s+/);
        return k.length >= 2 ? k.slice(1).join(' ').trim() : null;
      });

    const [cinsV, renkV, kodV, kaliteV] = degerler;
    const kaliteTz = (kaliteV || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
    const kaliteOk = ['A','A2','ECO','ECO2','B','C'].includes(kaliteTz);

    const cins   = this.alan(cinsV,  cinsV  ? 0.92 : 0);
    const renk   = this.alan(renkV,  renkV  ? 0.92 : 0);
    const kod    = this.alan(kodV,   kodV   ? 0.88 : 0);
    const kalite = this.alan(kaliteOk ? kaliteTz : (kaliteV||''), kaliteOk ? 0.95 : (kaliteV ? 0.5 : 0));

    const barkod    = this.barkodCikar(satirlar);
    const deriAdedi = this.deriAdediCikar(satirlar);
    const { dm2: toplamDm2, ft2: toplamFt2 } = this.toplamYuzeyCikar(satirlar);
    const { dm2: ortDm2,    ft2: ortFt2    } = this.ortalamaAlanCikar(satirlar);

    const birim  = toplamDm2.deger ? 'dm2' : 'ft2';
    const yuzeyler = this.yuzeyTablosuCikar(satirlar, birim, deriAdedi.deger);

    let ft2Final = toplamFt2.deger;
    if (!ft2Final && toplamDm2.deger) ft2Final = parseFloat((toplamDm2.deger / 9.2903).toFixed(2));

    const uyarilar = [];
    const olcumToplam = yuzeyler.reduce((s,y) => s + y.deger, 0);
    const beklenen   = birim === 'dm2' ? (toplamDm2.deger || 0) : (ft2Final || 0);
    if (beklenen > 0 && Math.abs(olcumToplam - beklenen) > beklenen * 0.03) {
      uyarilar.push(`Yüzey toplamı (${olcumToplam.toFixed(0)}) ≠ Toplam (${beklenen}) — bazı değerler OCR'da kaybolmuş veya fazla okunmuş olabilir`);
    }
    if (deriAdedi.deger > 0 && yuzeyler.length > 0 && yuzeyler.length !== deriAdedi.deger) {
      uyarilar.push(`Ölçüm sayısı (${yuzeyler.length}) ≠ Deri Adedi (${deriAdedi.deger})`);
    }

    const gArr = [cins.guven, renk.guven, seriNo.guven, deriAdedi.guven, Math.max(toplamFt2.guven, toplamDm2.guven)];
    const genelGuven = gArr.reduce((a,b) => a+b, 0) / gArr.length;

    return {
      cins, renk, kod, kalite, seriNo, barkod, deriAdedi,
      toplamYuzeyDm2: toplamDm2,
      toplamYuzeyFt2: { ...toplamFt2, deger: ft2Final },
      ortalamaAlanDm2: ortDm2, ortalamaAlanFt2: ortFt2,
      yuzeyDegerleri: yuzeyler, birim,
      dogrulamaUyarilari: uyarilar, genelGuven
    };
  },

  seriNoCikar(satirlar) {
    for (const s of satirlar) {
      const m = s.match(/T\s*\d\s*N[.,]?\s*([\d\s]{5,15})/i);
      if (m) {
        const d = m[1].replace(/\D/g,'').padStart(9,'0');
        return { deger: d, guven: 0.93, ham: s, duzeltildi: false };
      }
      const m2 = s.match(/N\.\s*(0{3,}\d+)/i);
      if (m2) return { deger: m2[1], guven: 0.88, ham: s, duzeltildi: false };
    }
    return { deger: '', guven: 0, ham: '', duzeltildi: false };
  },

  barkodCikar(satirlar) {
    for (const s of satirlar) {
      const t = s.replace(/[^0-9]/g,'');
      const m = t.match(/(\d{10,14})/);
      if (m) return { deger: m[1], guven: 0.85, ham: s, duzeltildi: false };
    }
    return { deger: '', guven: 0, ham: '', duzeltildi: false };
  },

  deriAdediCikar(satirlar) {
    for (const s of satirlar) {
      if (/adedi?|aded/i.test(s)) {
        const m  = s.match(/:\s*(\d+)/);
        if (m) return { deger: parseInt(m[1]),  guven: 0.92, ham: s, duzeltildi: false };
        const m2 = s.match(/\s(\d+)\s*$/);
        if (m2) return { deger: parseInt(m2[1]), guven: 0.85, ham: s, duzeltildi: false };
      }
    }
    return { deger: 0, guven: 0, ham: '', duzeltildi: false };
  },

  ft2Bul(satir) {
    let m = satir.match(/([\d]+[.,]?[\d]*)\s*(?:ft[2²]|FT2)/i);
    if (m) return parseFloat(m[1].replace(',','.'));
    m = satir.match(/([\d]+[.,][\d]+)\s*t[2²]/i);
    if (m) return parseFloat(m[1].replace(',','.'));
    const dm = satir.match(/([\d.]+)\s*dm[2²]/i);
    if (dm) {
      const rest = satir.slice(satir.indexOf(dm[0]) + dm[0].length);
      const n = rest.match(/([\d]+[.,][\d]+)/);
      if (n) return parseFloat(n[1].replace(',','.'));
    }
    return null;
  },

  // "Toplam Yuzey :" ve rakamlar sonraki satırda olabilir
  toplamYuzeyCikar(satirlar) {
    for (let i = 0; i < satirlar.length; i++) {
      const s = satirlar[i];
      if (/topl/i.test(s) && !/ortal/i.test(s)) {
        const etkin = /\d/.test(s) ? s : (s + ' ' + (satirlar[i+1]||''));
        const dm2M  = etkin.match(/([\d]+[.,]?[\d]*)\s*dm[2²]/i);
        const dm2   = dm2M ? parseFloat(dm2M[1].replace(',','.')) : null;
        const ft2   = this.ft2Bul(etkin);
        return {
          dm2: this.sayiAlan(dm2, 0.92),
          ft2: { deger: ft2||0, guven: ft2 ? 0.92 : 0, ham: etkin, duzeltildi: false }
        };
      }
    }
    return { dm2: this.sayiAlan(null,0), ft2: { deger:0, guven:0, ham:'', duzeltildi:false } };
  },

  ortalamaAlanCikar(satirlar) {
    for (let i = 0; i < satirlar.length; i++) {
      const s = satirlar[i];
      if (/ortal/i.test(s)) {
        const etkin = /\d/.test(s) ? s : (s + ' ' + (satirlar[i+1]||''));
        const dm2M  = etkin.match(/([\d]+[.,]?[\d]*)\s*dm[2²]/i);
        const ft2M  = etkin.match(/([\d]+[.,][\d]+)\s*ft[2²]/i);
        const dm2   = dm2M ? parseFloat(dm2M[1].replace(',','.')) : null;
        const ft2   = ft2M ? parseFloat(ft2M[1].replace(',','.')) : null;
        return { dm2: this.sayiAlan(dm2,0.88), ft2: this.sayiAlan(ft2,0.88) };
      }
    }
    return { dm2: this.sayiAlan(null,0), ft2: this.sayiAlan(null,0) };
  },

  yuzeyTablosuCikar(satirlar, birim, deriAdedi) {
    // G.N. sırası: 1, 6, 11, 16... (her satırda max 5 deri)
    // G.N. tespiti için MIN threshold değil, SIRALAMA kullan
    // Bu sayede küçük ölçüm değerleri (ör: 25 dm²) yanlışlıkla G.N. sayılmaz

    const MAX = birim === 'dm2' ? 3000 : 300;
    let ici = false;
    const tumSayilar = [];

    for (const s of satirlar) {
      const lc = s.toLowerCase().replace(/\s/g,'');
      if (lc.includes('yuzey') && !lc.includes('toplam') && !lc.includes('ortal')) { ici = true; continue; }
      if (/deri|toplam|ortal/i.test(s)) { ici = false; continue; }
      if (!ici) continue;

      s.split(/\s+/)
        .map(t => parseFloat(t.replace(/[^0-9.,]/g,'').replace(',','.')))
        .filter(n => !isNaN(n) && n > 0)
        .forEach(n => tumSayilar.push(n));
    }

    const sonuc = [];
    let gnNo = null, sira = 0;
    let beklenecekGN = 1;  // İlk G.N. her zaman 1'dir

    for (const n of tumSayilar) {
      // G.N. tespiti: beklenen sıradaki değer mi? (1, 6, 11, 16...)
      if (Number.isInteger(n) && n === beklenecekGN) {
        gnNo = n;
        sira = 0;
        beklenecekGN = n + 5;  // Sonraki G.N. +5 olmalı
      } else if (gnNo !== null && n > 0 && n <= MAX) {
        sira++;
        sonuc.push({ grupNo: gnNo, sira, deger: n });
      }
    }

    // Eğer deri adedi biliniyorsa ve sayı tutmuyorsa düzeltmeyi dene
    if (deriAdedi > 0 && sonuc.length !== deriAdedi && sonuc.length > 0) {
      // Fazla ölçüm var: muhtemelen bir G.N. değeri ölçüm sayıldı
      // Deri adedine göre kırp (son fazlalığı çıkar)
      if (sonuc.length === deriAdedi + 1) {
        // En küçük değer muhtemelen yanlış → ama kullanıcı düzeltir, dokunma
        // Sadece uyarı için bırak, kayıt engelleme logic'i dışarıda
      }
    }

    return sonuc;
  }
};

// ====== GOOGLE CLOUD VISION API (DOCUMENT_TEXT_DETECTION) ======
async function googleVisionOcr(imageDataUrl) {
  const apiKey = await Storage.get('app:googleApiKey');
  if (!apiKey) throw new Error('Google Vision API anahtarı girilmemiş');

  const match = imageDataUrl.match(/^data:image\/([\w+]+);base64,(.+)$/);
  if (!match) throw new Error('Geçersiz görsel');
  const base64Data = match[2];

  const response = await fetch(
    `https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        requests: [{
          image: { content: base64Data },
          features: [{ type: 'DOCUMENT_TEXT_DETECTION', maxResults: 1 }]
        }]
      })
    }
  );

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(`Google Vision ${response.status}: ${err.error?.message || ''}`);
  }

  const data = await response.json();
  const result = data.responses?.[0];
  if (result?.error) throw new Error(`Google Vision: ${result.error.message}`);

  const text = result?.fullTextAnnotation?.text || '';
  if (!text) throw new Error('Google Vision: metni bulamadı');
  return text;
}

- Kod alanı bazen boş olabilir`;

  const response = await fetch(
    'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + apiKey,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: istem }] }],
        generationConfig: { temperature: 0.1 }
      })
    }
  );

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(`Gemini ${response.status}: ${err.error?.message || 'bilinmeyen hata'}`);
  }

  const data = await response.json();
  const metin = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  const temiz = metin.replace(/```json\s*/gi, '').replace(/```\s*/gi, '').trim();
  return JSON.parse(temiz);
}

function aiJsonToInternal(json) {
  const a = (v, g = 0.95) => ({
    deger: (v === null || v === undefined) ? '' : String(v),
    guven: (v === null || v === undefined || v === '') ? 0 : g,
    ham: '', duzeltildi: false
  });
  return {
    cins: a(json.cins), renk: a(json.renk), kod: a(json.kod), kalite: a(json.kalite),
    seriNo: a(json.seriNo), barkod: a(json.barkod),
    deriAdedi: { deger: json.deriAdedi || 0, guven: json.deriAdedi ? 0.95 : 0, ham:'', duzeltildi: false },
    toplamYuzeyDm2: { deger: json.toplamYuzeyDm2 ?? null, guven: json.toplamYuzeyDm2 ? 0.95 : 0, ham:'', duzeltildi: false },
    toplamYuzeyFt2: { deger: json.toplamYuzeyFt2 || 0, guven: json.toplamYuzeyFt2 ? 0.95 : 0, ham:'', duzeltildi: false },
    ortalamaAlanDm2: { deger: json.ortalamaAlanDm2 ?? null, guven: json.ortalamaAlanDm2 ? 0.95 : 0, ham:'', duzeltildi: false },
    ortalamaAlanFt2: { deger: json.ortalamaAlanFt2 ?? null, guven: json.ortalamaAlanFt2 ? 0.95 : 0, ham:'', duzeltildi: false },
    yuzeyDegerleri: (json.yuzeyOlcumleri || []).map(y => ({ grupNo: y.grupNo||1, sira: y.sira||1, deger: y.deger })),
    birim: json.birim || 'dm2',
    dogrulamaUyarilari: [], genelGuven: 0.95
  };
}

  ]
}

KURAL: G.N. sütunundaki 1, 6, 11 gibi küçük sayılar grup numarasıdır, ölçüm değil.`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",

// ====== ANA OCR FONKSİYONU ======
// Akış: Claude Vision (resim → yapılandırılmış JSON) → parser yedek
async function ocrYap(imageData, onProgress) {

  // ADIM 1: Claude Vision — resmi doğrudan okur ve yorumlar
  try {
    onProgress?.('Claude Vision okuyor...', 0.4);
    const json = await claudeOcr(imageData);
    const veri = dogrula(claudeJsonToInternal(json));
    return { veri, kaynak: 'claude', hamMetin: JSON.stringify(json, null, 2) };
  } catch (e) {
    console.warn('Claude Vision:', e.message);
    toast('⚠ Claude: ' + e.message.substring(0, 60), 3000);
  }

  // ADIM 2: Google Vision (isteğe bağlı, key varsa)
  const googleKey = await Storage.get('app:googleApiKey');
  if (googleKey) {
    try {
      onProgress?.('Google Vision...', 0.3);
      const ocrText = await googleVisionOcr(imageData);
      // Google text → Claude text yorumlama
      const claudeKey2 = await Storage.get('app:claudeApiKey');
      if (claudeKey2) {
        try {
          onProgress?.('Claude yorumluyor...', 0.6);
          const json = await claudeMetinYorumla(ocrText);
          const veri = dogrula(aiJsonToInternal(json));
          return { veri, kaynak: 'google', hamMetin: ocrText };
        } catch(e2) {}
      }
      // Sadece parser ile dene
      const veri = dogrula(FisParser.ayrist(ocrText));
      veri.dogrulamaUyarilari.unshift('ℹ Claude yorumlama atlandı — parser sonucu');
      return { veri, kaynak: 'google', hamMetin: ocrText };
    } catch(e) {
      console.warn('Google Vision:', e.message);
    }
  }

  // ADIM 3: Tesseract son çare
  onProgress?.('Tesseract OCR...', 0.2);
  const { text } = await tesseractOcr(imageData);
  const veri = dogrula(FisParser.ayrist(text));
  veri.dogrulamaUyarilari.unshift('⚠ Bulut OCR başarısız — Tesseract kullanıldı');
  return { veri, kaynak: 'tesseract', hamMetin: text };
}

        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--red);text-align:center">

        <div class="confidence"><span class="conf-chip ${sinif}">%${Math.round(v.genelGuven * 100)}</span>${f.dogrulamaGerek ? ' <span style="color:var(--red);font-size:10px">Kontrol!</span>' : ''}</div>`;

    <div class="stats-strip">
      <div class="stat"><div class="value">${ist.toplam}</div><div class="label">Toplam</div></div>
      <div class="stat processing"><div class="value">${ist.isleniyor}</div><div class="label">İşleniyor</div></div>
      <div class="stat ready"><div class="value">${ist.hazir}</div><div class="label">Hazır</div></div>
      <div class="stat error"><div class="value">${ist.hatali}</div><div class="label">Hatalı</div></div>

let kuyrukAktif = false;
// ====== ÖĞRENME MEKANİZMASI — KOD MERKEZLİ ======
// Kod en güvenilir tanımlayıcı: OCR sayıları harflerden daha iyi okur
// Öğrenme yapısı: Kod → {cins, renk} eşlemesi

async function ogrenilenleriKaydet(cins, kod, renk) {
  if (!kod) return; // Kod yoksa öğrenme yapma

  const kodTemiz = kod.toUpperCase().trim();
  const harita = await Storage.get('app:kod_bilgisi') || {};

  harita[kodTemiz] = {
    cins:  (cins  || harita[kodTemiz]?.cins  || '').toUpperCase().trim(),
    renk:  (renk  || harita[kodTemiz]?.renk  || '').toUpperCase().trim(),
    sayim: (harita[kodTemiz]?.sayim || 0) + 1  // kaç kez görüldü
  };

  await Storage.set('app:kod_bilgisi', harita);
}

async function ogrenilmistenIyilestir(veri) {
  const harita = await Storage.get('app:kod_bilgisi') || {};

  const kodOku = (veri.kod.deger || '').toUpperCase().trim();

  if (kodOku && harita[kodOku]) {
    // ✅ Kod biliniyor → cins ve rengi otomatik doldur
    const bilgi = harita[kodOku];
    if (bilgi.cins && !veri.cins.deger) {
      veri.cins.deger = bilgi.cins;
      veri.cins.guven = 0.97;
    }
    if (bilgi.renk && !veri.renk.deger) {
      veri.renk.deger = bilgi.renk;
      veri.renk.guven = 0.92;
    }
    // Zaten okunanlarla çelişiyorsa düşük güven ver (fark var)
    if (bilgi.cins && veri.cins.deger && bilgi.cins !== veri.cins.deger.toUpperCase()) {
      veri.cins.guven = Math.min(veri.cins.guven, 0.6); // sarı göster
    }
    return veri;
  }

  // Kod okunamadı ama cins biliniyor → ters eşleşme dene
  const cinsOku = (veri.cins.deger || '').toUpperCase().trim();
  if (cinsOku) {
    const eslesen = Object.entries(harita)
      .filter(([_, b]) => b.cins && (b.cins.includes(cinsOku) || cinsOku.includes(b.cins)))
      .sort((a, b) => b[1].sayim - a[1].sayim); // En çok görüleni önce

    if (eslesen.length === 1) {
      // Tek eşleşme → güvenle doldur
      veri.kod.deger = eslesen[0][0];
      veri.kod.guven = 0.82;
    }
  }

  return veri;
}

// Fişin doğrulanması gereken kritik sorunları var mı?
function dogrulamaGerekiyor(veri) {
  if (!veri) return false;
  if (!veri.cins.deger || !veri.renk.deger) return true;              // Temel alan boş
  if (veri.deriAdedi.deger > 0 && veri.yuzeyDegerleri.length > 0) {
    const toplam = veri.yuzeyDegerleri.reduce((s, y) => s + y.deger, 0);
    const beklenen = veri.birim === 'dm2'
      ? (veri.toplamYuzeyDm2.deger || 0)
      : (veri.toplamYuzeyFt2.deger || 0);
    if (beklenen > 0 && Math.abs(toplam - beklenen) > beklenen * 0.03) return true; // Toplam tutmuyor
  }
  if (veri.deriAdedi.deger > 0 && veri.yuzeyDegerleri.length !== veri.deriAdedi.deger) return true;
  return false;
}

async function islemKuyruguIsle() {
  if (kuyrukAktif) return;
  const bekleyen = state.aktifFisler.find(f => f.durum === 'beklemede');
  if (!bekleyen) return;
  kuyrukAktif = true;
  bekleyen.durum = 'isleniyor';
  render();
  try {
    const sonuc = await ocrYap(bekleyen.foto);
    // Öğrenilmiş bilgilerle iyileştir
    sonuc.veri = await ogrenilmistenIyilestir(sonuc.veri);
    bekleyen.veri = sonuc.veri;
    bekleyen.hamMetin = sonuc.hamMetin;
    bekleyen.kaynak = sonuc.kaynak;
    bekleyen.islenmisGorsel = sonuc.islenmisGorsel;
    // Doğrulama gerekiyorsa özel işaret
    bekleyen.dogrulamaGerek = dogrulamaGerekiyor(sonuc.veri);
    bekleyen.durum = 'hazir';
    titret(30);
  } catch (e) {
    bekleyen.durum = 'hata';
    bekleyen.hata = e.message || 'OCR başarısız';
    toast('❌ ' + (e.message || 'OCR başarısız').substring(0, 80), 4000);
  }
  kuyrukAktif = false;
  render();
  setTimeout(islemKuyruguIsle, 100);
}

function fisDuzeltModal(fis) {
  const v = fis.veri;

  // Yüzey input grid'i
  const beklenenToplamDm2 = v.toplamYuzeyDm2.deger || 0;
  const beklenenToplamFt2 = v.toplamYuzeyFt2.deger || 0;

                     fis.kaynak === 'tesseract' ? '<span class="conf-chip med">Tesseract</span>' :

  mbg.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 style="margin:0">${fis.kaynak === 'manuel' ? 'Manuel Fiş Girişi' : 'Fişi Doğrula'}</h2>
        <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
          ${kaynakChip}
          ${fis.kaynak !== 'manuel' ? `<span class="conf-chip ${guvenChipSinifi(v.genelGuven)}">Güven %${Math.round(v.genelGuven * 100)}</span>` : ''}
        </div>
      </div>
      ${fis.foto ? `<img src="${fis.foto}" class="photo-preview">` : ''}
      ${uyarilar}
      <div class="input-group"><label class="input-label">Cins</label><input class="input ${guvenSinifi(v.cins.guven)}" id="d-cins" value="${v.cins.deger}"></div>
      <div class="input-group"><label class="input-label">Renk</label><input class="input ${guvenSinifi(v.renk.guven)}" id="d-renk" value="${v.renk.deger}"></div>
      <div class="input-group"><label class="input-label">Kod</label><input class="input mono ${guvenSinifi(v.kod.guven)}" id="d-kod" value="${v.kod.deger}"></div>
      <div class="flex gap-2">
        <div class="input-group grow"><label class="input-label">Kalite</label><input class="input mono ${guvenSinifi(v.kalite.guven)}" id="d-kalite" value="${v.kalite.deger}"></div>
        <div class="input-group grow"><label class="input-label">Deri Adedi</label><input class="input mono ${guvenSinifi(v.deriAdedi.guven)}" id="d-adet" type="number" value="${v.deriAdedi.deger || ''}" oninput="yuzeyToplamGuncelle()"></div>
      </div>
      <div class="input-group"><label class="input-label">Seri No</label><input class="input mono ${guvenSinifi(v.seriNo.guven)}" id="d-seri" value="${v.seriNo.deger}"></div>

          <div style="display:flex;gap:4px">
            <button onclick="yuzeyEkle()" class="btn secondary btn-small" style="padding:4px 10px">+ Ekle</button>
            <button onclick="yuzeyKaldir()" class="btn secondary btn-small" style="padding:4px 10px">− Çıkar</button>

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ====== YÜZEY ÖLÇÜM YARDIMCILARI ======
function yuzeyToplamGuncelle() {
  const inputs = document.querySelectorAll('[id^="yuzey-"]');
  let toplam = 0;
  inputs.forEach(inp => { toplam += parseFloat(inp.value) || 0; });

  const hesapEl = document.getElementById('yuzey-hesap');
  const durumEl = document.getElementById('yuzey-durum');
  const barEl   = document.getElementById('yuzey-toplam-bar');
  if (!hesapEl) return;

  hesapEl.textContent = toplam.toFixed(2);

  const fis = state.aktifFisler[state.aktifFisIdx];
  if (!fis) return;
  const v = fis.veri;
  const beklenen = v.birim === 'dm2' ? (v.toplamYuzeyDm2.deger || 0) : (v.toplamYuzeyFt2.deger || 0);
  const adet = parseInt(document.getElementById('d-adet')?.value) || 0;
  const olcumSayisi = [...inputs].filter(i => (parseFloat(i.value) || 0) > 0).length;

  const toplamTutuyor = beklenen <= 0 || Math.abs(toplam - beklenen) <= beklenen * 0.03;
  const adetTutuyor   = adet <= 0 || olcumSayisi === adet;

  if (durumEl) durumEl.textContent = (toplamTutuyor && adetTutuyor) ? '✅' : '⚠';
  if (barEl) {
    barEl.style.background = (toplamTutuyor && adetTutuyor) ? 'var(--green-soft)' : 'var(--red-soft)';
    barEl.style.borderLeft = (toplamTutuyor && adetTutuyor) ? '3px solid var(--green)' : '3px solid var(--red)';
  }
}

function yuzeyEkle() {
  const grid = document.getElementById('yuzey-grid');
  if (!grid) return;
  const idx = grid.children.length;
  const div = document.createElement('div');
  div.style.cssText = 'position:relative';
  div.innerHTML = `
    <span style="position:absolute;left:7px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--ink-faint);z-index:1;pointer-events:none">${idx+1}</span>
    <input type="number" step="0.01" class="input mono" style="padding-left:22px;padding-right:6px;text-align:right;font-size:14px" id="yuzey-${idx}" value="" oninput="yuzeyToplamGuncelle()">`;
  grid.appendChild(div);
  div.querySelector('input').focus();
}

function yuzeyKaldir() {
  const grid = document.getElementById('yuzey-grid');
  if (grid && grid.children.length > 0) {
    grid.removeChild(grid.lastChild);
    yuzeyToplamGuncelle();
  }
}

async function fisOnayla(idx) {
  const fis = state.aktifFisler[idx];
  const v = fis.veri;

  // Temel alanları güncelle
  v.cins.deger = document.getElementById('d-cins').value.trim();
  v.renk.deger = document.getElementById('d-renk').value.trim();
  v.kod.deger  = document.getElementById('d-kod').value.trim();
  v.kalite.deger = document.getElementById('d-kalite').value.trim().toUpperCase();
  v.deriAdedi.deger = parseInt(document.getElementById('d-adet').value) || 0;
  v.seriNo.deger = document.getElementById('d-seri').value.trim();

  // Yüzey ölçümlerini inputlardan topla
  const yuzeyInputs = document.querySelectorAll('[id^="yuzey-"]');
  const yeniYuzeyler = [];
  yuzeyInputs.forEach((inp, i) => {
    const deger = parseFloat(inp.value);
    if (!isNaN(deger) && deger > 0) {
      const grupNo = i < 5 ? 1 : i < 10 ? 6 : i < 15 ? 11 : 16;
      const sira   = (i % 5) + 1;
      yeniYuzeyler.push({ grupNo, sira, deger });
    }
  });
  v.yuzeyDegerleri = yeniYuzeyler;

  // Toplamları yüzey inputlarından hesapla ve güncelle
  const toplam = yeniYuzeyler.reduce((s, y) => s + y.deger, 0);
  if (v.birim === 'dm2') {
    v.toplamYuzeyDm2.deger = toplam;
    v.toplamYuzeyFt2.deger = parseFloat((toplam / 9.2903).toFixed(2));
  } else {
    v.toplamYuzeyFt2.deger = toplam;
    v.toplamYuzeyDm2.deger = parseFloat((toplam * 9.2903).toFixed(1));
  }

  // Validation — kayıt engelleyen kontrol (sapma 0 — tam eşleşme)
  const adet = v.deriAdedi.deger;
  const beklenen = v.birim === 'dm2' ? (v.toplamYuzeyDm2.deger || 0) : (v.toplamYuzeyFt2.deger || 0);
  if (adet > 0 && yeniYuzeyler.length !== adet) {
    toast(`❌ Ölçüm sayısı (${yeniYuzeyler.length}) ≠ Deri Adedi (${adet}) — düzeltin`, 3500);
    return;
  }
  if (beklenen > 0 && Math.round(toplam * 10) !== Math.round(beklenen * 10)) {
    toast(`❌ Toplam (${toplam.toFixed(1)}) ≠ Beklenen (${beklenen.toFixed(1)}) — farkı giderin`, 3500);
    return;
  }

  fis.durum = 'onaylandi';
  fis.dogrulamaGerek = false;
  v.cins.duzeltildi = true;

  // Öğren
  await ogrenilenleriKaydet(v.cins.deger, v.kod.deger, v.renk.deger);
  const ogrenilenBilgi = v.kod.deger ? `Kod ${v.kod.deger} kaydedildi` : (v.cins.deger || '?');
  document.querySelector('.modal-bg').remove();
  toast('✓ Onaylandı — ' + ogrenilenBilgi);
  render();
}

function fisSil(idx) {

  state.aktifFisler.splice(idx, 1);

}

function ekranInceleme() {
  const m = state.aktifMusteri;

  const onayli = state.aktifFisler.filter(f => f.durum === 'hazir' || f.durum === 'onaylandi');
  const toplamAdet = onayli.reduce((s, f) => s + (f.veri.deriAdedi.deger || 0), 0);
  const toplamDm2  = onayli.reduce((s, f) => s + (f.veri.toplamYuzeyDm2?.deger || 0), 0);
  const toplamFt2  = onayli.reduce((s, f) => s + (f.veri.toplamYuzeyFt2?.deger || 0), 0);
  // Ana birim müşteri tercihine göre
  const toplamAna  = musteriiBirim === 'dm2' ? toplamDm2 : toplamFt2;
  const toplamIkincil = musteriiBirim === 'dm2' ? toplamFt2 : toplamDm2;

  const fisKartlari = onayli.map(f => {
    const idx = state.aktifFisler.indexOf(f);
    const v = f.veri;
    const dm2 = v.toplamYuzeyDm2?.deger;
    const ft2 = v.toplamYuzeyFt2?.deger;
    // dm² önce, ft² yanında
    const yuzeyGoster = dm2
      ? `${dm2.toFixed(0)} dm²${ft2 ? ' · ' + ft2.toFixed(2) + ' ft²' : ''}`
      : ft2 ? `${ft2.toFixed(2)} ft²` : '?';

    return `
      <div class="card" onclick="fisDuzelt(${idx})" style="cursor:pointer">
        <div class="card-row">
          <div style="flex:1">
            <div style="font-family:'Fraunces';font-weight:600;font-size:16px">${v.cins.deger} <span style="color:var(--ink-faint);font-weight:400">·</span> ${v.renk.deger}</div>
            <div class="mono text-muted" style="font-size:12px;margin-top:2px">${v.kod.deger} • Kalite ${v.kalite.deger} • Seri ${v.seriNo.deger}</div>
            <div class="text-muted mt-2" style="font-size:13px">${v.deriAdedi.deger} adet • ${yuzeyGoster}</div>
            ${v.dogrulamaUyarilari.length > 0 ? `<div style="color:var(--red);font-size:12px;margin-top:4px">⚠ ${v.dogrulamaUyarilari[0]}</div>` : ''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            ${f.durum === 'onaylandi' ? '<span style="color:var(--leather);font-size:11px;font-weight:700">✓ ONAYLI</span>' : ''}
            <span class="conf-chip ${guvenChipSinifi(v.genelGuven)}">%${Math.round(v.genelGuven * 100)}</span>
          </div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="topbar">
      <button onclick="geriDon();" style="font-size:13px">‹ Geri</button>
      <div class="brand mono" style="font-size:14px">${state.oturumNo}</div>
      <div style="width:80px"></div>
    </div>
    <div class="content">
      <div class="summary">
        <div class="customer-name">${m.ad}</div>
        <div class="code">${m.kod} · Birim: ${musteriiBirim}</div>
        <div class="summary-grid">
          <div class="item"><div class="value">${onayli.length}</div><div class="label">Fiş</div></div>
          <div class="item"><div class="value">${toplamAdet}</div><div class="label">Deri</div></div>
          <div class="item">
            <div class="value">${toplamDm2.toFixed(0)}</div>
            <div class="label">dm² Toplam</div>
            <div style="font-size:10px;opacity:0.7">${toplamFt2.toFixed(2)} ft²</div>
          </div>
        </div>
      </div>
      <div class="section-title">Çekilen Fişler (${onayli.length})</div>
      ${fisKartlari}
    </div>
    <div class="bottom-bar">
      <button class="btn secondary" onclick="ekranGit('toplu-cekim');">Daha Çek</button>
      <button class="btn gold" onclick="sevkiyatKaydet()" ${onayli.length === 0 ? 'disabled' : ''}>Sevkiyatı Kaydet</button>
    </div>`;
}

async function sevkiyatKaydet() {
  const onayli = state.aktifFisler.filter(f => f.durum === 'hazir' || f.durum === 'onaylandi');
  if (onayli.length === 0) return;

  // ⛔ KAYIT ENGELİ: Toplam veya adet tutmayan fişleri engelle
  const sorunlu = onayli.filter(f => {
    const v = f.veri;
    const olcumToplam = (v.yuzeyDegerleri || []).reduce((s, y) => s + y.deger, 0);
    const beklenen = v.birim === 'dm2' ? (v.toplamYuzeyDm2?.deger || 0) : (v.toplamYuzeyFt2?.deger || 0);
    if (beklenen > 0 && Math.round(olcumToplam * 10) !== Math.round(beklenen * 10)) return true;
    if (v.deriAdedi.deger > 0 && v.yuzeyDegerleri.length > 0 && v.yuzeyDegerleri.length !== v.deriAdedi.deger) return true;
    return false;
  });

  if (sorunlu.length > 0) {
    const ilk = sorunlu[0].veri;
    toast(`❌ ${sorunlu.length} fişte hata var — önce düzeltin\n(${ilk.cins.deger || '?'}: ölçüm/adet tutmuyor)`, 4000);
    return;
  }

  const m = state.aktifMusteri;
  const musteriiBirim = m.tercihBirim || 'dm2';  // Müşteri birim tercihi, default dm²

  const sId = await Storage.nextId('sevkiyat');
  const toplamAdet = onayli.reduce((s, f) => s + (f.veri.deriAdedi.deger || 0), 0);
  const toplamDm2  = onayli.reduce((s, f) => s + (f.veri.toplamYuzeyDm2?.deger || 0), 0);
  const toplamFt2  = onayli.reduce((s, f) => s + (f.veri.toplamYuzeyFt2?.deger || 0), 0);

  const sevkiyat = {
    id: sId, sevkiyatNo: state.oturumNo,
    musteriId: m.id, musteriAd: m.ad, musteriKod: m.kod,
    musteriiBirim,   // Raporda hangi birim gösterilecek
    tarih: Date.now(), durum: 'TAMAMLANDI',
    toplamAdet, toplamYuzeyDm2: toplamDm2, toplamYuzeyFt2: toplamFt2,
    // Geriye dönük uyumluluk için toplamYuzey = dm²
    toplamYuzey: toplamDm2,
    deriler: onayli.map(f => ({
      cins: f.veri.cins.deger, renk: f.veri.renk.deger, kod: f.veri.kod.deger,
      kalite: f.veri.kalite.deger, seriNo: f.veri.seriNo.deger, barkod: f.veri.barkod.deger,
      deriAdedi: f.veri.deriAdedi.deger,
      toplamYuzeyFt2: f.veri.toplamYuzeyFt2.deger, toplamYuzeyDm2: f.veri.toplamYuzeyDm2.deger,
      birim: f.veri.birim, yuzeyOlcumleri: f.veri.yuzeyDegerleri,
      okumaGuveni: f.veri.genelGuven, kaynak: f.kaynak
    }))
  };
  await Storage.set(`sevkiyat:${sId}`, sevkiyat);
  state.sevkiyatlar.push(sevkiyat);

  // Firestore'a kaydet (çok kullanıcılı senkron)
  try {
    const fsVeri = {
      ...sevkiyat,
      personelId:  state.kullanici?.uid  || 'bilinmiyor',
      personelAd:  state.profil?.ad      || state.kullanici?.email || 'Bilinmiyor',
    };
    await db.collection('sevkiyatlar').add(fsVeri);
  } catch(e) {
    console.warn('Firestore kayıt hatası (yerel kayıt tamam):', e.message);
    toast('⚠ Yerel kaydedildi, bulut senkronu başarısız', 3000);
  }
  titret(80);
  basariDialog(sevkiyat);
}

  mbg.innerHTML = `

// ====== PDF ======
async function pdfUret(sId, boyut) {
  const s = state.sevkiyatlar.find(x => x.id === sId);
  if (!s) return;
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: 'mm', format: boyut.toLowerCase() });
  const W = pdf.internal.pageSize.getWidth();
  const margin = 12;
  let y = margin;
  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(boyut === 'A4' ? 16 : 13);
  pdf.text('DERI SEVKIYAT IRSALIYESI', W/2, y, { align: 'center' });
  y += 5;
  pdf.setLineWidth(0.5);
  pdf.line(margin, y, W - margin, y);
  y += 6;
  pdf.setFontSize(9);
  pdf.setFont('helvetica', 'bold'); pdf.text('Sevkiyat No:', margin, y);
  pdf.setFont('helvetica', 'normal'); pdf.text(s.sevkiyatNo, margin + 22, y);
  pdf.setFont('helvetica', 'bold'); pdf.text('Tarih:', W - margin - 40, y);
  pdf.setFont('helvetica', 'normal'); pdf.text(tarihFormatla(s.tarih), W - margin - 28, y);
  y += 5;
  pdf.setFont('helvetica', 'bold'); pdf.text('Musteri:', margin, y);
  pdf.setFont('helvetica', 'normal'); pdf.text(s.musteriAd, margin + 22, y);
  pdf.setFont('helvetica', 'bold'); pdf.text('Kod:', W - margin - 40, y);
  pdf.setFont('helvetica', 'normal'); pdf.text(s.musteriKod, W - margin - 28, y);
  y += 8;
  const colW = boyut === 'A4' ? [28, 22, 22, 16, 14, 22, 22, 30] : [22, 17, 17, 12, 11, 17, 17, 22];
  const basliklar = ['Cins', 'Renk', 'Kod', 'Kalite', 'Adet', 'dm2', 'ft2', 'Seri No'];
  pdf.setFillColor(220, 220, 220);
  pdf.rect(margin, y - 4, W - 2*margin, 6, 'F');
  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(8);
  let x = margin + 2;
  basliklar.forEach((b, i) => { pdf.text(b, x, y); x += colW[i]; });
  y += 4;
  pdf.line(margin, y, W - margin, y);
  y += 4;
  pdf.setFont('helvetica', 'normal');
  let toplamAdet = 0, toplamFt2 = 0, toplamDm2 = 0;
  s.deriler.forEach(d => {
    const ft2 = d.toplamYuzeyFt2 || 0;
    const dm2 = d.toplamYuzeyDm2 || ft2 * 9.2903;
    toplamAdet += d.deriAdedi; toplamFt2 += ft2; toplamDm2 += dm2;
    x = margin + 2;
    [d.cins || '', d.renk || '', d.kod || '', d.kalite || '', String(d.deriAdedi || 0), dm2.toFixed(1), ft2.toFixed(2), d.seriNo || ''].forEach((v, i) => {
      pdf.text(String(v).substring(0, i === 0 ? 12 : 10), x, y);
      x += colW[i];
    });
    y += 5;
  });
  pdf.line(margin, y - 2, W - margin, y - 2);
  y += 2;
  pdf.setFillColor(245, 230, 200);
  pdf.rect(margin, y - 4, W - 2*margin, 6, 'F');
  pdf.setFont('helvetica', 'bold');
  x = margin + 2;
  pdf.text('TOPLAM', x + colW[0] + colW[1] + colW[2] - 10, y);
  pdf.text(String(toplamAdet), x + colW[0] + colW[1] + colW[2] + colW[3], y);
  pdf.text(toplamDm2.toFixed(1), x + colW[0] + colW[1] + colW[2] + colW[3] + colW[4], y);
  pdf.text(toplamFt2.toFixed(2), x + colW[0] + colW[1] + colW[2] + colW[3] + colW[4] + colW[5], y);
  y += 14;
  pdf.setFont('helvetica', 'normal');
  pdf.setFontSize(9);
  pdf.text('Teslim Eden:', margin, y);
  pdf.text('Teslim Alan:', W - margin - 35, y);
  y += 14;
  pdf.line(margin, y, margin + 50, y);
  pdf.line(W - margin - 50, y, W - margin, y);

  const pdfBlob = pdf.output('blob');
  const pdfFile = new File([pdfBlob], `Irsaliye_${s.sevkiyatNo}.pdf`, { type: 'application/pdf' });

  if (navigator.canShare && navigator.canShare({ files: [pdfFile] })) {
    try {
      await navigator.share({ files: [pdfFile], title: `Irsaliye ${s.sevkiyatNo}`, text: `${s.musteriAd} - ${s.toplamAdet} deri, ${(s.toplamYuzeyDm2||s.toplamYuzey||0).toFixed(0)} dm² / ${(s.toplamYuzeyFt2||0).toFixed(2)} ft²` });
      return;
    } catch (e) {}
  }
  pdf.save(`Irsaliye_${s.sevkiyatNo}.pdf`);
  toast('PDF indirildi');
}

}

}

async function girisYap() {
  let mail = document.getElementById('giris-mail').value.trim();
  if (mail && !mail.includes('@')) mail += '@deri.app';
  const sifre = document.getElementById('giris-sifre').value;
  const hataEl = document.getElementById('giris-hata');
  hataEl.style.display = 'none';
  if (!mail || !sifre) { hataEl.textContent = 'E-posta ve şifre zorunlu'; hataEl.style.display='block'; return; }
  try {
    await auth.signInWithEmailAndPassword(mail, sifre);
    // Auth listener devralır
  } catch (e) {
    hataEl.textContent = e.code === 'auth/invalid-credential' ? 'E-posta veya şifre hatalı' : e.message;
    hataEl.style.display = 'block';
  }
}

async function cikisYap() {
  if (state.unsubscribeFn) { state.unsubscribeFn(); state.unsubscribeFn = null; }
  await auth.signOut();
  state.kullanici = null; state.profil = null;
  state.ekran = 'giris'; render();
}

// ====== YÖNETİCİ PANELİ ======
function ekranYonetici() {
  const sekmeler = [
    { id:'bugun', label:'Bugün' },
    { id:'hafta',  label:'Bu Hafta' },
    { id:'musteri', label:'Müşteri' },
    { id:'personel', label:'Personel' },
    { id:'kullanicilar', label:'Kullanıcılar' },
  ];
  const tabHtml = sekmeler.map(t => `
    <div class="tab ${state.yoneticiSekme===t.id?'active':''}" onclick="yoneticiSekme('${t.id}')">${t.label}</div>
  `).join('');

  let icerik = '';
  const sevk = state.yoneticiSevkiyatlar || [];

  if (state.yoneticiSekme === 'bugun') {
    const bugun = new Date(); bugun.setHours(0,0,0,0);
    const bugunSevk = sevk.filter(s => s.tarih >= bugun.getTime());
    const topDm2 = bugunSevk.reduce((a,s)=>a+(s.toplamYuzeyDm2||0),0);
    const topFt2  = bugunSevk.reduce((a,s)=>a+(s.toplamYuzeyFt2||0),0);
    const topAdet = bugunSevk.reduce((a,s)=>a+(s.toplamAdet||0),0);

    icerik = `
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px">
        ${kartOzet('Sevkiyat', bugunSevk.length, '📦')}
        ${kartOzet('Deri', topAdet, '🐂')}
        ${kartOzet('dm²', topDm2.toFixed(0), '📐')}
      </div>
      <div style="font-size:12px;color:var(--ink-faint);text-align:center;margin-bottom:12px">${topFt2.toFixed(2)} ft²</div>
      <div class="section-title">Bugünkü Sevkiyatlar</div>
      ${bugunSevk.length === 0 ? '<div class="empty"><div class="icon">📭</div><div>Bugün henüz sevkiyat yok</div></div>' :
        bugunSevk.slice().reverse().map(s => sevkiyatKarti(s)).join('')}`;

  } else if (state.yoneticiSekme === 'hafta') {
    const haftaBasi = new Date(); haftaBasi.setDate(haftaBasi.getDate()-6); haftaBasi.setHours(0,0,0,0);
    const haftaSevk = sevk.filter(s => s.tarih >= haftaBasi.getTime());
    const topDm2  = haftaSevk.reduce((a,s)=>a+(s.toplamYuzeyDm2||0),0);
    const topAdet = haftaSevk.reduce((a,s)=>a+(s.toplamAdet||0),0);

    icerik = `
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px">
        ${kartOzet('Sevkiyat', haftaSevk.length, '📦')}
        ${kartOzet('Deri', topAdet, '🐂')}
        ${kartOzet('dm²', topDm2.toFixed(0), '📐')}
      </div>
      <div class="section-title">Son 7 Gün</div>
      ${haftaSevk.slice().reverse().map(s => sevkiyatKarti(s)).join('')}`;

  } else if (state.yoneticiSekme === 'musteri') {
    const mMap = {};
    sevk.forEach(s => {
      if (!mMap[s.musteriAd]) mMap[s.musteriAd] = { ad: s.musteriAd, kod: s.musteriKod, adet:0, dm2:0, sayim:0 };
      mMap[s.musteriAd].adet  += s.toplamAdet||0;
      mMap[s.musteriAd].dm2   += s.toplamYuzeyDm2||0;
      mMap[s.musteriAd].sayim += 1;
    });
    const sirali = Object.values(mMap).sort((a,b)=>b.dm2-a.dm2);
    icerik = `
      <div class="section-title">Müşteri Bazlı Toplam</div>
      ${sirali.map(m=>`
        <div class="card">
          <div style="font-family:'Fraunces';font-weight:600;font-size:16px">${m.ad}</div>
          <div class="mono text-muted" style="font-size:12px">${m.kod}</div>
          <div style="display:flex;gap:16px;margin-top:8px;font-size:13px">
            <span><b>${m.sayim}</b> sevkiyat</span>
            <span><b>${m.adet}</b> deri</span>
            <span><b>${m.dm2.toFixed(0)}</b> dm²</span>
          </div>
        </div>`).join('')}`;

  } else if (state.yoneticiSekme === 'personel') {
    const pMap = {};
    sevk.forEach(s => {
      const key = s.personelAd || 'Bilinmiyor';
      if (!pMap[key]) pMap[key] = { ad: key, adet:0, dm2:0, sayim:0 };
      pMap[key].adet  += s.toplamAdet||0;
      pMap[key].dm2   += s.toplamYuzeyDm2||0;
      pMap[key].sayim += 1;
    });
    icerik = `
      <div class="section-title">Personel Bazlı Toplam</div>
      ${Object.values(pMap).sort((a,b)=>b.dm2-a.dm2).map(p=>`
        <div class="card">
          <div style="font-family:'Fraunces';font-weight:600;font-size:16px">👤 ${p.ad}</div>
          <div style="display:flex;gap:16px;margin-top:8px;font-size:13px">
            <span><b>${p.sayim}</b> sevkiyat</span>
            <span><b>${p.adet}</b> deri</span>
            <span><b>${p.dm2.toFixed(0)}</b> dm²</span>
          </div>
        </div>`).join('')}`;

  } else if (state.yoneticiSekme === 'kullanicilar') {
    icerik = `
      <div class="section-title">Kullanıcı Yönetimi</div>
      <div class="card" style="background:var(--gold-soft)">
        <div style="font-weight:700;margin-bottom:12px">Yeni Personel Ekle</div>
        <div class="input-group"><label class="input-label">Ad Soyad</label><input class="input" id="pers-ad" placeholder="Ali Veli"></div>
        <div class="input-group"><label class="input-label">Kullanıcı Adı</label><input class="input" id="pers-mail" placeholder="ali"></div>
        <div class="input-group"><label class="input-label">Şifre</label><input class="input" id="pers-sifre" type="password" placeholder="En az 6 karakter"></div>
        <button class="btn" style="background:var(--leather-dark)" onclick="personelEkle()">Ekle</button>
      </div>
      <div id="pers-sonuc" style="margin-top:8px;font-size:13px"></div>`;
  }

  return `
    <div class="topbar">
      <div class="brand" style="font-size:15px">👑 ${state.profil?.ad || kullaniciAdiGoster(state.kullanici?.email)}</div>
      <button onclick="cikisYap()">Çıkış</button>
    </div>
    <div class="tabs" style="overflow-x:auto;white-space:nowrap">${tabHtml}</div>
    <div class="content">${icerik}</div>`;
}

function kartOzet(etiket, deger, icon) {
  return `<div class="card" style="text-align:center;padding:14px 8px">
    <div style="font-size:24px;margin-bottom:4px">${icon}</div>
    <div style="font-family:'Fraunces';font-size:22px;font-weight:700">${deger}</div>
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink-soft);margin-top:2px">${etiket}</div>
  </div>`;
}

function sevkiyatKarti(s) {
  return `<div class="shipment-item" onclick="yoneticiSevkiyatDetay('${s.fsId}')">
    <div class="header">
      <span class="no">${s.sevkiyatNo}</span>
      <span class="date">${tarihFormatla(s.tarih)}</span>
    </div>
    <div class="customer">${s.musteriAd}</div>
    <div class="totals">
      <span>👤 ${s.personelAd||'?'}</span>
      <span>🐂 ${s.toplamAdet} deri</span>
      <span>📐 ${(s.toplamYuzeyDm2||0).toFixed(0)} dm²</span>
    </div>
  </div>`;
}

function yoneticiSekme(sekme) {
  state.yoneticiSekme = sekme;
  render();
}

function yoneticiSevkiyatDetay(fsId) {
  state.aktifSevkiyatDetay = state.yoneticiSevkiyatlar.find(s => s.fsId === fsId);
  if (!state.aktifSevkiyatDetay) return;
  ekranGit('sevkiyat-detay');
}

async function personelEkle() {
  const ad    = document.getElementById('pers-ad').value.trim();
  let mail  = document.getElementById('pers-mail').value.trim();
  if (mail && !mail.includes('@')) mail += '@deri.app';
  const sifre = document.getElementById('pers-sifre').value;
  const sonEl = document.getElementById('pers-sonuc');
  if (!ad || !mail || !sifre) { sonEl.innerHTML='<span style="color:red">Tüm alanlar zorunlu</span>'; return; }
  sonEl.textContent = 'Ekleniyor...';
  try {
    // Geçici ikincil auth ile hesap aç (mevcut yönetici oturumu korunur)
    const ikincilApp = firebase.initializeApp(firebase.apps[0].options, 'personelEkle_' + Date.now());
    const ikincilAuth = ikincilApp.auth();
    const cred = await ikincilAuth.createUserWithEmailAndPassword(mail, sifre);
    const uid  = cred.user.uid;
    await db.collection('users').doc(uid).set({ ad, email: mail, rol: 'PERSONEL', aktif: true, olusturma: Date.now() });
    await ikincilAuth.signOut();
    await ikincilApp.delete();
    ['pers-ad','pers-mail','pers-sifre'].forEach(id => document.getElementById(id).value = '');
    sonEl.innerHTML = `<span style="color:var(--green)">✓ ${ad} eklendi</span>`;
  } catch(e) {
    sonEl.innerHTML = `<span style="color:red">Hata: ${e.message}</span>`;
  }
}

// ====== FİRESTORE: MÜŞTERİ KAYDET/YİKLE ======
async function musteriFirestore(musteri) {
  await db.collection('musteriler').doc(String(musteri.id)).set(musteri);
}

async function musterileriYukle() {
  try {
    const snap = await db.collection('musteriler').orderBy('ad').get();
    state.musteriler = snap.docs.map(d => ({ ...d.data(), fsId: d.id }));
  } catch(e) {
    console.warn('Müşteri yüklenemedi, local:', e.message);
    const mKeys = await Storage.list('musteri:');
    for (const k of mKeys) { const m = await Storage.get(k); if (m) state.musteriler.push(m); }
  }
}

// ====== YÖNETİCİ: FIRESTORE REALTIME ======
function yoneticiDinlemeBaslat() {
  if (state.unsubscribeFn) state.unsubscribeFn();
  state.unsubscribeFn = db.collection('sevkiyatlar')
    .orderBy('tarih', 'desc')
    .limit(500)
    .onSnapshot(snap => {
      state.yoneticiSevkiyatlar = snap.docs.map(d => ({ ...d.data(), fsId: d.id }));
      if (state.ekran === 'yonetici') render();
    }, e => console.warn('Snapshot:', e.message));
}

// ====== UYGULAMA BAŞLATMA — AUTH STATE ======
async function basla() {
  auth.onAuthStateChanged(async user => {
    if (!user) {
      state.kullanici = null; state.profil = null;
      state.ekran = 'giris'; render(); return;
    }
    state.kullanici = user;

    // Kullanıcı profilini Firestore'dan al
    let profil = null;
    try {
      const profilDoc = await db.collection('users').doc(user.uid).get();
      if (profilDoc.exists) profil = profilDoc.data();
    } catch(e) {
      console.warn('Profil okunamadı:', e.message);
    }

    // Profil yoksa veya rol tanımlı değilse → İlk Kurulum göster
    if (!profil || !profil.rol) {
      ilkKurulumGoster(user);
      return;
    }

    state.profil = profil;
    await musterileriYukle();

    if (profil.rol === 'YONETICI') {
      state.ekran = 'yonetici';
      yoneticiDinlemeBaslat();
    } else {
      state.ekran = 'musteri-listesi';
    }
    render();
  });
}

function ilkKurulumGoster(user) {
  state.ekran = 'ilk-kurulum';
  const app = document.getElementById('app');
  app.innerHTML = `
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:var(--bg)">
      <div style="text-align:center;margin-bottom:32px">
        <div style="font-size:48px;margin-bottom:12px">⚙</div>
        <h2 style="font-family:'Fraunces',serif">İlk Kurulum</h2>
        <div style="color:var(--ink-soft);font-size:14px;margin-top:8px">👤 ${kullaniciAdiGoster(user.email)}</div>
      </div>
      <div style="width:100%;max-width:360px">
        <div class="input-group">
          <label class="input-label">Ad Soyad</label>
          <input class="input" id="ilk-ad" placeholder="Adınız Soyadınız">
        </div>
        <div class="input-group">
          <label class="input-label">Bu hesabın rolü</label>
          <div style="display:flex;gap:8px">
            <label style="display:flex;align-items:center;gap:8px;padding:14px;border:2px solid var(--leather);border-radius:10px;flex:1;cursor:pointer;background:var(--gold-soft)">
              <input type="radio" name="ilk-rol" value="YONETICI" checked>
              <div><div style="font-weight:700;font-size:16px">👑 Yönetici</div><div style="font-size:12px;color:var(--ink-soft)">Tüm verilere erişim, raporlar</div></div>
            </label>
            <label style="display:flex;align-items:center;gap:8px;padding:14px;border:1px solid var(--line);border-radius:10px;flex:1;cursor:pointer">
              <input type="radio" name="ilk-rol" value="PERSONEL">
              <div><div style="font-weight:700;font-size:16px">👤 Personel</div><div style="font-size:12px;color:var(--ink-soft)">Sadece sevkiyat kaydı</div></div>
            </label>
          </div>
        </div>
        <div id="ilk-hata" style="color:var(--red);font-size:13px;margin-bottom:8px;display:none"></div>
        <button class="btn" style="background:var(--leather-dark);margin-top:12px" onclick="ilkKurulumKaydet()">Kaydet ve Devam Et</button>
        <button class="btn secondary" style="margin-top:8px" onclick="auth.signOut()">Farklı Hesap</button>
      </div>
    </div>`;
}

async function ilkKurulumKaydet() {
  const ad  = document.getElementById('ilk-ad').value.trim();
  const rol = document.querySelector('input[name="ilk-rol"]:checked')?.value || 'PERSONEL';
  const hataEl = document.getElementById('ilk-hata');
  if (!ad) { hataEl.textContent='Ad Soyad zorunlu'; hataEl.style.display='block'; return; }
  hataEl.style.display='none';

  try {
    const profil = { ad, email: state.kullanici.email, rol, aktif: true, olusturma: Date.now() };
    await db.collection('users').doc(state.kullanici.uid).set(profil);
    state.profil = profil;
    await musterileriYukle();
    if (rol === 'YONETICI') {
      state.ekran = 'yonetici';
      yoneticiDinlemeBaslat();
    } else {
      state.ekran = 'musteri-listesi';
    }
    render();
    toast(`Hoş geldiniz ${ad}! Rol: ${rol === 'YONETICI' ? '👑 Yönetici' : '👤 Personel'}`);
  } catch(e) {
    hataEl.textContent = 'Kayıt hatası: ' + e.message;
    hataEl.style.display = 'block';
  }
}

basla();
</script>
