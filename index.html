<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3D2817">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Deri Sevkiyat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
  :root {
    --bg: #F5EFE0; --bg-soft: #FAF7EC; --bg-card: #FFFFFF;
    --ink: #2A1E12; --ink-soft: #5C4A38; --ink-faint: #9B8A75;
    --line: #E8DCC4;
    --leather: #8B4513; --leather-dark: #3D2817;
    --gold: #D4A24C; --gold-soft: #F4E4BC;
    --green: #4A7C59; --green-soft: #D8E6DA;
    --amber: #E07F00; --amber-soft: #FCEACA;
    --red: #B33A3A; --red-soft: #F5D6D6;
    --ai: #5B4FBF; --ai-soft: #E4E0F7;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg); color: var(--ink);
    font-size: 16px; line-height: 1.5;
    overscroll-behavior: none; min-height: 100vh;
  }
  h1, h2, h3, h4, .serif {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700; letter-spacing: -0.02em;
  }
  .mono { font-family: 'JetBrains Mono', monospace; font-feature-settings: 'ss01', 'ss02'; }
  #app { max-width: 520px; margin: 0 auto; min-height: 100vh; background: var(--bg); padding-bottom: 84px; }

  @media (min-width: 768px) {
    body { background: var(--bg-soft); }
    #app { max-width: 720px; box-shadow: 0 0 40px rgba(0,0,0,0.12); }
    .topbar { padding: 16px 28px; }
    .bottom-bar { max-width: 720px; padding: 14px 28px; }
    .toast { bottom: 130px; }
    .section { padding: 16px 24px; }
    .card { padding: 16px 20px; }
    .shipment-item { padding: 14px 18px; }
    .btn { font-size: 15px; padding: 14px 20px; }
  }
  @media (min-width: 1100px) {
    #app { max-width: 900px; }
    .bottom-bar { max-width: 900px; }
    .tabs { padding: 12px 24px; gap: 10px; }
    .tab { padding: 10px 22px; font-size: 15px; }
  }

  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: var(--leather-dark); color: var(--bg-soft);
    padding: 14px 20px; display: flex;
    align-items: center; justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .topbar .brand { font-family: 'Fraunces', serif; font-weight: 700; font-size: 18px; }
  .topbar .brand::before { content: "◈"; color: var(--gold); margin-right: 8px; }
  .topbar button {
    background: transparent; color: var(--bg-soft);
    border: 1px solid rgba(244,228,188,0.3);
    padding: 6px 12px; border-radius: 6px; font-size: 13px;
    font-family: inherit; cursor: pointer;
  }
  .topbar button:active { background: rgba(255,255,255,0.1); }

  .customer-bar {
    background: var(--gold-soft); border-bottom: 1px solid var(--line);
    padding: 10px 20px; display: flex;
    justify-content: space-between; align-items: center; gap: 12px;
  }
  .customer-bar .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-soft); margin-bottom: 2px; }
  .customer-bar .name { font-family: 'Fraunces', serif; font-weight: 600; font-size: 17px; }
  .customer-bar .lock { background: var(--leather-dark); color: var(--gold); padding: 4px 10px; border-radius: 999px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }

  .content { padding: 20px; }
  .section-title {
    font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--ink-soft); margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ""; flex: 1; height: 1px; background: var(--line); }

  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 8px; padding: 14px 20px;
    background: var(--leather-dark); color: var(--bg-soft);
    border: none; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 15px;
    cursor: pointer; transition: transform 0.06s; width: 100%;
  }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.secondary { background: var(--bg-card); color: var(--ink); border: 1px solid var(--line); }
  .btn.gold { background: var(--gold); color: var(--leather-dark); }
  .btn.danger { background: var(--red); color: white; }
  .btn.green { background: var(--green); color: white; }
  .btn.ai { background: var(--ai); color: white; }
  .btn-small { padding: 8px 14px; font-size: 13px; width: auto; }

  .card { background: var(--bg-card); border: 1px solid var(--line); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .card-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }

  .input {
    width: 100%; padding: 12px 14px;
    border: 1px solid var(--line); border-radius: 8px;
    background: var(--bg-card); font-family: 'DM Sans', sans-serif;
    font-size: 15px; color: var(--ink);
  }
  .input:focus { outline: 2px solid var(--gold); border-color: var(--gold); }
  .input-label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-soft); margin-bottom: 6px; font-weight: 600; }
  .input-group { margin-bottom: 14px; }
  .input.confidence-high { background: var(--green-soft); border-color: var(--green); }
  .input.confidence-med { background: var(--amber-soft); border-color: var(--amber); }
  .input.confidence-low { background: var(--red-soft); border-color: var(--red); }

  .customer-item {
    background: var(--bg-card); border: 1px solid var(--line); border-radius: 10px;
    padding: 14px 16px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px; cursor: pointer;
  }
  .customer-item:active { background: var(--gold-soft); }
  .customer-item .avatar { width: 40px; height: 40px; border-radius: 8px; background: var(--leather); color: var(--bg-soft); display: flex; align-items: center; justify-content: center; font-family: 'Fraunces', serif; font-weight: 700; flex-shrink: 0; }
  .customer-item .info { flex: 1; min-width: 0; }
  .customer-item .name { font-weight: 600; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .customer-item .meta { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-faint); }

  .capture-fab {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    width: 76px; height: 76px; border-radius: 50%;
    background: var(--gold); border: 4px solid var(--leather-dark);
    color: var(--leather-dark);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 8px 24px rgba(61,40,23,0.3); z-index: 40;
  }
  .capture-fab:active { transform: translateX(-50%) scale(0.94); }
  .capture-fab svg { width: 32px; height: 32px; }
  .manual-fab {
    position: fixed; bottom: 32px; right: calc(50% - 220px); z-index: 40;
    background: var(--bg-card); border: 1px solid var(--line); border-radius: 999px;
    padding: 10px 16px; font-size: 13px; font-weight: 600; color: var(--ink);
    cursor: pointer;
  }
  @media (max-width: 540px) { .manual-fab { right: 20px; } }

  .receipt-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .receipt-card {
    background: var(--bg-card); border: 1px solid var(--line); border-radius: 10px;
    padding: 10px; min-height: 140px;
    display: flex; flex-direction: column; cursor: pointer; position: relative;
  }
  .receipt-card.processing { background: var(--amber-soft); border-color: var(--amber); }
  .receipt-card.ready { background: var(--green-soft); border-color: var(--green); }
  .receipt-card.error { background: var(--red-soft); border-color: var(--red); }
  .receipt-card.approved { background: var(--gold-soft); border-color: var(--gold); }
  .receipt-card.manuel { background: var(--ai-soft); border-color: var(--ai); }
  .receipt-card .status-dot { position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; border-radius: 50%; }
  .receipt-card .status-dot.processing { background: var(--amber); animation: pulse 1.5s infinite; }
  .receipt-card .status-dot.ready { background: var(--green); }
  .receipt-card .status-dot.error { background: var(--red); }
  .receipt-card .status-dot.approved { background: var(--gold); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .receipt-card .type { font-family: 'Fraunces', serif; font-weight: 600; font-size: 14px; margin-bottom: 2px; }
  .receipt-card .detail { font-size: 11px; color: var(--ink-soft); }
  .receipt-card .engine-badge {
    position: absolute; top: 6px; left: 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    padding: 2px 5px; border-radius: 4px;
    font-weight: 600; letter-spacing: 0.04em;
  }
  .receipt-card .engine-badge.claude { background: var(--ai); color: white; }
  .receipt-card .engine-badge.google { background: #4285F4; color: white; }
  .receipt-card .engine-badge.tess { background: var(--ink-faint); color: white; }
  .receipt-card .engine-badge.manuel { background: var(--ai); color: white; }
  .receipt-card .confidence { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; margin-top: auto; padding-top: 6px; }

  .stats-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 10px 16px; background: var(--bg-soft); border-bottom: 1px solid var(--line); }
  .stat { text-align: center; padding: 6px 4px; }
  .stat .value { font-family: 'Fraunces', serif; font-weight: 700; font-size: 20px; line-height: 1; }
  .stat .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-soft); margin-top: 4px; }
  .stat.ready .value { color: var(--green); }
  .stat.processing .value { color: var(--amber); }
  .stat.error .value { color: var(--red); }

  .modal-bg { position: fixed; inset: 0; background: rgba(42,30,18,0.6); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
  .modal { background: var(--bg); width: 100%; max-width: 520px; max-height: 92vh; overflow-y: auto; border-radius: 16px 16px 0 0; padding: 20px; padding-bottom: 40px; }
  .modal-handle { width: 40px; height: 4px; background: var(--ink-faint); border-radius: 2px; margin: 0 auto 16px; }
  .modal h2 { margin-bottom: 16px; font-size: 22px; }

  .conf-chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; }
  .conf-chip.high { background: var(--green-soft); color: var(--green); }
  .conf-chip.med { background: var(--amber-soft); color: var(--amber); }
  .conf-chip.low { background: var(--red-soft); color: var(--red); }
  .conf-chip.ai { background: var(--ai-soft); color: var(--ai); }

  .empty { text-align: center; padding: 60px 20px; color: var(--ink-faint); }
  .empty .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }

  .surface-list { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
  .surface-item { background: var(--bg-soft); border: 1px solid var(--line); border-radius: 6px; padding: 6px 10px; font-family: 'JetBrains Mono', monospace; font-size: 13px; display: flex; justify-content: space-between; }
  .surface-item .num { color: var(--ink-faint); font-size: 11px; }

  .warning { background: var(--red-soft); border-left: 3px solid var(--red); padding: 10px 14px; border-radius: 6px; margin: 12px 0; font-size: 13px; }
  .warning .title { font-weight: 700; color: var(--red); margin-bottom: 4px; }

  .info-box { background: var(--ai-soft); border-left: 3px solid var(--ai); padding: 10px 14px; border-radius: 6px; margin: 12px 0; font-size: 13px; }
  .info-box .title { font-weight: 700; color: var(--ai); margin-bottom: 4px; }

  .hidden-input { display: none; }

  .toast { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); background: var(--leather-dark); color: var(--bg-soft); padding: 12px 20px; border-radius: 10px; z-index: 200; font-size: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); animation: toastIn 0.3s ease-out; }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }

  .loading-overlay { position: fixed; inset: 0; background: rgba(245,239,224,0.92); z-index: 150; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .loading-overlay .progress-ring { width: 80px; height: 80px; border: 4px solid var(--line); border-top-color: var(--leather); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay .text { font-family: 'Fraunces', serif; font-size: 18px; text-align: center; margin-bottom: 8px; }
  .loading-overlay .subtext { font-size: 13px; color: var(--ink-soft); text-align: center; }

  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-card); border-top: 1px solid var(--line); padding: 12px 16px; display: flex; gap: 8px; z-index: 30; max-width: 520px; margin: 0 auto; }
  .bottom-bar .btn { flex: 1; }

  /* Yönetici panel sekmeleri */
  .tabs { display:flex; gap:6px; padding:10px 16px; background:var(--bg-card); border-bottom:1px solid var(--line); overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .tab { padding:10px 16px; border-radius:10px; font-size:14px; font-weight:600; white-space:nowrap; cursor:pointer; color:var(--ink-soft); background:var(--bg-soft); border:1px solid var(--line); }
  .tab.active { background:var(--leather-dark); color:#fff; border-color:var(--leather-dark); }
  .shipment-item { background:var(--bg-card); border:1px solid var(--line); border-radius:10px; padding:14px; margin-bottom:10px; cursor:pointer; }
  .shipment-item .header { display:flex; justify-content:space-between; margin-bottom:4px; }
  .shipment-item .no { font-family:'JetBrains Mono',monospace; font-weight:700; font-size:14px; }
  .shipment-item .date { font-size:12px; color:var(--ink-faint); }
  .shipment-item .customer { font-family:'Fraunces',serif; font-weight:600; font-size:16px; margin-bottom:6px; }
  .shipment-item .totals { display:flex; gap:12px; font-size:12px; color:var(--ink-soft); }
  .empty { text-align:center; padding:40px 20px; color:var(--ink-faint); }
  .empty .icon { font-size:48px; margin-bottom:12px; }

  .summary { background: linear-gradient(135deg, var(--leather-dark), var(--leather)); color: var(--bg-soft); border-radius: 14px; padding: 20px; margin-bottom: 20px; }
  .summary .customer-name { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .summary .code { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--gold); margin-bottom: 16px; }
  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.15); }
  .summary-grid .item .value { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 700; color: var(--gold); }
  .summary-grid .item .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.7; }

  .photo-preview { width: 100%; max-height: 240px; object-fit: contain; border-radius: 10px; margin-bottom: 14px; background: var(--ink); }

  .shipment-item { background: var(--bg-card); border: 1px solid var(--line); border-radius: 10px; padding: 14px; margin-bottom: 8px; cursor: pointer; }
  .shipment-item .header { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .shipment-item .no { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-faint); }
  .shipment-item .date { font-size: 11px; color: var(--ink-faint); }
  .shipment-item .customer { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; margin-bottom: 8px; }
  .shipment-item .totals { display: flex; gap: 16px; font-size: 13px; color: var(--ink-soft); }

  details { background: var(--bg-soft); border: 1px solid var(--line); border-radius: 8px; padding: 10px 14px; margin: 12px 0; }
  details summary { cursor: pointer; font-weight: 600; font-size: 13px; color: var(--ink-soft); }
  details[open] summary { margin-bottom: 8px; }
  details pre { background: var(--ink); color: #d6c8a8; padding: 10px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; overflow-x: auto; max-height: 200px; }

  .text-muted { color: var(--ink-soft); font-size: 13px; }
  .center { text-align: center; }
  .mt-1 { margin-top: 4px; } .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; }
  .mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; }
  .flex { display: flex; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; }
  .grow { flex: 1; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ============================================================
// DERİ SEVKİYAT PWA — Firebase destekli, çok kullanıcılı
// ============================================================

// ====== FİREBASE BAŞLATMA ======
firebase.initializeApp({
  apiKey: "AIzaSyAzzg3zjIL2VbwptzPhVj8sViNCj8yef7M",
  authDomain: "deri-sevkiyat-3b516.firebaseapp.com",
  projectId: "deri-sevkiyat-3b516",
  storageBucket: "deri-sevkiyat-3b516.firebasestorage.app",
  messagingSenderId: "75650825316",
  appId: "1:75650825316:web:7472b08a31d851c2043371"
});
const db   = firebase.firestore();
const auth = firebase.auth();

// ====== UYGULAMA DURUMU ======
const state = {
  ekran: 'giris',
  ekranGecmisi: [],
  kullanici: null,
  profil: null,
  musteriler: [],
  sevkiyatlar: [],
  aktifMusteri: null,
  aktifSevkiyatDetay: null,
  aktifFisler: [],
  aktifFisIdx: null,
  tesseractWorker: null,
  oturumNo: null,
  yoneticiSekme: 'onay',
  yoneticiSevkiyatlar: [],
  unsubscribeFn: null,
};

// Ekran değiştirme — geçmişe ekle + browser history
function ekranGit(yeniEkran) {
  if (state.ekran && state.ekran !== yeniEkran) {
    state.ekranGecmisi.push(state.ekran);
    if (state.ekranGecmisi.length > 20) state.ekranGecmisi.shift();
  }
  state.ekran = yeniEkran;
  history.pushState({ ekran: yeniEkran }, '', '');
  render();
  durumKaydet();
}
function geriDon() {
  if (state.ekranGecmisi.length > 0) {
    state.ekran = state.ekranGecmisi.pop();
  } else {
    state.ekran = state.profil?.rol === 'YONETICI' ? 'yonetici' : 'musteri-listesi';
  }
  render();
  durumKaydet();
}
window.addEventListener('popstate', (e) => {
  // Modal açıksa önce onu kapat
  const modal = document.querySelector('.modal-bg');
  if (modal) { modal.remove(); history.pushState({}, '', ''); return; }
  // Kaydedilmemiş fiş varsa onay sor
  if (state.aktifFisler?.length > 0) {
    history.pushState({}, '', ''); // geri gitmesini engelle
    if (!confirm('Bu oturumdaki tüm fişler kaybolacak. Emin misiniz?')) return;
    state.aktifMusteri = null; state.aktifFisler = []; state.oturumNo = null;
    state.ekranGecmisi = [];
    ekranGit(state.profil?.rol === 'YONETICI' ? 'yonetici' : 'musteri-listesi');
    return;
  }
  geriDon();
});

// Kaydedilmemiş durumu sessionStorage'a yaz
function durumKaydet() {
  try {
    const kayit = {
      ekran: state.ekran,
      ekranGecmisi: state.ekranGecmisi,
      aktifMusteri: state.aktifMusteri,
      aktifFisler: state.aktifFisler?.map(f => ({
        durum: f.durum, veri: f.veri, kaynak: f.kaynak,
        foto: null // fotoğraflar çok büyük, kaydetme
      })) || [],
      oturumNo: state.oturumNo,
      yoneticiSekme: state.yoneticiSekme,
      _sevkiyatNot: state._sevkiyatNot || '',
      aktifSevkiyatDetayId: state.aktifSevkiyatDetay?.fsId || null,
    };
    sessionStorage.setItem('ds_durum', JSON.stringify(kayit));
  } catch(e) {}
}

function durumYukle() {
  try {
    const raw = sessionStorage.getItem('ds_durum');
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

history.replaceState({ ekran: 'giris' }, '', '');
window.addEventListener('beforeunload', (e) => {
  durumKaydet();
  if (state.aktifFisler?.length > 0) {
    e.preventDefault();
    e.returnValue = '';
  }
});
function kullaniciAdiGoster(email) {
  if (!email) return '?';

// Storage: Claude.ai artifact'ta window.storage, diğer ortamlarda (Netlify vb.) localStorage
const Storage = {
  // window.storage var mı? (Claude.ai artifact ortamı)
  _ws: typeof window !== 'undefined' && window.storage && typeof window.storage.set === 'function',
  _PFX: 'ds_',  // localStorage prefix — çakışmaları önler

  async set(key, value) {
    try {
      const v = typeof value === 'string' ? value : JSON.stringify(value);
      if (this._ws) {
        await window.storage.set(key, v);
      } else {
        localStorage.setItem(this._PFX + key, v);
      }
      return true;
    } catch (e) { console.error('Storage.set:', e); return false; }
  },

  async get(key) {
    try {
      if (this._ws) {
        const r = await window.storage.get(key);
        if (!r) return null;
        try { return JSON.parse(r.value); } catch { return r.value; }
      } else {
        const v = localStorage.getItem(this._PFX + key);
        if (v === null) return null;
        try { return JSON.parse(v); } catch { return v; }
      }
    } catch { return null; }
  },

  async delete(key) {
    try {
      if (this._ws) { await window.storage.delete(key); }
      else { localStorage.removeItem(this._PFX + key); }
      return true;
    } catch { return false; }
  },

  async list(prefix) {
    try {
      if (this._ws) {
        const r = await window.storage.list(prefix);
        return r?.keys || [];
      } else {
        const keys = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith(this._PFX + prefix)) {
            keys.push(k.slice(this._PFX.length));
          }
        }
        return keys;
      }
    } catch { return []; }
  },

  async nextId(type) {
    const k = `counter:${type}`;
    const cur = (await this.get(k)) ?? 0;
    const next = (typeof cur === 'number' ? cur : parseInt(cur) || 0) + 1;
    await this.set(k, next);
    return next;
  }
};

// ====== CLAUDE VISION OCR (PRIMARY) ======
async function claudeOcr(imageDataUrl) {
  const match = imageDataUrl.match(/^data:image\/([\w+]+);base64,(.+)$/);
  if (!match) throw new Error('Geçersiz görsel');
  let mediaType = `image/${match[1]}`;
  if (mediaType === 'image/jpg') mediaType = 'image/jpeg';
  const base64Data = match[2];

  // API key: önce storage'dan oku, yoksa artifact ortamını dene (key'siz)
  const apiKey = await Storage.get('app:claudeApiKey');

  const headers = { "Content-Type": "application/json" };
  if (apiKey) {
    // Kullanıcının kendi API key'i ile doğrudan tarayıcı erişimi
    headers['x-api-key'] = apiKey;
    headers['anthropic-version'] = '2023-06-01';
    headers['anthropic-dangerous-direct-browser-access'] = 'true';
  }
  // apiKey yoksa artifact ortamında otomatik yetkilendirme denenecek

  const prompt = `Bu bir Türk deri fabrikası sevkiyat etiketidir. Fotoğraf kıvrımlı veya bozuk bile olsa tüm alanları oku. Etiketteki TÜM bilgileri tam ve doğru biçimde çıkar. YALNIZCA JSON döndür, başka hiçbir şey yazma:

{
  "cins": "ürün cinsi — DLP RUGAN, NATUREL ZENIT, MILANO, ASTAR gibi (birden fazla kelime olabilir)",
  "renk": "SIYAH, KAHVE, BEYAZ vb.",
  "kod": "alfanümerik kod — boş olabilir",
  "kalite": "A, A2, ECO, ECO2, B, C arasından biri",
  "seriNo": "T1 N. satırındaki rakamlar, baştaki sıfırlar dahil (örn: 000000001)",
  "barkod": "barkod altındaki rakamlar (10-14 hane)",
  "deriAdedi": <tam sayı>,
  "toplamYuzeyFt2": <ondalık veya null>,
  "toplamYuzeyDm2": <ondalık veya null>,
  "ortalamaAlanFt2": <ondalık veya null>,
  "ortalamaAlanDm2": <ondalık veya null>,
  "birim": "dm2 veya ft2 — tablodaki değerlerin birimi. 50'den büyükse dm2, küçükse ft2",
  "yuzeyOlcumleri": [
    {"grupNo": <G.N. sütunundaki sayı, 1 veya 6 gibi — bu ölçüm DEĞİL sıra no>, "sira": <satırdaki kaçıncı>, "deger": <ölçüm değeri>}
  ]
}`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers,
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1500,
      messages: [{
        role: "user",
        content: [
          { type: "image", source: { type: "base64", media_type: mediaType, data: base64Data } },
          { type: "text", text: prompt }
        ]
      }]
    })
  });

  if (!response.ok) {
    const errText = await response.text();
    throw new Error(`Claude API: ${response.status} ${errText.substring(0, 100)}`);
  }

  const data = await response.json();
  const text = data.content.map(c => c.type === 'text' ? c.text : '').join('').trim();
  const temizText = text.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/\s*```$/i, '').trim();
  return JSON.parse(temizText);
}

function claudeJsonToInternal(json) {
  const alan = (v, guven = 0.95) => ({
    deger: (v === null || v === undefined) ? '' : v,
    guven: (v === null || v === undefined || v === '') ? 0 : guven,
    ham: '', duzeltildi: false
  });
  const sayiAlan = (v, guven = 0.95) => ({
    deger: (v === null || v === undefined) ? null : v,
    guven: (v === null || v === undefined) ? 0 : guven,
    ham: '', duzeltildi: false
  });

  return {
    cins: alan(json.cins),
    renk: alan(json.renk),
    kod: alan(json.kod),
    kalite: alan(json.kalite),
    seriNo: alan(json.seriNo),
    barkod: alan(json.barkod),
    deriAdedi: { deger: json.deriAdedi || 0, guven: json.deriAdedi ? 0.95 : 0 },
    toplamYuzeyDm2: sayiAlan(json.toplamYuzeyDm2),
    toplamYuzeyFt2: sayiAlan(json.toplamYuzeyFt2),
    ortalamaAlanDm2: sayiAlan(json.ortalamaAlanDm2),
    ortalamaAlanFt2: sayiAlan(json.ortalamaAlanFt2),
    yuzeyDegerleri: (json.yuzeyOlcumleri || []).map(y => ({
      grupNo: y.grupNo || 1,
      sira: y.sira || 1,
      deger: y.deger
    })),
    birim: json.birim || 'ft2',
    dogrulamaUyarilari: [],
    genelGuven: 0.95
  };
}

function dogrula(veri) {
  const uyarilar = [];
  const olcumToplami = veri.yuzeyDegerleri.reduce((s, y) => s + (y.deger || 0), 0);
  const beklenenToplam = veri.birim === 'dm2'
    ? (veri.toplamYuzeyDm2.deger || 0)
    : veri.toplamYuzeyFt2.deger;

  if (beklenenToplam > 0 && Math.abs(olcumToplami - beklenenToplam) > beklenenToplam * 0.02) {
    uyarilar.push(`Yüzey toplamı (${olcumToplami.toFixed(2)}) ≠ Toplam (${beklenenToplam})`);
  }
  if (veri.deriAdedi.deger > 0 && veri.yuzeyDegerleri.length !== veri.deriAdedi.deger) {
    uyarilar.push(`Ölçüm sayısı (${veri.yuzeyDegerleri.length}) ≠ Deri Adedi (${veri.deriAdedi.deger})`);
  }
  // ft²'yi dm²'den hesapla eğer gerçekten eksikse (null, sıfır değil)
  if ((veri.toplamYuzeyFt2.deger == null || veri.toplamYuzeyFt2.deger === 0) && veri.toplamYuzeyDm2.deger) {
    veri.toplamYuzeyFt2.deger = parseFloat((veri.toplamYuzeyDm2.deger / 9.2903).toFixed(2));
    veri.toplamYuzeyFt2.guven = 0.9;
  }
  veri.dogrulamaUyarilari = uyarilar;
  return veri;
}

// ====== GÖRSEL ÖN İŞLEME (Tesseract yedek için) ======
async function gorseliIsle(imageDataUrl) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const minBoyut = 1800;
      const olcek = img.width < minBoyut ? minBoyut / img.width : 1;
      canvas.width = Math.round(img.width * olcek);
      canvas.height = Math.round(img.height * olcek);
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      const w = canvas.width, h = canvas.height;

      // Gri tonlama
      for (let i = 0; i < data.length; i += 4) {
        const gray = Math.round(0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2]);
        data[i] = data[i+1] = data[i+2] = gray;
      }

      // Integral image
      const integral = new Float64Array(w * h);
      for (let y = 0; y < h; y++) {
        let satir = 0;
        for (let x = 0; x < w; x++) {
          const idx = y * w + x;
          satir += data[idx * 4];
          integral[idx] = (y > 0 ? integral[idx - w] : 0) + satir;
        }
      }

      // Bradley adaptive threshold
      const pencere = Math.max(10, Math.floor(Math.min(w, h) / 80));
      const t = 0.15;
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const idx = y * w + x;
          const x1 = Math.max(0, x - pencere);
          const x2 = Math.min(w - 1, x + pencere);
          const y1 = Math.max(0, y - pencere);
          const y2 = Math.min(h - 1, y + pencere);
          const sayi = (x2 - x1 + 1) * (y2 - y1 + 1);
          let toplam = integral[y2 * w + x2];
          if (y1 > 0) toplam -= integral[(y1 - 1) * w + x2];
          if (x1 > 0) toplam -= integral[y2 * w + (x1 - 1)];
          if (y1 > 0 && x1 > 0) toplam += integral[(y1 - 1) * w + (x1 - 1)];
          const piksel = data[idx * 4];
          const yeniDeger = (piksel * sayi < toplam * (1 - t)) ? 0 : 255;
          data[idx * 4] = data[idx * 4 + 1] = data[idx * 4 + 2] = yeniDeger;
        }
      }

      ctx.putImageData(imageData, 0, 0);
      resolve(canvas.toDataURL('image/png'));
    };
    img.src = imageDataUrl;
  });
}

// ====== TESSERACT YEDEK OCR ======
async function tesseractOcr(imageData) {
  if (!state.tesseractWorker) {
    state.tesseractWorker = await Tesseract.createWorker('tur', 1);
    await state.tesseractWorker.setParameters({
      tessedit_pageseg_mode: '6',
      preserve_interword_spaces: '1',
    });
  }
  const islenmis = await gorseliIsle(imageData);
  const { data: { text } } = await state.tesseractWorker.recognize(islenmis);
  return { text, islenmisGorsel: islenmis };
}

// ====== FİŞ PARSER — Google Vision çıktısına göre optimize edilmiş ======
// Google Vision özellikleri:
//  - "Cins DLP RUGAN" (kolon olmayabilir)  ← etiket bazlı çıkartma
//  - "Toplam Yuzey :\n1065 dm2 114.75 ft2" ← değer sonraki satırda olabilir
//  - Yüzey tablosunda her değer ayrı satırda ← hepsi toplanıp boyuta göre gruplandır
const FisParser = {
  alan(d, g)    { return { deger: d || '', guven: d ? g : 0, ham: d || '', duzeltildi: false }; },
  sayiAlan(d,g) { return { deger: d ?? null, guven: (d !== null && d !== undefined) ? g : 0, ham: String(d||''), duzeltildi: false }; },

  ayrist(metin) {
    const satirlar = metin.split('\n').map(s => s.trim()).filter(s => s.length > 0);

    const seriNo = this.seriNoCikar(satirlar);

    // Seri no'dan önceki satırlar = başlık bölgesi
    let seriIdx = satirlar.findIndex(s => /T\s*\d\s*N\b/i.test(s) || /N\.\s*0{3,}/i.test(s));
    if (seriIdx < 0) seriIdx = Math.min(10, satirlar.length);
    const baslik = satirlar.slice(0, seriIdx);

    // Bilinen etiket anahtar kelimeleri — bunlarla başlayan satırlar alan-değer çiftidir
    const ETIKET = [/^[Cc]ins/i, /^[Rr]enk/i, /^[Kk]od/i, /^[Kk]alit/i, /^[Tt]arih/i];

    const degerler = baslik
      .filter(s => ETIKET.some(r => r.test(s)))
      .map(s => {
        const ki = s.indexOf(':');
        const ni = s.search(/\s+\./);
        if (ki > 0) {
          // "Cins :DLP RUGAN" veya "Kod :5221"
          return s.substring(ki + 1).trim().replace(/^[.\s]+/, '').replace(/\s{2,}/g, ' ').trim() || null;
        }
        if (ni > 0) {
          return s.substring(ni).replace(/^\s*\.\s*/, '').trim() || null;
        }
        // "Cins DLP RUGAN" — kolonlar yok, ilk kelime etiket, geri kalanı değer
        const k = s.trim().split(/\s+/);
        return k.length >= 2 ? k.slice(1).join(' ').trim() : null;
      });

    const [cinsV, renkV, kodV, kaliteV] = degerler;
    const kaliteTz = (kaliteV || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
    const kaliteOk = ['A','A2','ECO','ECO2','B','C'].includes(kaliteTz);

    const cins   = this.alan(cinsV,  cinsV  ? 0.92 : 0);
    const renk   = this.alan(renkV,  renkV  ? 0.92 : 0);
    const kod    = this.alan(kodV,   kodV   ? 0.88 : 0);
    const kalite = this.alan(kaliteOk ? kaliteTz : (kaliteV||''), kaliteOk ? 0.95 : (kaliteV ? 0.5 : 0));

    const barkod    = this.barkodCikar(satirlar);
    const deriAdedi = this.deriAdediCikar(satirlar);
    const { dm2: toplamDm2, ft2: toplamFt2 } = this.toplamYuzeyCikar(satirlar);
    const { dm2: ortDm2,    ft2: ortFt2    } = this.ortalamaAlanCikar(satirlar);

    const birim  = toplamDm2.deger ? 'dm2' : 'ft2';
    const yuzeyler = this.yuzeyTablosuCikar(satirlar, birim, deriAdedi.deger);

    let ft2Final = toplamFt2.deger;
    if (!ft2Final && toplamDm2.deger) ft2Final = parseFloat((toplamDm2.deger / 9.2903).toFixed(2));

    const uyarilar = [];
    // Sadece toplam yüzey + adet kontrolü
    if (!toplamDm2.deger && !toplamFt2.deger) {
      uyarilar.push('Toplam yüzey okunamadı — kontrol edin');
    }

    const gArr = [cins.guven, renk.guven, seriNo.guven, deriAdedi.guven, Math.max(toplamFt2.guven, toplamDm2.guven)];
    const genelGuven = gArr.reduce((a,b) => a+b, 0) / gArr.length;

    return {
      cins, renk, kod, kalite, seriNo, barkod, deriAdedi,
      toplamYuzeyDm2: toplamDm2,
      toplamYuzeyFt2: { ...toplamFt2, deger: ft2Final },
      ortalamaAlanDm2: ortDm2, ortalamaAlanFt2: ortFt2,
      yuzeyDegerleri: yuzeyler, birim,
      dogrulamaUyarilari: uyarilar, genelGuven
    };
  },

  seriNoCikar(satirlar) {
    for (const s of satirlar) {
      const m = s.match(/T\s*\d\s*N[.,]?\s*([\d\s]{5,15})/i);
      if (m) {
        const d = m[1].replace(/\D/g,'').padStart(9,'0');
        return { deger: d, guven: 0.93, ham: s, duzeltildi: false };
      }
      const m2 = s.match(/N\.\s*(0{3,}\d+)/i);
      if (m2) return { deger: m2[1], guven: 0.88, ham: s, duzeltildi: false };
    }
    return { deger: '', guven: 0, ham: '', duzeltildi: false };
  },

  barkodCikar(satirlar) {
    for (const s of satirlar) {
      // Seri no satırlarını atla
      if (/T\s*\d\s*N\b/i.test(s) || /N\.\s*0{3,}/i.test(s)) continue;
      const t = s.replace(/[^0-9]/g,'');
      const m = t.match(/(\d{10,14})/);
      // Başı 5'ten fazla sıfırla başlayan dizi seri no'dur, barkod değil
      if (m && !/^0{5,}/.test(m[1])) return { deger: m[1], guven: 0.85, ham: s, duzeltildi: false };
    }
    return { deger: '', guven: 0, ham: '', duzeltildi: false };
  },

  deriAdediCikar(satirlar) {
    for (const s of satirlar) {
      if (/adedi?|aded/i.test(s)) {
        const m  = s.match(/:\s*(\d+)/);
        if (m) return { deger: parseInt(m[1]),  guven: 0.92, ham: s, duzeltildi: false };
        const m2 = s.match(/\s(\d+)\s*$/);
        if (m2) return { deger: parseInt(m2[1]), guven: 0.85, ham: s, duzeltildi: false };
      }
    }
    return { deger: 0, guven: 0, ham: '', duzeltildi: false };
  },

  ft2Bul(satir) {
    let m = satir.match(/([\d]+[.,]?[\d]*)\s*(?:ft[2²]|FT2)/i);
    if (m) return parseFloat(m[1].replace(',','.'));
    m = satir.match(/([\d]+[.,][\d]+)\s*t[2²]\b/i);
    if (m) return parseFloat(m[1].replace(',','.'));
    const dm = satir.match(/([\d.]+)\s*dm[2²]/i);
    if (dm) {
      const rest = satir.slice(satir.indexOf(dm[0]) + dm[0].length);
      const n = rest.match(/([\d]+[.,][\d]+)/);
      if (n) return parseFloat(n[1].replace(',','.'));
    }
    return null;
  },

  // "Toplam Yuzey :" ve rakamlar sonraki satırda olabilir
  toplamYuzeyCikar(satirlar) {
    for (let i = 0; i < satirlar.length; i++) {
      const s = satirlar[i];
      if (/topl/i.test(s) && !/ortal/i.test(s)) {
        const etkin = /\d/.test(s) ? s : (s + ' ' + (satirlar[i+1]||''));
        const dm2M  = etkin.match(/([\d]+[.,]?[\d]*)\s*dm[2²]/i);
        const dm2   = dm2M ? parseFloat(dm2M[1].replace(',','.')) : null;
        const ft2   = this.ft2Bul(etkin);
        return {
          dm2: this.sayiAlan(dm2, 0.92),
          ft2: { deger: ft2||0, guven: ft2 ? 0.92 : 0, ham: etkin, duzeltildi: false }
        };
      }
    }
    return { dm2: this.sayiAlan(null,0), ft2: { deger:0, guven:0, ham:'', duzeltildi:false } };
  },

  ortalamaAlanCikar(satirlar) {
    for (let i = 0; i < satirlar.length; i++) {
      const s = satirlar[i];
      if (/ortal/i.test(s)) {
        const etkin = /\d/.test(s) ? s : (s + ' ' + (satirlar[i+1]||''));
        const dm2M  = etkin.match(/([\d]+[.,]?[\d]*)\s*dm[2²]/i);
        const ft2M  = etkin.match(/([\d]+[.,][\d]+)\s*ft[2²]/i);
        const dm2   = dm2M ? parseFloat(dm2M[1].replace(',','.')) : null;
        const ft2   = ft2M ? parseFloat(ft2M[1].replace(',','.')) : null;
        return { dm2: this.sayiAlan(dm2,0.88), ft2: this.sayiAlan(ft2,0.88) };
      }
    }
    return { dm2: this.sayiAlan(null,0), ft2: this.sayiAlan(null,0) };
  },

  yuzeyTablosuCikar(satirlar, birim, deriAdedi) {
    // G.N. sırası: 1, 6, 11, 16... (her satırda max 5 deri)
    // G.N. tespiti için MIN threshold değil, SIRALAMA kullan
    // Bu sayede küçük ölçüm değerleri (ör: 25 dm²) yanlışlıkla G.N. sayılmaz

    const MAX = birim === 'dm2' ? 3000 : 300;
    let ici = false;
    const tumSayilar = [];

    for (const s of satirlar) {
      const lc = s.toLowerCase().replace(/\s/g,'');
      if (lc.includes('yuzey') && !lc.includes('toplam') && !lc.includes('ortal')) { ici = true; continue; }
      if (/deri|toplam|ortal/i.test(s)) { ici = false; continue; }
      if (!ici) continue;

      s.split(/\s+/)
        .map(t => parseFloat(t.replace(/[^0-9.,]/g,'').replace(',','.')))
        .filter(n => !isNaN(n) && n > 0)
        .forEach(n => tumSayilar.push(n));
    }

    const sonuc = [];
    let gnNo = null, sira = 0;
    let beklenecekGN = 1;  // İlk G.N. her zaman 1'dir

    for (const n of tumSayilar) {
      // G.N. tespiti: beklenen sıradaki değer mi? (1, 6, 11, 16...)
      if (Number.isInteger(n) && n === beklenecekGN) {
        gnNo = n;
        sira = 0;
        beklenecekGN = n + 5;  // Sonraki G.N. +5 olmalı
      } else if (gnNo !== null && n > 0 && n <= MAX) {
        sira++;
        sonuc.push({ grupNo: gnNo, sira, deger: n });
      }
    }

    // G.N. hiç bulunamadıysa → tüm sayıları ölçüm olarak yorumla
    if (sonuc.length === 0 && tumSayilar.length > 0) {
      const olcumler = tumSayilar.filter(n => n > 0 && n <= MAX);
      olcumler.forEach((n, i) => sonuc.push({ grupNo: 1, sira: i + 1, deger: n }));
    }

    // Eğer deri adedi biliniyorsa ve sayı tutmuyorsa düzeltmeyi dene
    if (deriAdedi > 0 && sonuc.length !== deriAdedi && sonuc.length > 0) {
      // Fazla ölçüm var: muhtemelen bir G.N. değeri ölçüm sayıldı
      // Sadece uyarı için bırak, kayıt engelleme logic'i dışarıda
    }

    return sonuc;
  }
};

// ====== GOOGLE CLOUD VISION API (DOCUMENT_TEXT_DETECTION) ======
async function googleVisionOcr(imageDataUrl) {
  const apiKey = await Storage.get('app:googleApiKey');
  if (!apiKey) throw new Error('Google Vision API anahtarı girilmemiş');

  const match = imageDataUrl.match(/^data:image\/([\w+]+);base64,(.+)$/);
  if (!match) throw new Error('Geçersiz görsel');
  const base64Data = match[2];

  const response = await fetch(
    `https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        requests: [{
          image: { content: base64Data },
          features: [{ type: 'DOCUMENT_TEXT_DETECTION', maxResults: 1 }]
        }]
      })
    }
  );

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(`Google Vision ${response.status}: ${err.error?.message || ''}`);
  }

  const data = await response.json();
  const result = data.responses?.[0];
  if (result?.error) throw new Error(`Google Vision: ${result.error.message}`);

  const text = result?.fullTextAnnotation?.text || '';
  if (!text) throw new Error('Google Vision: metni bulamadı');
  return text;
}

function aiJsonToInternal(json) {
  const a = (v, g = 0.95) => ({
    deger: (v === null || v === undefined) ? '' : String(v),

    ham: '', duzeltildi: false
  });
  return {
    cins: a(json.cins), renk: a(json.renk), kod: a(json.kod), kalite: a(json.kalite),
    seriNo: a(json.seriNo), barkod: a(json.barkod),

// Akış: Claude Vision (resim → yapılandırılmış JSON) → parser yedek
async function ocrYap(imageData, onProgress) {

  // ADIM 1: Claude Vision — resmi doğrudan okur ve yorumlar
  try {
    onProgress?.('Claude Vision okuyor...', 0.4);
    const json = await claudeOcr(imageData);
    const veri = dogrula(claudeJsonToInternal(json));
    return { veri, kaynak: 'claude', hamMetin: JSON.stringify(json, null, 2) };
  } catch (e) {
    console.warn('Claude Vision:', e.message);
    toast('⚠ Claude: ' + e.message.substring(0, 60), 3000);
  }

  // ADIM 2: Google Vision (isteğe bağlı, key varsa)
  const googleKey = await Storage.get('app:googleApiKey');
  if (googleKey) {
    try {
      onProgress?.('Google Vision...', 0.3);
      const ocrText = await googleVisionOcr(imageData);
      // Google text → Claude text yorumlama
      const claudeKey2 = await Storage.get('app:claudeApiKey');
      if (claudeKey2) {
        try {
          onProgress?.('Claude yorumluyor...', 0.6);
          const json = await claudeMetinYorumla(ocrText);
          const veri = dogrula(aiJsonToInternal(json));
          return { veri, kaynak: 'google', hamMetin: ocrText };
        } catch(e2) {}
      }
      // Sadece parser ile dene
      const veri = dogrula(FisParser.ayrist(ocrText));
      veri.dogrulamaUyarilari.unshift('ℹ Claude yorumlama atlandı — parser sonucu');
      return { veri, kaynak: 'google', hamMetin: ocrText };
    } catch(e) {
      console.warn('Google Vision:', e.message);
    }
  }

  // ADIM 3: Tesseract son çare
  onProgress?.('Tesseract OCR...', 0.2);
  const { text } = await tesseractOcr(imageData);
  const veri = dogrula(FisParser.ayrist(text));
  veri.dogrulamaUyarilari.unshift('⚠ Bulut OCR başarısız — Tesseract kullanıldı');
  return { veri, kaynak: 'tesseract', hamMetin: text };
}

// Sevkiyat numarasını Firestore transaction ile üretir — eşzamanlı çakışmayı önler
async function uretSevkiyatNo() {
  try {
    const ref = db.collection('sayaclar').doc('sevkiyat');
    const yeni = await db.runTransaction(async tx => {
      const doc = await tx.get(ref);
      const mevcut = doc.exists ? (doc.data().son || 0) : 0;
      const sonraki = mevcut + 1;
      tx.set(ref, { son: sonraki }, { merge: true });
      return sonraki;
    });
    localStorage.setItem('ds_sevkiyat_sayac', String(yeni));
    return `S-${String(yeni).padStart(4, '0')}`;
  } catch(e) {
    // Firestore erişilemezse yerel sayaca düş (çevrimdışı yedek)
    console.warn('Sevkiyat no transaction hatası, yerel sayaç:', e.message);
    const tumSevk = (state.sevkiyatlar || []).concat(state.yoneticiSevkiyatlar || []);
    let max = 0;
    for (const s of tumSevk) {
      const m = (s.sevkiyatNo || '').match(/^S-(\d+)$/);
      if (m) { const n = parseInt(m[1], 10); if (n > max) max = n; }
    }
    const kayitliMax = parseInt(localStorage.getItem('ds_sevkiyat_sayac') || '0', 10);
    const yeni = Math.max(max, kayitliMax) + 1;
    localStorage.setItem('ds_sevkiyat_sayac', String(yeni));
    return `S-${String(yeni).padStart(4, '0')}`;
  }
}

function fotoSikistir(dataUrl, maxW = 600, kalite = 0.45) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const oran = Math.min(maxW / img.width, 1);
      canvas.width = img.width * oran;
      canvas.height = img.height * oran;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', kalite));
    };
    img.onerror = () => resolve(null);
    img.src = dataUrl;
  });
}

async function apiTestEt() {
  const claudeKey = document.getElementById('set-claude-key').value.trim();
  const googleKey = document.getElementById('set-google-key').value.trim();
  const sonucEl = document.getElementById('test-sonuc');
  const btn = document.getElementById('test-btn');

  if (!claudeKey) {
    sonucEl.style.display = 'block';
    sonucEl.style.background = '#ffeeba';
    sonucEl.textContent = '⚠ Claude API anahtarını girin';
    return;
  }

  btn.textContent = 'Test ediliyor...';
  btn.disabled = true;
  sonucEl.style.display = 'block';
  sonucEl.style.background = '#f0f0f0';
  let mesajlar = [];

  // 1. Claude API testi (zorunlu)
  sonucEl.textContent = '⏳ Claude AI test ediliyor...';
  let claudeOk = false;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'x-api-key': claudeKey,
        'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
      body: JSON.stringify({ model:'claude-haiku-4-5-20251001', max_tokens:10, messages:[{role:'user',content:'OK'}] })
    });
    const d = await res.json();
    if (!res.ok) throw new Error(d.error?.message || res.status);
    claudeOk = true;
    mesajlar.push('✅ Claude AI çalışıyor');
  } catch(e) { mesajlar.push('❌ Claude API: ' + e.message); }

  // 2. Google Vision testi (isteğe bağlı)
  if (googleKey) {
    sonucEl.textContent = '⏳ Google Vision test ediliyor...';
    try {
      const testPng = 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI6QAAAABJRU5ErkJggg==';
      const res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${googleKey}`,
        { method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({requests:[{image:{content:testPng},features:[{type:'DOCUMENT_TEXT_DETECTION'}]}]}) });
      const d = await res.json();
      if (!res.ok) throw new Error(d.error?.message || res.status);
      mesajlar.push('✅ Google Vision çalışıyor');
    } catch(e) { mesajlar.push('⚠ Google Vision: ' + e.message + ' (isteğe bağlı)'); }
  }

  sonucEl.style.background = claudeOk ? '#d5f5e3' : '#ffd5d5';
  sonucEl.innerHTML = mesajlar.join('<br>') +
    (claudeOk ? '<br><br><b>🎯 Claude hazır! Kaydedin ve fiş çekin.</b>' : '');
  btn.textContent = 'Test Et';
  btn.disabled = false;
}

async function tumSevkiyatlariSil() {
  if (!confirm('⚠ TÜM sevkiyatlar kalıcı olarak silinecek! Emin misiniz?')) return;
  if (!confirm('Son şans — geri alınamaz! Devam?')) return;
  try {
    const snap = await db.collection('sevkiyatlar').get();
    // Her sevkiyatın fotograflar alt koleksiyonunu da sil
    for (const doc of snap.docs) {
      if ((doc.data().fotoSayisi || 0) > 0) {
        const fotoSnap = await doc.ref.collection('fotograflar').get();
        if (!fotoSnap.empty) {
          const fb = db.batch();
          fotoSnap.docs.forEach(f => fb.delete(f.ref));
          await fb.commit();
        }
      }
    }
    const batch = db.batch();
    snap.docs.forEach(d => batch.delete(d.ref));
    await batch.commit();
    state.yoneticiSevkiyatlar = [];
    state.sevkiyatlar = [];
    toast('✓ Tüm sevkiyatlar silindi');
    render();
  } catch(e) { toast('❌ ' + e.message, 3000); }
}

async function tumMusterileriSil() {
  if (!confirm('⚠ TÜM müşteriler kalıcı olarak silinecek! Emin misiniz?')) return;

function ekranTopluCekim() {
  const m = state.aktifMusteri;
  const fisler = state.aktifFisler;
  const ist = {
    toplam: fisler.length,
    isleniyor: fisler.filter(f => f.durum === 'isleniyor' || f.durum === 'beklemede').length,
    hazir: fisler.filter(f => f.durum === 'hazir').length,
    hatali: fisler.filter(f => f.durum === 'hata').length,
  };

  const fisKartlari = fisler.slice().reverse().map((f, i) => {
    const idx = fisler.length - 1 - i;
    const sira = idx + 1;

    if (f.durum === 'isleniyor' || f.durum === 'beklemede') {
      return `<div onclick="fisDuzelt(${idx})" style="display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);color:var(--amber);cursor:pointer">

        <div style="flex:1">⏱ ${f.durum === 'beklemede' ? 'Beklemede...' : 'Okunuyor...'}</div>
      </div>`;
    } else if (f.durum === 'hata') {
      return `<div onclick="fisDuzelt(${idx})" style="display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);background:rgba(220,38,38,0.08);border-left:3px solid var(--red);cursor:pointer">
        <div style="width:28px;text-align:center;font-weight:700;color:var(--red)">${sira}</div>
        <div style="flex:1;font-size:13px;color:var(--red)">⚠ ${escapeHtml((f.hata || 'Hata').substring(0, 50))}</div>
      </div>`;
    }

    const v = f.veri;
    const tamOk = v.cins.deger && v.renk.deger && v.deriAdedi.deger > 0 && (v.toplamYuzeyDm2?.deger > 0 || v.toplamYuzeyFt2?.deger > 0);

    const satirStil = tamOk
      ? 'border-bottom:1px solid var(--line)'

      : '<span style="color:#fff;font-weight:700;font-size:10px;background:var(--red);padding:2px 6px;border-radius:4px">Kontrol</span>';

    return `<div onclick="fisDuzelt(${idx})" style="display:flex;align-items:center;gap:10px;padding:12px 14px;${satirStil};cursor:pointer">
      <div style="width:28px;text-align:center;font-weight:700;color:var(--ink-faint)">${sira}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.cins.deger||'?'} · ${v.renk.deger||'?'}</div>
        <div style="font-size:12px;color:var(--ink-soft);margin-top:2px">${v.kod.deger||'-'} · ${v.deriAdedi.deger}ad · <b>${(v.toplamYuzeyDm2?.deger||0).toFixed(0)}</b>dm² · ${(v.toplamYuzeyFt2?.deger||0).toFixed(2)}ft²</div>
      </div>
      <div style="flex-shrink:0">${durum}</div>
    </div>`;
  }).join('');

  return `
    <div class="topbar">
      <button onclick="oturumIptal()" style="font-size:13px">‹ Vazgeç</button>
      <div class="brand mono" style="font-size:14px">${state.oturumNo}</div>

      <div class="lock">🔒 Kilitli</div>
    </div>

      <div class="stat"><div class="value">${ist.toplam}</div><div class="label">Toplam</div></div>
      <div class="stat processing"><div class="value">${ist.isleniyor}</div><div class="label">İşleniyor</div></div>
      <div class="stat ready"><div class="value">${ist.hazir}</div><div class="label">Hazır</div></div>
      <div class="stat error"><div class="value">${ist.hatali}</div><div class="label">Hatalı</div></div>
    </div>
    <div class="content">
      ${fisler.length === 0 ? `

let kuyrukAktif = false;
// ====== ÖĞRENME MEKANİZMASI — KOD MERKEZLİ ======
// Kod en güvenilir tanımlayıcı: OCR sayıları harflerden daha iyi okur
// Öğrenme yapısı: Kod → {cins, renk} eşlemesi

async function ogrenilenleriKaydet(cins, kod, renk) {
  if (!kod) return; // Kod yoksa öğrenme yapma

  const kodTemiz = kod.toUpperCase().trim();
  const harita = await Storage.get('app:kod_bilgisi') || {};

  harita[kodTemiz] = {
    cins:  (cins  || harita[kodTemiz]?.cins  || '').toUpperCase().trim(),
    renk:  (renk  || harita[kodTemiz]?.renk  || '').toUpperCase().trim(),
    sayim: (harita[kodTemiz]?.sayim || 0) + 1  // kaç kez görüldü
  };

  await Storage.set('app:kod_bilgisi', harita);
}

async function ogrenilmistenIyilestir(veri) {
  const harita = await Storage.get('app:kod_bilgisi') || {};

  const kodOku = (veri.kod.deger || '').toUpperCase().trim();

  if (kodOku && harita[kodOku]) {
    // ✅ Kod biliniyor → cins ve rengi otomatik doldur
    const bilgi = harita[kodOku];
    if (bilgi.cins && !veri.cins.deger) {
      veri.cins.deger = bilgi.cins;
      veri.cins.guven = 0.97;
    }
    if (bilgi.renk && !veri.renk.deger) {
      veri.renk.deger = bilgi.renk;
      veri.renk.guven = 0.92;
    }
    // Zaten okunanlarla çelişiyorsa düşük güven ver (fark var)
    if (bilgi.cins && veri.cins.deger && bilgi.cins !== veri.cins.deger.toUpperCase()) {
      veri.cins.guven = Math.min(veri.cins.guven, 0.6); // sarı göster
    }
    return veri;
  }

  // Kod okunamadı ama cins biliniyor → ters eşleşme dene
  const cinsOku = (veri.cins.deger || '').toUpperCase().trim();
  if (cinsOku) {
    const eslesen = Object.entries(harita)
      .filter(([_, b]) => b.cins && (b.cins.includes(cinsOku) || cinsOku.includes(b.cins)))
      .sort((a, b) => b[1].sayim - a[1].sayim); // En çok görüleni önce

    if (eslesen.length === 1) {
      // Tek eşleşme → güvenle doldur
      veri.kod.deger = eslesen[0][0];
      veri.kod.guven = 0.82;
    }
  }

  return veri;
}

// Fişin doğrulanması gereken kritik sorunları var mı?
function dogrulamaGerekiyor(veri) {
  if (!veri) return false;
  if (!veri.cins.deger || !veri.renk.deger) return true;
  if (!veri.deriAdedi.deger || veri.deriAdedi.deger <= 0) return true;
  if (!veri.toplamYuzeyDm2?.deger && !veri.toplamYuzeyFt2?.deger) return true;
  return false;
}

async function islemKuyruguIsle() {
  if (kuyrukAktif) return;
  const bekleyen = state.aktifFisler.find(f => f.durum === 'beklemede');
  if (!bekleyen) return;
  kuyrukAktif = true;
  bekleyen.durum = 'isleniyor';
  render();
  try {
    const sonuc = await ocrYap(bekleyen.foto);
    // Öğrenilmiş bilgilerle iyileştir
    sonuc.veri = await ogrenilmistenIyilestir(sonuc.veri);
    bekleyen.veri = sonuc.veri;
    bekleyen.hamMetin = sonuc.hamMetin;
    bekleyen.kaynak = sonuc.kaynak;
    bekleyen.islenmisGorsel = sonuc.islenmisGorsel;
    // Doğrulama gerekiyorsa özel işaret
    bekleyen.dogrulamaGerek = dogrulamaGerekiyor(sonuc.veri);
    bekleyen.durum = 'hazir';
    titret(30);
  } catch (e) {
    bekleyen.durum = 'hata';
    bekleyen.hata = e.message || 'OCR başarısız';
    toast('❌ ' + (e.message || 'OCR başarısız').substring(0, 80), 4000);
  }
  kuyrukAktif = false;
  render();
  setTimeout(islemKuyruguIsle, 100);
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ====== YÜZEY ÖLÇÜM YARDIMCILARI ======
function yuzeyToplamGuncelle() {
  const inputs = document.querySelectorAll('[id^="yuzey-"]');
  let toplam = 0;
  inputs.forEach(inp => { toplam += parseFloat(inp.value) || 0; });

  const hesapEl = document.getElementById('yuzey-hesap');
  const durumEl = document.getElementById('yuzey-durum');
  const barEl   = document.getElementById('yuzey-toplam-bar');
  if (!hesapEl) return;

  hesapEl.textContent = toplam.toFixed(2);

  const fis = state.aktifFisler[state.aktifFisIdx];
  if (!fis) return;
  const v = fis.veri;
  const beklenen = v.birim === 'dm2' ? (v.toplamYuzeyDm2.deger || 0) : (v.toplamYuzeyFt2.deger || 0);
  const adet = parseInt(document.getElementById('d-adet')?.value) || 0;
  const olcumSayisi = [...inputs].filter(i => (parseFloat(i.value) || 0) > 0).length;

  const toplamTutuyor = beklenen <= 0 || Math.abs(toplam - beklenen) <= beklenen * 0.03;
  const adetTutuyor   = adet <= 0 || olcumSayisi === adet;

  if (durumEl) durumEl.textContent = (toplamTutuyor && adetTutuyor) ? '✅' : '⚠';
  if (barEl) {
    barEl.style.background = (toplamTutuyor && adetTutuyor) ? 'var(--green-soft)' : 'var(--red-soft)';
    barEl.style.borderLeft = (toplamTutuyor && adetTutuyor) ? '3px solid var(--green)' : '3px solid var(--red)';
  }
}

async function fisOnayla(idx) {
  const fis = state.aktifFisler[idx];
  const v = fis.veri;

  // Temel alanları güncelle

  const ft2Val = parseFloat(document.getElementById('d-toplamft')?.value) || 0;
  v.toplamYuzeyDm2.deger = dm2Val || (ft2Val ? parseFloat((ft2Val * 9.2903).toFixed(1)) : 0);
  v.toplamYuzeyFt2.deger = ft2Val || (dm2Val ? parseFloat((dm2Val / 9.2903).toFixed(2)) : 0);
  v.yuzeyDegerleri = [];

  // Basit doğrulama — eksik alan uyarısı (kayıt engellenmez)
  if (!v.cins.deger) toast('⚠ Cins boş — kontrol edin', 2000);

  fis.durum = 'onaylandi';
  fis.dogrulamaGerek = false;

  await ogrenilenleriKaydet(v.cins.deger, v.kod.deger, v.renk.deger);

  toast('✓ Onaylandı — ' + ogrenilenBilgi);
  render();

// ====== GRUPLAMA — Kod + Kalite (ECO ayrı) ======
function derilerGrupla(deriler) {
  const gruplar = {};
  deriler.forEach(d => {
    const kalRaw = typeof d.kalite === 'string' ? d.kalite : (d.kalite?.deger || d.veri?.kalite?.deger || '');
    const kal = String(kalRaw).toUpperCase();
    const isEco = kal.startsWith('ECO');
    const kodRaw = typeof d.kod === 'string' ? d.kod : (d.kod?.deger || d.veri?.kod?.deger || '?');
    const kod = String(kodRaw);
    const key = `${kod}_${isEco ? 'ECO' : 'STD'}`;
    if (!gruplar[key]) {
      const cinsRaw = typeof d.cins === 'string' ? d.cins : (d.cins?.deger || d.veri?.cins?.deger || '?');
      const renkRaw = typeof d.renk === 'string' ? d.renk : (d.renk?.deger || d.veri?.renk?.deger || '?');
      gruplar[key] = {
        kod, cins: String(cinsRaw), renk: String(renkRaw),
        ecoGrup: isEco, kaliteler: new Set(),
        toplamAdet: 0, toplamDm2: 0, toplamFt2: 0,
        fisler: []
      };
    }
    gruplar[key].kaliteler.add(kal);
    const adet = typeof d.deriAdedi === 'number' ? d.deriAdedi : (d.deriAdedi?.deger || d.veri?.deriAdedi?.deger || 0);
    const dm2 = typeof d.toplamYuzeyDm2 === 'number' ? d.toplamYuzeyDm2 : (d.toplamYuzeyDm2?.deger || d.veri?.toplamYuzeyDm2?.deger || 0);
    const ft2 = typeof d.toplamYuzeyFt2 === 'number' ? d.toplamYuzeyFt2 : (d.toplamYuzeyFt2?.deger || d.veri?.toplamYuzeyFt2?.deger || 0);
    gruplar[key].toplamAdet += adet;
    gruplar[key].toplamDm2  += dm2;
    gruplar[key].toplamFt2  += ft2;
    gruplar[key].fisler.push(d);
  });
  return Object.values(gruplar).sort((a,b) => {
    if (a.kod !== b.kod) return (a.kod||'').localeCompare(b.kod||'');
    return a.ecoGrup ? 1 : -1;
  });
}

// ====== EKRAN: İNCELEME ======
function ekranInceleme() {
  const m = state.aktifMusteri;
  const onayli = state.aktifFisler.filter(f => f.durum === 'hazir' || f.durum === 'onaylandi');
  const toplamAdet = onayli.reduce((s, f) => s + (f.veri.deriAdedi.deger || 0), 0);
  const toplamDm2  = onayli.reduce((s, f) => s + (f.veri.toplamYuzeyDm2?.deger || 0), 0);
  const toplamFt2  = onayli.reduce((s, f) => s + (f.veri.toplamYuzeyFt2?.deger || 0), 0);

  // Grupla — kod + eco ayrımı
  const grupDeriler = onayli.map(f => f.veri);
  const gruplar = derilerGrupla(grupDeriler);
  const stdGruplar = gruplar.filter(g => !g.ecoGrup);
  const ecoGruplar = gruplar.filter(g => g.ecoGrup);
  const stdDm2 = stdGruplar.reduce((s,g) => s + g.toplamDm2, 0);
  const ecoDm2 = ecoGruplar.reduce((s,g) => s + g.toplamDm2, 0);

  const grupHtml = gruplar.map(g => grupKartiHtml(g)).join('');

  // Tek tek fişler (düzenleme için tıklanabilir)
  const fisListesi = onayli.map(f => {
    const idx = state.aktifFisler.indexOf(f);
    const v = f.veri;
    return `<div onclick="fisDuzelt(${idx})" style="display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--line);cursor:pointer;font-size:13px">
      <span style="width:24px;color:var(--ink-faint);font-weight:700">${idx+1}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(v.cins.deger)} · ${escapeHtml(v.kod.deger)} · ${escapeHtml(v.kalite.deger)}</span>
      <span class="mono">${v.deriAdedi.deger}ad</span>
      <span class="mono" style="color:var(--ink-soft)">${(v.toplamYuzeyDm2?.deger||0).toFixed(0)}</span>
    </div>`;
  }).join('');

  return `
    <div class="topbar">
      <button onclick="geriDon();" style="font-size:13px">‹ Geri</button>
      <div class="brand mono" style="font-size:14px">${state.oturumNo}</div>
      <div style="width:80px"></div>
    </div>
    <div class="content">
      <div class="summary">
        <div class="customer-name">${escapeHtml(m.ad)}</div>
        <div class="code">${escapeHtml(m.kod)}</div>
        <div class="summary-grid">
          <div class="item"><div class="value">${onayli.length}</div><div class="label">Paket</div></div>
          <div class="item"><div class="value">${toplamAdet}</div><div class="label">Deri</div></div>
          <div class="item">
            <div class="value">${toplamDm2.toFixed(0)}</div>
            <div class="label">dm²</div>
            <div style="font-size:10px;opacity:0.7">${toplamFt2.toFixed(2)} ft²</div>
          </div>
        </div>
        ${ecoGruplar.length > 0 ? `
        <div style="display:flex;gap:12px;margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.1);font-size:12px">
          <span>Standart: <b>${stdDm2.toFixed(0)}</b> dm²</span>
          <span style="color:var(--amber)">ECO: <b>${ecoDm2.toFixed(0)}</b> dm²</span>
        </div>` : ''}
      </div>

      <div class="section-title">Ürün Grupları (${gruplar.length})</div>
      ${grupHtml}

      <details style="margin-top:12px">
        <summary style="cursor:pointer;font-size:13px;color:var(--ink-soft);padding:8px 0">📋 Tüm Paketler (${onayli.length}) — düzenlemek için tıklayın</summary>
        <div style="background:var(--bg-card);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-top:8px">
          ${fisListesi}
        </div>
      </details>
    </div>
    <div class="bottom-bar">
      <button class="btn secondary" onclick="ekranGit('toplu-cekim');">Daha Çek</button>
      <button class="btn secondary" onclick="notEkleDialog()" style="padding:14px 12px">📝 Not</button>
      <button class="btn gold" onclick="sevkiyatKaydet()" ${onayli.length === 0 ? 'disabled' : ''}>Sevkiyatı Kaydet</button>
    </div>`;
}

async function sevkiyatKaydet() {
  const onayli = state.aktifFisler.filter(f => f.durum === 'hazir' || f.durum === 'onaylandi');
  if (onayli.length === 0) { toast('Kayıt edilecek onaylı fiş yok', 2000); return; }
  if (state._kayitYapiliyor) return;
  state._kayitYapiliyor = true;
  toast('⏳ Kaydediliyor...', 5000);

  try {
    const m = state.aktifMusteri;
    if (!m) throw new Error('Aktif müşteri bulunamadı');

    // Giriş kontrolü
    const uid = state.kullanici?.uid;
    if (!uid) throw new Error('Oturum açık değil — lütfen tekrar giriş yapın');

    const musteriiBirim = m.tercihBirim || 'dm2';
    const toplamAdet = onayli.reduce((s, f) => s + (f.veri?.deriAdedi?.deger || 0), 0);
    const toplamDm2  = onayli.reduce((s, f) => s + (f.veri?.toplamYuzeyDm2?.deger || 0), 0);
    const toplamFt2  = onayli.reduce((s, f) => s + (f.veri?.toplamYuzeyFt2?.deger || 0), 0);

    // Fotoğrafları sıkıştır
    const deriler = await Promise.all(onayli.map(async f => {
      let foto = null;
      if (f.foto) {
        try { foto = await fotoSikistir(f.foto, 600, 0.45); } catch(e) {}
      }
      const v = f.veri || {};
      return {
        cins: v.cins?.deger || '', renk: v.renk?.deger || '', kod: v.kod?.deger || '',
        kalite: v.kalite?.deger || '', seriNo: v.seriNo?.deger || '', barkod: v.barkod?.deger || '',
        deriAdedi: v.deriAdedi?.deger || 0,
        toplamYuzeyFt2: v.toplamYuzeyFt2?.deger || 0, toplamYuzeyDm2: v.toplamYuzeyDm2?.deger || 0,
        birim: v.birim || 'dm2', yuzeyOlcumleri: v.yuzeyDegerleri || [],
        okumaGuveni: v.genelGuven || 0, kaynak: f.kaynak || 'bilinmiyor',
        foto
      };
    }));

    const sevkiyat = {
      sevkiyatNo: state.oturumNo,
      musteriId: m.id, musteriAd: m.ad, musteriKod: m.kod || '',
      musteriiBirim,
      tarih: Date.now(), durum: 'TAMAMLANDI',
      toplamAdet, toplamYuzeyDm2: toplamDm2, toplamYuzeyFt2: toplamFt2,
      toplamYuzey: toplamDm2,
      personelId: uid,
      personelAd: state.profil?.ad || state.kullanici?.email || 'Bilinmiyor',
      kontrolDurumu: 'beklemede',
      not: state._sevkiyatNot || '',
      deriler
    };

    // Fotoğrafları ana doc'tan ayır (Firestore 1MB limiti)
    // Her fotoğrafı ait olduğu deri (paket) index'i ile sakla — eşleşme kayması olmasın
    const fotoKayitlari = [];
    sevkiyat.deriler.forEach((d, idx) => { if (d.foto) fotoKayitlari.push({ deriIndex: idx, foto: d.foto }); });
    sevkiyat.deriler = sevkiyat.deriler.map(d => { const { foto, ...rest } = d; return rest; });
    sevkiyat.fotoSayisi = fotoKayitlari.length;
    sevkiyat.fotoIndeksleri = fotoKayitlari.map(f => f.deriIndex);

    // Firestore'a kaydet
    const docRef = await db.collection('sevkiyatlar').add(sevkiyat);

    for (let i = 0; i < fotoKayitlari.length; i++) {
      await db.collection('sevkiyatlar').doc(docRef.id)
        .collection('fotograflar').doc(String(i)).set({
          foto: fotoKayitlari[i].foto, tarih: Date.now(), sira: i, deriIndex: fotoKayitlari[i].deriIndex
        });
    }

    sevkiyat.fsId = docRef.id;
    state.sevkiyatlar.unshift(sevkiyat);
    state.aktifFisler = [];
    state._sevkiyatNot = '';
    titret(80);
    basariDialog(sevkiyat);

  } catch(e) {
    console.error('sevkiyatKaydet hata:', e);
    // Hatayı kullanıcıya tam olarak göster
    const hataMetin = e.message || String(e);
    const mbg = document.createElement('div');
    mbg.className = 'modal-bg';
    mbg.innerHTML = `
      <div class="modal" onclick="event.stopPropagation()" style="padding:20px">
        <div class="modal-handle"></div>
        <div style="color:var(--red);font-size:18px;font-weight:700;margin-bottom:12px">❌ Kayıt Başarısız</div>
        <div style="background:#f5d6d6;border-radius:8px;padding:12px;font-size:13px;font-family:monospace;word-break:break-all;margin-bottom:16px">${escapeHtml(hataMetin)}</div>
        <div style="font-size:13px;color:var(--ink-soft);margin-bottom:16px">Bu hatayı geliştiriciye bildirin veya Firestore kurallarını kontrol edin.</div>
        <button class="btn" onclick="this.closest('.modal-bg').remove()">Kapat</button>
      </div>`;
    mbg.onclick = () => mbg.remove();
    document.body.appendChild(mbg);
  } finally {
    state._kayitYapiliyor = false;
  }
}

  mbg.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div style="text-align:center;padding:20px 0">
        <div style="font-size:48px;color:var(--green);margin-bottom:12px">✓</div>
        <h2>Sevkiyat Kaydedildi</h2>
        <div class="mono text-muted mt-2">${s.sevkiyatNo}</div>

// ====== PDF ======
function sevkiyatBul(sId) {
  return state.sevkiyatlar.find(x => x.fsId === sId || x.id === sId)
    || state.yoneticiSevkiyatlar?.find(x => x.fsId === sId)
    || state.aktifSevkiyatDetay;
}

function pdfOlustur(s, boyut) {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: 'mm', format: boyut.toLowerCase() });
  pdfIcerikDoldur(pdf, s, boyut);
  return pdf;
}

function pdfIcerikDoldur(pdf, s, boyut) {
  const W = pdf.internal.pageSize.getWidth();
  const margin = 12;
  let y = margin;
  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(boyut === 'A4' ? 16 : 13);
  pdf.text('DERI SEVKIYAT IRSALIYESI', W/2, y, { align: 'center' });
  y += 5;
  pdf.setLineWidth(0.5);
  pdf.line(margin, y, W - margin, y);
  y += 6;
  pdf.setFontSize(9);
  pdf.setFont('helvetica', 'bold'); pdf.text('Sevkiyat No:', margin, y);
  pdf.setFont('helvetica', 'normal'); pdf.text(s.sevkiyatNo, margin + 22, y);
  pdf.setFont('helvetica', 'bold'); pdf.text('Tarih:', W - margin - 40, y);
  pdf.setFont('helvetica', 'normal'); pdf.text(tarihFormatla(s.tarih), W - margin - 28, y);
  y += 5;
  pdf.setFont('helvetica', 'bold'); pdf.text('Musteri:', margin, y);
  pdf.setFont('helvetica', 'normal'); pdf.text(s.musteriAd, margin + 22, y);
  pdf.setFont('helvetica', 'bold'); pdf.text('Kod:', W - margin - 40, y);
  pdf.setFont('helvetica', 'normal'); pdf.text(s.musteriKod, W - margin - 28, y);
  y += 5;
  if (s.not) {
    pdf.setFont('helvetica', 'italic');
    pdf.text('Not: ' + s.not.substring(0, 80), margin, y);
    y += 5;
  }
  y += 3;
  const colW = boyut === 'A4' ? [28, 22, 22, 16, 14, 22, 22, 30] : [22, 17, 17, 12, 11, 17, 17, 22];
  const basliklar = ['Cins', 'Renk', 'Kod', 'Kalite', 'Adet', 'dm2', 'ft2', 'Seri No'];
  pdf.setFillColor(220, 220, 220);
  pdf.rect(margin, y - 4, W - 2*margin, 6, 'F');
  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(8);
  let x = margin + 2;
  basliklar.forEach((b, i) => { pdf.text(b, x, y); x += colW[i]; });
  y += 4;
  pdf.line(margin, y, W - margin, y);
  y += 4;
  pdf.setFont('helvetica', 'normal');
  let toplamAdet = 0, toplamFt2 = 0, toplamDm2 = 0;
  s.deriler.forEach(d => {
    const ft2 = d.toplamYuzeyFt2 || 0;
    const dm2 = d.toplamYuzeyDm2 || ft2 * 9.2903;
    toplamAdet += d.deriAdedi; toplamFt2 += ft2; toplamDm2 += dm2;
    x = margin + 2;
    [d.cins || '', d.renk || '', d.kod || '', d.kalite || '', String(d.deriAdedi || 0), dm2.toFixed(1), ft2.toFixed(2), d.seriNo || ''].forEach((v, i) => {
      pdf.text(String(v).substring(0, i === 0 ? 12 : 10), x, y);
      x += colW[i];
    });
    y += 5;
  });
  pdf.line(margin, y - 2, W - margin, y - 2);
  y += 2;
  pdf.setFillColor(245, 230, 200);
  pdf.rect(margin, y - 4, W - 2*margin, 6, 'F');
  pdf.setFont('helvetica', 'bold');
  x = margin + 2;
  pdf.text('TOPLAM', x + colW[0] + colW[1] + colW[2] - 10, y);
  pdf.text(String(toplamAdet), x + colW[0] + colW[1] + colW[2] + colW[3], y);
  pdf.text(toplamDm2.toFixed(1), x + colW[0] + colW[1] + colW[2] + colW[3] + colW[4], y);
  pdf.text(toplamFt2.toFixed(2), x + colW[0] + colW[1] + colW[2] + colW[3] + colW[4] + colW[5], y);
  y += 14;
  pdf.setFont('helvetica', 'normal');
  pdf.setFontSize(9);
  pdf.text('Teslim Eden:', margin, y);
  pdf.text('Teslim Alan:', W - margin - 35, y);
  y += 14;
  pdf.line(margin, y, margin + 50, y);
  pdf.line(W - margin - 50, y, W - margin, y);
}

async function pdfUret(sId, boyut) {
  const s = sevkiyatBul(sId);
  if (!s) { toast('Sevkiyat bulunamadı'); return; }
  const pdf = pdfOlustur(s, boyut);

  const pdfBlob = pdf.output('blob');
  const pdfFile = new File([pdfBlob], `Irsaliye_${s.sevkiyatNo}.pdf`, { type: 'application/pdf' });

  if (navigator.canShare && navigator.canShare({ files: [pdfFile] })) {
    try {
      await navigator.share({ files: [pdfFile], title: `Irsaliye ${s.sevkiyatNo}`, text: `${s.musteriAd} - ${s.toplamAdet} deri, ${(s.toplamYuzeyDm2||s.toplamYuzey||0).toFixed(0)} dm² / ${(s.toplamYuzeyFt2||0).toFixed(2)} ft²` });
      return;
    } catch (e) {}
  }
  pdf.save(`Irsaliye_${s.sevkiyatNo}.pdf`);
  toast('PDF indirildi');
}

// ====== SEVKİYAT LİSTESİ + DETAY ======
function ekranSevkiyatListesi() {
  // Onaylanmış sevkiyatlar personel geçmişinden kaldırılır
  const sevk = state.sevkiyatlar.filter(s => s.kontrolDurumu !== 'onaylandi').sort((a, b) => b.tarih - a.tarih);
  const liste = sevk.map(s => `
    <div class="shipment-item" onclick="sevkiyatDetayAc('${s.fsId}')">
      <div class="header"><span class="no">${s.sevkiyatNo}</span><span class="date">${tarihKisa(s.tarih)}</span></div>
      <div class="customer">${s.musteriAd}</div>
      <div class="totals">
        <span>📦 ${s.deriler.length} fiş</span>
        <span>🐂 ${s.toplamAdet} deri</span>
        <span>📐 ${(s.toplamYuzeyDm2 || s.toplamYuzey || 0).toFixed(0)} dm²</span>
        <span style="color:var(--ink-faint)">${(s.toplamYuzeyFt2 || 0).toFixed(2)} ft²</span>
      </div>
    </div>`).join('');
  return `
    <div class="topbar">
      <button onclick="geriDon();" style="font-size:13px">‹ Geri</button>
      <div class="brand">Geçmiş</div>
      <div style="width:80px"></div>
    </div>
    <div class="content">
      ${sevk.length === 0 ? `<div class="empty"><div class="icon">⎙</div><div>Henüz sevkiyat yok</div></div>` : `<div class="section-title">${sevk.length} sevkiyat</div>${liste}`}
    </div>`;
}

function sevkiyatDetayAc(fsId) {
  state.aktifSevkiyatDetay = state.sevkiyatlar.find(s => s.fsId === fsId)
    || state.yoneticiSevkiyatlar.find(s => s.fsId === fsId);
  if (!state.aktifSevkiyatDetay) { toast('Sevkiyat bulunamadı'); return; }
  ekranGit('sevkiyat-detay');
}

function ekranSevkiyatDetay() {
  const s = state.aktifSevkiyatDetay;
  if (!s) {
    // Yenileme sonrası snapshot henüz gelmediyse yükleniyor göster (geri sekme)
    if (state._bekleyenDetayId) {
      return `<div class="topbar"><button onclick="geriDon();" style="font-size:13px">‹ Geri</button><div class="brand">Sevkiyat</div><div style="width:80px"></div></div>
        <div class="content"><div class="empty"><div class="icon">⏳</div><div>Sevkiyat yükleniyor...</div></div></div>`;
    }
    geriDon(); return '';
  }

  // Grupla
  const gruplar = derilerGrupla(s.deriler || []);
  const stdGruplar = gruplar.filter(g => !g.ecoGrup);
  const ecoGruplar = gruplar.filter(g => g.ecoGrup);
  const stdDm2 = stdGruplar.reduce((t,g) => t + g.toplamDm2, 0);
  const ecoDm2 = ecoGruplar.reduce((t,g) => t + g.toplamDm2, 0);

  const derilerAll = s.deriler || [];
  const fotoIdx = s.fotoIndeksleri || (((s.fotoSayisi||0) > 0) ? derilerAll.map((_,i)=>i) : []);
  const grupHtml = gruplar.map(g => {
    const indices = g.fisler.map(f => derilerAll.indexOf(f)).filter(i => i >= 0);
    const fotolu = indices.filter(i => fotoIdx.includes(i));
    return grupKartiHtml(g, fotolu.length > 0 ? {fsId: s.fsId, indices: fotolu} : null);
  }).join('');

  const dm2Top = s.toplamYuzeyDm2 || s.toplamYuzey || 0;
  const ft2Top = s.toplamYuzeyFt2 || 0;
  return `
    <div class="topbar">
      <button onclick="geriDon();" style="font-size:13px">‹ Geri</button>
      <div class="brand mono" style="font-size:14px">${s.sevkiyatNo}</div>
      <div style="width:80px"></div>
    </div>
    <div class="content">
      <div class="summary">
        <div class="customer-name">${escapeHtml(s.musteriAd||'')}</div>
        <div class="code">${escapeHtml(s.musteriKod || '')} • ${tarihFormatla(s.tarih)} • 👤 ${escapeHtml(s.personelAd || '?')}</div>
        <div class="summary-grid">
          <div class="item"><div class="value">${(s.deriler||[]).length}</div><div class="label">Paket</div></div>
          <div class="item"><div class="value">${s.toplamAdet}</div><div class="label">Deri</div></div>
          <div class="item">
            <div class="value">${dm2Top.toFixed(0)}</div>
            <div class="label">dm²</div>
            <div style="font-size:10px;opacity:0.7">${ft2Top.toFixed(2)} ft²</div>
          </div>
        </div>
        ${ecoGruplar.length > 0 ? `
        <div style="display:flex;gap:12px;margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.1);font-size:12px">
          <span>Standart: <b>${stdDm2.toFixed(0)}</b> dm²</span>
          <span style="color:var(--amber)">ECO: <b>${ecoDm2.toFixed(0)}</b> dm²</span>
        </div>` : ''}
      </div>

      ${s.not ? `<div style="background:var(--gold-soft,#fef6e4);border-left:3px solid var(--amber);padding:10px 14px;border-radius:6px;margin-bottom:12px;font-size:13px"><b>📝 Not:</b> ${escapeHtml(s.not)}</div>` : ''}

      <!-- Kontrol durumu -->
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:12px;border-radius:10px;background:${s.kontrolDurumu === 'onaylandi' ? 'var(--green-soft,#d5f5e3)' : 'var(--bg-soft)'}">
        ${s.kontrolDurumu === 'onaylandi'
          ? `<span style="font-size:20px">✅</span><div><div style="font-weight:700;color:var(--green)">Kontrol Edildi</div><div style="font-size:11px;color:var(--ink-faint)">${s.kontrolEden || ''} · ${s.kontrolTarihi ? tarihFormatla(s.kontrolTarihi) : ''}</div></div>`
